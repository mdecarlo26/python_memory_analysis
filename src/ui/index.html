<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HPC Memory Profiler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#060810; --panel:#09101a; --card:#111520; --card2:#161b28;
  --border:#1c2235; --border2:#232c42;
  --text:#c4cfdf; --text2:#8899b0; --dim:#3d4f68;
  --cpu:#38bdf8; --green:#34d399; --yellow:#f5c542; --purple:#9d84f5;
  --red:#f56565; --orange:#f59c42; --pink:#f56bb4; --teal:#42d4c8;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;display:flex;flex-direction:column;height:100vh;min-height:0}

/* ── Top bar ─────────────────────────────────────────────── */
#topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;overflow:hidden}
.logo{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--cpu);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap}
.logo .s{color:var(--dim);font-weight:300;margin:0 4px}
.vdiv{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.kpi{display:flex;flex-direction:column;gap:1px;white-space:nowrap;min-width:0}
.kpi-v{font-family:var(--mono);font-size:14px;font-weight:600;line-height:1;color:var(--text)}
.kpi-v.g{color:var(--green)}.kpi-v.b{color:var(--cpu)}.kpi-v.y{color:var(--yellow)}.kpi-v.p{color:var(--purple)}.kpi-v.r{color:var(--red)}
.kpi-l{font-size:9px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase}
.spacer{flex:1}
.load-btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--bg);background:var(--cpu);border:none;border-radius:6px;padding:7px 16px;cursor:pointer;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.load-btn:hover{opacity:.82}

/* ── Main layout ─────────────────────────────────────────── */
#app{flex:1;display:grid;grid-template-columns:260px 1fr 310px;overflow:hidden;min-height:0}
.panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{height:38px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.ph-title{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text2);letter-spacing:.12em;text-transform:uppercase}
.ph-count{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:auto}

/* ── Scrollable areas ────────────────────────────────────── */
.scrollable{flex:1;overflow-y:auto;overflow-x:hidden}
.scrollable::-webkit-scrollbar{width:5px}
.scrollable::-webkit-scrollbar-track{background:transparent}
.scrollable::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.scrollable::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* ── Tabs ────────────────────────────────────────────────── */
#center-nav{height:40px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;padding:0 12px;gap:2px;flex-shrink:0}
.tab{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:5px;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:color .12s,background .12s;white-space:nowrap}
.tab.on{color:var(--cpu);background:rgba(65,179,245,.1)}
.tab:not(.on):hover{color:var(--text2);background:var(--card)}

/* ── Legend ──────────────────────────────────────────────── */
.legend-strip{display:flex;align-items:center;gap:12px;margin-left:auto;flex-wrap:nowrap}
.leg{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--dim);white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Timeline zoom controls ──────────────────────────────── */
.zoom-ctrl{display:flex;align-items:center;gap:4px;margin-right:4px}
.zb{font-family:var(--mono);font-size:10px;background:var(--card);border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:3px 8px;cursor:pointer;transition:background .1s,color .1s}
.zb:hover{background:var(--card2);color:var(--text)}
.zb.act{color:var(--cpu);border-color:rgba(65,179,245,.4)}
.zoom-range{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:4px;min-width:80px}

/* ── Timeline wrap ───────────────────────────────────────── */
#tl-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#timeline-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:crosshair}
#timeline-wrap svg{display:block;width:100%;height:100%}

/* ── Scrollbar track (horizontal time scrubber) ──────────── */
#time-scrollbar{height:18px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden;cursor:pointer}
#time-scrollbar-track{position:absolute;top:4px;left:0;right:0;height:10px;background:var(--border)}
#time-scrollbar-thumb{position:absolute;top:4px;height:10px;background:var(--border2);border-radius:3px;cursor:grab;transition:background .1s;min-width:20px}
#time-scrollbar-thumb:hover,#time-scrollbar-thumb.dragging{background:var(--dim)}

/* ── Mini pressure map ───────────────────────────────────── */
#pressure-strip{height:64px;flex-shrink:0;border-top:1px solid var(--border);background:var(--panel);position:relative;overflow:hidden}
#pressure-strip svg{width:100%;height:64px;display:block}
#brush-rect{fill:rgba(65,179,245,.08);stroke:rgba(65,179,245,.35);stroke-width:1;cursor:ew-resize;pointer-events:all}

/* ── Cards / Inspector helpers ───────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:8px 10px}
.card-title{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.isec{margin-bottom:14px}
.isec-t{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.irow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.ik{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.iv{font-family:var(--mono);font-size:10px;color:var(--text);text-align:right;word-break:break-all;min-width:0}
.iv.a{color:var(--cpu)}.iv.g{color:var(--green)}.iv.y{color:var(--yellow)}.iv.p{color:var(--purple)}.iv.r{color:var(--red)}.iv.d{color:var(--text2)}.iv.o{color:var(--orange)}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:12px}
.badge-cpu{background:rgba(65,179,245,.1);color:var(--cpu);border:1px solid rgba(65,179,245,.25)}
.badge-gpu{background:rgba(46,204,152,.08);color:var(--green);border:1px solid rgba(46,204,152,.2)}
.badge-grp{background:rgba(157,132,245,.08);color:var(--purple);border:1px solid rgba(157,132,245,.2)}
.badge-hard{background:rgba(46,204,152,.1);color:var(--green);border:1px solid rgba(46,204,152,.25)}
.badge-weak{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}
.frame{font-family:var(--mono);font-size:9px;color:var(--text2);border-left:2px solid var(--border2);padding:3px 8px;margin-bottom:3px;line-height:1.5;word-break:break-all}
.frame.u{color:var(--cpu);border-left-color:var(--cpu)}
.cpill{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--border2)}
.cpill.hard{border-left-color:var(--green)}

/* ── Insight cards ───────────────────────────────────────── */
.insight{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin:0 10px 7px;border-left:3px solid var(--border2);cursor:pointer;transition:border-color .15s,background .15s}
.insight:first-child{margin-top:8px}
.insight:hover{background:var(--card2)}
.insight.sel{border-color:var(--cpu);background:rgba(65,179,245,.04)}
.insight-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.insight-icon{font-size:15px;line-height:1}
.insight-type{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text)}
.ibadge{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-left:auto}
.ib-hi{background:rgba(245,101,101,.12);color:var(--red);border:1px solid rgba(245,101,101,.25)}
.ib-md{background:rgba(245,197,66,.1);color:var(--yellow);border:1px solid rgba(245,197,66,.2)}
.ib-lo{background:rgba(46,204,152,.08);color:var(--green);border:1px solid rgba(46,204,152,.15)}
.ib-if{background:rgba(65,179,245,.08);color:var(--cpu);border:1px solid rgba(65,179,245,.15)}
.insight-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:5px}
.insight-stat{font-family:var(--mono);font-size:11px}
.ibar{height:3px;background:var(--border2);border-radius:2px;margin-top:5px;overflow:hidden}
.ibar-fill{height:100%;border-radius:2px}

/* ── Type list ───────────────────────────────────────────── */
.type-row{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.type-row:hover{background:var(--card)}
.type-row.sel{background:rgba(65,179,245,.05);border-left-color:var(--cpu)}
.tr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-name{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-sub{font-size:10px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-bar{height:2px;background:var(--border2);border-radius:1px;margin-top:4px}
.tr-bar-fill{height:100%;border-radius:1px}
.tr-num{font-family:var(--mono);font-size:11px;color:var(--text2);flex-shrink:0;text-align:right;min-width:30px}

/* ── Empty state ─────────────────────────────────────────── */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none}
.empty-t{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.empty-s{font-family:var(--mono);font-size:10px;color:var(--border2)}

/* ── Workload summary card ───────────────────────────────── */
.wc{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;margin:8px 10px}
.wc-t{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.wc-b{font-size:12px;color:var(--text2);line-height:1.6}
.wc-b strong{color:var(--text);font-weight:600}
.wc-b .hi{color:var(--cpu);font-family:var(--mono);font-size:11px}

/* ── Tooltip ─────────────────────────────────────────────── */
#tl-tooltip{position:fixed;pointer-events:none;z-index:999;background:rgba(12,15,24,.97);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;font-family:var(--mono);font-size:10px;color:var(--text);max-width:240px;box-shadow:0 4px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .08s}
#tl-tooltip.show{opacity:1}
#tl-tooltip .tt-type{font-size:11px;font-weight:600;color:var(--cpu);margin-bottom:5px}
#tl-tooltip .tt-row{display:flex;gap:8px;margin-bottom:2px;justify-content:space-between}
#tl-tooltip .tt-k{color:var(--dim)}
#tl-tooltip .tt-v{color:var(--text)}

/* ── Drop overlay ────────────────────────────────────────── */
#drop-ov{position:fixed;inset:0;background:rgba(7,9,14,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s}
#drop-ov.show{opacity:1;pointer-events:all}

/* ── Scanline texture ────────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:1000}

/* ── Type list scroll + kbd nav ──────────────────────────── */
.type-list-inner{flex:1;overflow-y:auto;overflow-x:hidden;outline:none}
.type-list-inner::-webkit-scrollbar{width:4px}
.type-list-inner::-webkit-scrollbar-track{background:transparent}
.type-list-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.type-list-inner::-webkit-scrollbar-thumb:hover{background:var(--dim)}
.type-row.kbd-focus{background:rgba(65,179,245,.07);border-left-color:rgba(65,179,245,.5);outline:none}
.type-row.kbd-focus .tr-name{color:var(--cpu)}

/* ── Per-type sparkline bars ─────────────────────────────── */
.tr-spark{display:flex;align-items:flex-end;gap:1px;height:16px;width:36px;flex-shrink:0}
.tr-spark-bar{flex:1;border-radius:1px 1px 0 0;min-height:1px;transition:opacity .12s}
.type-row:hover .tr-spark-bar{opacity:.85!important}

/* ── Wheel-scroll hint strip ─────────────────────────────── */
.wheel-hint{padding:4px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.04em}
.wheel-hint kbd{background:var(--card2);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;font-size:8px;color:var(--text2)}

/* ── Graph tab ───────────────────────────────────────────── */
#graph-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#graph-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#graph-wrap svg{display:block;width:100%;height:100%}
.graph-toolbar{height:34px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.graph-mode-btn{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;transition:all .12s}
.graph-mode-btn.on{color:var(--cpu);border-color:rgba(65,179,245,.4);background:rgba(65,179,245,.07)}
.graph-mode-btn:not(.on):hover{color:var(--text2);background:var(--card)}
.graph-legend{margin-left:auto;display:flex;align-items:center;gap:12px}
.gleg{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8px;color:var(--dim);white-space:nowrap}
.gleg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gleg-dash{width:14px;height:0;border-top:1.5px dashed;flex-shrink:0}

/* ── RSS overlay note in legend ──────────────────────────── */
.leg-rss-line{width:18px;height:2px;background:rgba(245,197,66,.5);border-radius:1px;flex-shrink:0}

/* ── Pulse ring on drop overlay ──────────────────────────── */
.drop-ring{width:80px;height:80px;border-radius:50%;border:2px solid var(--cpu);display:flex;align-items:center;justify-content:center;margin-bottom:14px;animation:ring-pulse 1.8s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(65,179,245,.45)}50%{box-shadow:0 0 0 14px rgba(65,179,245,0)}}

/* ── Inspector anim-in ───────────────────────────────────── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeSlideUp .18s ease both}

/* ── Graph container full-height fix ─────────────────────── */
#graph-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#graph-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:grab}
#graph-wrap:active{cursor:grabbing}
#graph-wrap svg{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
#graph-canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
.graph-toolbar{height:34px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.graph-mode-btn{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;transition:all .12s}
.graph-mode-btn.on{color:var(--cpu);border-color:rgba(65,179,245,.4);background:rgba(65,179,245,.07)}
.graph-mode-btn:not(.on):hover{color:var(--text2);background:var(--card)}
.graph-legend{margin-left:auto;display:flex;align-items:center;gap:12px}
.gleg{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8px;color:var(--dim);white-space:nowrap}
.gleg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gleg-dash{width:14px;height:0;border-top:1.5px dashed;flex-shrink:0}
/* fix type-list-inner height */
.type-list-inner{flex:1;overflow-y:auto;overflow-x:hidden;outline:none;min-height:0}
</style>
</head>
<body>
<div id="root"></div>
<div id="tl-tooltip"></div>
<div id="drop-ov">
  <div class="drop-ring"><span style="font-size:28px">⬇</span></div>
  <div style="font-family:var(--mono);font-size:12px;color:var(--cpu);letter-spacing:.14em;text-transform:uppercase">Drop session.json</div>
  <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:6px">or use Load JSON above</div>
</div>
<input type="file" id="file-input" accept=".json" style="display:none"/>
<script type="text/babel">

const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Formatters ─────────────────────────────────────────────────────────────────
const fmtB=n=>{if(n==null||n<0)return'—';if(n<1024)return`${n} B`;if(n<1048576)return`${(n/1024).toFixed(1)} KB`;if(n<1073741824)return`${(n/1048576).toFixed(2)} MB`;return`${(n/1073741824).toFixed(2)} GB`};
const fmtNs=ns=>{if(!ns||ns<0)return'—';if(ns<1000)return`${ns} ns`;if(ns<1e6)return`${(ns/1000).toFixed(1)} µs`;if(ns<1e9)return`${(ns/1e6).toFixed(2)} ms`;return`${(ns/1e9).toFixed(3)} s`};
const fmtN=n=>n==null?'—':n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1000?`${(n/1000).toFixed(1)}k`:String(n);
const fmtAddr=n=>n?'0x'+n.toString(16).toUpperCase().padStart(12,'0'):'—';
const fmtPct=f=>`${(f*100).toFixed(1)}%`;

// ── Palette ────────────────────────────────────────────────────────────────────
const PALETTE=['#41b3f5','#2ecc98','#f5c542','#9d84f5','#f56565','#f59c42','#f56bb4','#42d4c8','#7ec8f5','#a8f5c8','#f5e08a','#c9b8fc','#f5a27e','#82e0aa'];
const _cm={};let _ci=0;
const tc=t=>{const k=(t||'?').split('.').pop();if(!_cm[k])_cm[k]=PALETTE[_ci++%PALETTE.length];return _cm[k]};
const hexToRgb=hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b]};

// ── Session analysis (single O(n) pass) ────────────────────────────────────────
function analyzeSession(session){
  if(!session)return null;
  if(!session.cpu_events||!Array.isArray(session.cpu_events))return null;
  const allocs  = session.cpu_events.filter(e=>e&&!e.is_dealloc);
  const deallocs= session.cpu_events.filter(e=>e&&e.is_dealloc);
  const gpu     = session.gpu_events||[];
  const corrs   = session.correlated_events||[];
  const startNs = session.start_time_ns||0;
  const endNs   = session.end_time_ns||0;
  const dur     = endNs-startNs||1;

  const deallocMap={};deallocs.forEach(e=>{deallocMap[e.alloc_address]=e});
  const gpuById={};gpu.forEach(e=>{gpuById[e.base.event_id]=e});
  const cpuCorrs={};corrs.forEach(c=>{
    if(!cpuCorrs[c.cpu_event_id])cpuCorrs[c.cpu_event_id]=[];
    cpuCorrs[c.cpu_event_id].push({...c,gpuEvent:gpuById[c.gpu_event_id]});
  });

  // Single pass: byType + rateSeries + sizeBuckets + genCounts + rssEvents
  const byType={};
  const RATE_N=60,SPARK_N=20;
  const rateSeries=new Array(RATE_N).fill(0);
  const sizeBuckets={'<1KB':0,'1-4KB':0,'4-16KB':0,'16-64KB':0,'64KB+':0};
  const genCounts={'-1':0,'0':0,'1':0,'2':0};
  const rssEvents=[];
  let maxRss=0;

  allocs.forEach(e=>{
    if(!e||!e.base)return;
    const t=(e.object_type||'unknown').trim()||'unknown';
    if(!byType[t])byType[t]={type:t,count:0,totalBytes:0,bufBytes:0,sizes:[],gcGens:[0,0,0,0],corrCount:0,events:[],module:e.module_name||'',spark:new Array(SPARK_N).fill(0)};
    const g=byType[t];
    g.count++;
    const sz=e.alloc_size_bytes||0;
    g.totalBytes+=sz; g.bufBytes+=e.buffer_nbytes||0;
    if(g.sizes.length<500)g.sizes.push(sz);
    const gen=e.gc_generation;
    if(gen===-1)g.gcGens[0]++;else if(gen>=0&&gen<=2)g.gcGens[gen+1]++;
    if(cpuCorrs[e.base.event_id]?.length)g.corrCount++;
    if(g.events.length<5)g.events.push(e);
    // rate bucket
    const rb=Math.min(RATE_N-1,Math.floor(((e.base.timestamp_ns-startNs)/dur)*RATE_N));
    rateSeries[rb]++;
    // spark bucket
    const sb=Math.min(SPARK_N-1,Math.floor(((e.base.timestamp_ns-startNs)/dur)*SPARK_N));
    g.spark[sb]++;
    // size bucket
    if(sz<1024)sizeBuckets['<1KB']++;
    else if(sz<4096)sizeBuckets['1-4KB']++;
    else if(sz<16384)sizeBuckets['4-16KB']++;
    else if(sz<65536)sizeBuckets['16-64KB']++;
    else sizeBuckets['64KB+']++;
    // gen
    genCounts[gen>=0&&gen<=2?String(gen):'-1']++;
    // rss
    const rss=e.peak_rss_kb||0;
    if(rss>0){rssEvents.push(e);if(rss>maxRss)maxRss=rss;}
  });
  rssEvents.sort((a,b)=>a.base.timestamp_ns-b.base.timestamp_ns);

  const typeList=Object.values(byType).sort((a,b)=>b.count-a.count);
  const totalBytes=typeList.reduce((s,t)=>s+(t.bufBytes||t.totalBytes),0);
  const rateSeries60=rateSeries.map((count,i)=>({t:startNs+i*(dur/RATE_N),count}));

  const kernels  =gpu.filter(e=>e.base.event_type==='KERNEL');
  const transfers=gpu.filter(e=>e.base.event_type==='TRANSFER');
  const pageFaults=gpu.filter(e=>e.base.event_type==='PAGE_FAULT');
  const xferBytes=transfers.reduce((s,e)=>s+(e.transfer_size_bytes||0),0);
  const umBytesH2D=transfers.reduce((s,e)=>s+(e.um_bytes_htod||0),0);
  const umBytesD2H=transfers.reduce((s,e)=>s+(e.um_bytes_dtoh||0),0);
  const kDur=kernels.reduce((s,e)=>s+(e.kernel_duration_ns||0),0);
  const maxDevMem=Math.max(0,...gpu.map(e=>e.device_mem_used_mb||0));
  const streams=[...new Set(gpu.map(e=>e.stream_id).filter(x=>x!=null&&x!==0))];
  const totalPageFaults=pageFaults.reduce((s,e)=>s+(e.um_page_faults||0),0);

  // Callsites
  const csCounts={};
  allocs.forEach(e=>{
    const frames=e.callstack||[];
    const uf=frames.filter(f=>!f.includes('/lib/python')&&!f.includes('tracemalloc')&&!f.includes('importlib'));
    const site=uf[0]||frames[0]||null;
    if(site){if(!csCounts[site])csCounts[site]={count:0,bytes:0,types:new Set()};csCounts[site].count++;csCounts[site].bytes+=e.alloc_size_bytes||0;csCounts[site].types.add(e.object_type)}
  });
  const topCallsites=Object.entries(csCounts).sort((a,b)=>b[1].bytes-a[1].bytes).slice(0,12).map(([site,d])=>({site,...d,types:[...d.types]}));

  const bursts=detectBursts(allocs);
  const insights=generateInsights({typeList,allocs,deallocs,bursts,dur,gpu,transfers,kernels,xferBytes,sizeBuckets,genCounts,corrs,maxRss,totalBytes,pageFaults,totalPageFaults});

  return{allocs,deallocs,gpu,corrs,deallocMap,gpuById,cpuCorrs,
         typeList,totalBytes,rssEvents,maxRss,rateSeries:rateSeries60,sizeBuckets,genCounts,
         kernels,transfers,pageFaults,xferBytes,umBytesH2D,umBytesD2H,kDur,maxDevMem,streams,totalPageFaults,
         bursts,topCallsites,insights,dur,startNs,endNs};
}

function detectBursts(allocs){
  const bursts=[];let i=0;
  while(i<allocs.length){
    const t=allocs[i].object_type,s=allocs[i].alloc_size_bytes;let j=i+1;
    while(j<allocs.length&&allocs[j].object_type===t&&allocs[j].alloc_size_bytes===s)j++;
    if(j-i>=5)bursts.push({type:t,size:s,count:j-i,start:allocs[i].base.timestamp_ns});
    i=j;
  }
  return bursts.sort((a,b)=>b.count-a.count).slice(0,8);
}

function generateInsights({typeList,allocs,deallocs,bursts,dur,gpu,transfers,kernels,xferBytes,sizeBuckets,genCounts,corrs,maxRss,totalBytes,pageFaults,totalPageFaults}){
  const ins=[];
  const survived=allocs.length-deallocs.length;
  if(survived>0&&survived/allocs.length>0.2)ins.push({id:'leak',icon:'⚠',sev:'hi',color:'var(--red)',title:'Possible Memory Leak',desc:`${fmtN(survived)} objects (${fmtPct(survived/allocs.length)}) allocated but never freed.`,stat:`${fmtN(survived)} still live`,pct:survived/allocs.length});
  const oldGen=(parseInt(genCounts['1']||0)+parseInt(genCounts['2']||0))/Math.max(1,allocs.length);
  if(oldGen>0.1)ins.push({id:'gc',icon:'♻',sev:'md',color:'var(--yellow)',title:'GC Generation Pressure',desc:`${fmtPct(oldGen)} reached GC gen 1/2.`,stat:`gen1:${fmtN(genCounts['1'])} gen2:${fmtN(genCounts['2'])}`,pct:oldGen});
  const nonGcFrac=parseInt(genCounts['-1']||0)/Math.max(1,allocs.length);
  if(nonGcFrac>0.3)ins.push({id:'nongc',icon:'📦',sev:'if',color:'var(--cpu)',title:'High Non-GC Object Count',desc:`${fmtPct(nonGcFrac)} non-GC objects (numpy/torch buffers).`,stat:`${fmtN(genCounts['-1'])} non-GC objects`,pct:nonGcFrac});
  if(bursts.length){const top=bursts[0];ins.push({id:'burst',icon:'⚡',sev:'if',color:'var(--cpu)',title:'Repeated Allocation Burst',desc:`${top.count}× ${top.type} @ ${fmtB(top.size)} — tight loop.`,stat:`${top.count}× ${top.type.split('.').pop()} @ ${fmtB(top.size)}`,pct:Math.min(1,top.count/allocs.length*5),burst:top})}
  const la=allocs.filter(e=>(e.alloc_size_bytes||0)>65536);
  if(la.length){const tL=la.reduce((s,e)=>s+(e.alloc_size_bytes||0),0);ins.push({id:'large',icon:'🗄',sev:'md',color:'var(--orange)',title:'Large Object Allocations',desc:`${la.length} allocs >64KB totaling ${fmtB(tL)}.`,stat:`${la.length} objects · ${fmtB(tL)}`,pct:la.length/Math.max(1,allocs.length)})}
  if(transfers.length){const hard=corrs.filter(c=>c.confidence==='HARD').length;ins.push({id:'xfer',icon:'🚀',sev:'if',color:'var(--green)',title:'CPU→GPU Data Movement',desc:`${fmtB(xferBytes)} in ${transfers.length} transfers. ${hard} HARD-matched.`,stat:`${fmtB(xferBytes)} · ${transfers.length} ops`,pct:1})}
  if(totalPageFaults>0)ins.push({id:'fault',icon:'💥',sev:'md',color:'var(--red)',title:'UM Page Faults',desc:`${fmtN(totalPageFaults)} fault groups. Consider prefetching.`,stat:`${fmtN(totalPageFaults)} fault groups`,pct:Math.min(1,totalPageFaults/1000)});
  return ins;
}

// ── Type list with wheel scroll + keyboard nav ─────────────────────────────────
function TypeList({data,filter,onFilter,searchQ,onSearch}){
  const scrollRef=useRef(null);
  const [kbdIdx,setKbdIdx]=useState(-1);
  const list=useMemo(()=>data?data.typeList:[],[data]);
  const filtered=useMemo(()=>searchQ?list.filter(t=>t.type.toLowerCase().includes(searchQ.toLowerCase())):list,[list,searchQ]);
  const allItems=useMemo(()=>[null,...filtered],[filtered]);

  useEffect(()=>{
    const el=scrollRef.current; if(!el)return;
    const h=e=>{
      if(e.key==='ArrowDown'){e.preventDefault();setKbdIdx(i=>Math.min(allItems.length-1,i+1));}
      else if(e.key==='ArrowUp'){e.preventDefault();setKbdIdx(i=>Math.max(0,i-1));}
      else if(e.key==='Enter'&&kbdIdx>=0){onFilter(allItems[kbdIdx]?.type??null);}
      else if(e.key==='Escape'){onFilter(null);setKbdIdx(-1);}
    };
    el.addEventListener('keydown',h);
    return()=>el.removeEventListener('keydown',h);
  },[kbdIdx,allItems,onFilter]);

  useEffect(()=>{
    if(kbdIdx<0||!scrollRef.current)return;
    scrollRef.current.querySelectorAll('.type-row')[kbdIdx]?.scrollIntoView({block:'nearest',behavior:'smooth'});
  },[kbdIdx]);

  const maxC=list[0]?.count||1;
  const maxRate=Math.max(1,...(data?.rateSeries||[]).map(x=>x.count));

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'6px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <input value={searchQ} onChange={e=>{onSearch(e.target.value);setKbdIdx(-1);}}
          placeholder="Filter types…"
          style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:5,padding:'5px 9px',fontFamily:'var(--mono)',fontSize:10,color:'var(--text)',outline:'none'}}
          onFocus={e=>e.target.style.borderColor='rgba(65,179,245,.4)'}
          onBlur={e=>e.target.style.borderColor='var(--border2)'}
        />
      </div>
      {!data?(
        <div className="scrollable" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>—</span>
        </div>
      ):(
        <div className="type-list-inner" ref={scrollRef} tabIndex={0}
          onMouseEnter={()=>scrollRef.current?.focus({preventScroll:true})}>
          {/* All types */}
          <div className={`type-row${!filter?' sel':''}${kbdIdx===0?' kbd-focus':''}`}
               onClick={()=>{onFilter(null);setKbdIdx(0);}}>
            <div className="tr-dot" style={{background:'var(--dim)'}}/>
            <div className="tr-info">
              <div className="tr-name" style={{color:'var(--text2)'}}>All types</div>
              <div className="tr-sub">{fmtN(data.allocs.length)} · {fmtB(data.totalBytes)}</div>
              <div className="tr-bar"><div className="tr-bar-fill" style={{width:'100%',background:'var(--dim)'}}/></div>
            </div>
            <div style={{display:'flex',alignItems:'flex-end',gap:1,width:36,height:16,flexShrink:0}}>
              {data.rateSeries.slice(0,20).map((b,i)=>{
                const h=Math.max(1,Math.round((b.count/maxRate)*16));
                return<div key={i} style={{flex:1,height:h,background:'var(--dim)',borderRadius:'1px 1px 0 0',opacity:.45}}/>;
              })}
            </div>
            <div className="tr-num">{fmtN(data.allocs.length)}</div>
          </div>
          {filtered.map((t,idx)=>{
            const col=tc(t.type),dispB=t.bufBytes>0?t.bufBytes:t.totalBytes;
            const isN=t.module==='numpy'||t.type.includes('ndarray')||t.type.includes('Tensor');
            const sparkMax=Math.max(1,...t.spark);
            return(
              <div key={t.type} className={`type-row${filter===t.type?' sel':''}${kbdIdx===idx+1?' kbd-focus':''}`}
                   onClick={()=>{onFilter(filter===t.type?null:t.type);setKbdIdx(idx+1);}}>
                <div className="tr-dot" style={{background:col}}/>
                <div className="tr-info">
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span className="tr-name">{t.type.split('.').pop()}</span>
                    {isN&&<span style={{fontFamily:'var(--mono)',fontSize:7,background:'rgba(46,204,152,.12)',color:'var(--green)',border:'1px solid rgba(46,204,152,.2)',borderRadius:2,padding:'1px 3px'}}>buf</span>}
                    {t.corrCount>0&&<span style={{fontFamily:'var(--mono)',fontSize:7,background:'rgba(65,179,245,.12)',color:'var(--cpu)',border:'1px solid rgba(65,179,245,.2)',borderRadius:2,padding:'1px 3px'}}>GPU</span>}
                  </div>
                  <div className="tr-sub">{fmtB(dispB)}</div>
                  <div className="tr-bar"><div className="tr-bar-fill" style={{width:`${(t.count/maxC)*100}%`,background:col}}/></div>
                </div>
                <div style={{display:'flex',alignItems:'flex-end',gap:1,width:36,height:16,flexShrink:0}}>
                  {t.spark.map((v,i)=>{
                    const h=v>0?Math.max(2,Math.round((v/sparkMax)*16)):1;
                    return<div key={i} style={{flex:1,height:h,background:col,borderRadius:'1px 1px 0 0',opacity:v>0?.7:.12}}/>;
                  })}
                </div>
                <div className="tr-num" style={{color:col}}>{fmtN(t.count)}</div>
              </div>
            );
          })}
        </div>
      )}
      {data&&<div style={{padding:'4px 12px',borderTop:'1px solid var(--border)',flexShrink:0,display:'flex',gap:8,fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>
        <span>🖱 scroll</span>
        <span style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:3,padding:'0 4px'}}>↑↓</span> nav
        <span style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:3,padding:'0 4px'}}>↵</span> select
        <span style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:3,padding:'0 4px'}}>Esc</span> clear
      </div>}
    </div>
  );
}

// ── Timeline ───────────────────────────────────────────────────────────────────
// Fixes for large sessions:
// 1. Per-lane sampling cap (not global) so all types still appear
// 2. D3 data join instead of per-element append inside renderBars
// 3. Only re-filter allocs when data/filter changes, not on every zoom
function Timeline({data,filter,onSelect,selected}){
  const wrapRef=useRef(null),svgRef=useRef(null),zoomRef=useRef(null);
  const [zoomLabel,setZoomLabel]=useState('1×');
  const [domLabel,setDomLabel]=useState('');
  const tooltip=document.getElementById('tl-tooltip');

  // Pre-compute filtered allocs and lane structure — only when data/filter changes
  const {filteredAllocs,lanes,laneMap,GPU_H,cpuH} = useMemo(()=>{
    if(!data)return{filteredAllocs:[],lanes:[],laneMap:{},GPU_H:22,cpuH:0};
    const fa=filter?data.allocs.filter(e=>e&&e.object_type===filter):data.allocs.filter(e=>e&&e.base);
    const types=filter?[filter]:[...new Set(fa.map(e=>e.object_type||'unknown'))];
    const typeCounts={};fa.forEach(e=>{const t=(e&&e.object_type||'unknown').trim()||'unknown';typeCounts[t]=(typeCounts[t]||0)+1});
    let ls=types.map(t=>({type:t,count:typeCounts[t]||0,color:tc(t)})).sort((a,b)=>b.count-a.count);
    ls=ls.slice(0,Math.max(1,Math.floor(400/18)));
    const GPU_H=22,cpuH=Math.max(100,400-GPU_H);
    const totalC=ls.reduce((s,l)=>s+l.count,0)||1;
    let yOff=0;
    ls.forEach(l=>{l.h=Math.max(18,Math.floor((l.count/totalC)*cpuH));l.y=yOff;yOff+=l.h;});
    if(ls.length){const last=ls[ls.length-1];last.h=cpuH-last.y;}
    return{filteredAllocs:fa,lanes:ls,laneMap:Object.fromEntries(ls.map(l=>[l.type,l])),GPU_H,cpuH};
  },[data,filter]);

  useEffect(()=>{
    if(!wrapRef.current||!data)return;
    try{
    const W=wrapRef.current.clientWidth||800;
    const H=wrapRef.current.clientHeight||400;
    const svg=d3.select(svgRef.current);
    svg.selectAll('*').remove();
    svg.attr('width',W).attr('height',H);

    const{allocs,deallocMap,gpu,startNs,endNs,dur,rssEvents,maxRss}=data;
    if(!filteredAllocs.length&&!gpu.length)return;

    const ML=80,MR=12,MT=8,MB=22,innerW=W-ML-MR,innerH=H-MT-MB;
    const GPU_H2=22,cpuH2=innerH-GPU_H2;

    // Recompute lane heights based on actual inner height
    const laneH={};
    const totalC=lanes.reduce((s,l)=>s+l.count,0)||1;
    let yOff2=0;
    const lanesWithH=lanes.map(l=>{
      const h=Math.max(18,Math.floor((l.count/totalC)*cpuH2));
      const y=yOff2; yOff2+=h;
      return{...l,h,y};
    });
    if(lanesWithH.length){const last=lanesWithH[lanesWithH.length-1];last.h=cpuH2-last.y;}
    const laneMapH=Object.fromEntries(lanesWithH.map(l=>[l.type,l]));

    const xBase=d3.scaleLinear().domain([startNs,endNs]).range([0,innerW]);

    // Left lane labels
    lanesWithH.forEach(l=>{
      svg.append('text').attr('x',ML-5).attr('y',MT+l.y+l.h/2)
        .attr('text-anchor','end').attr('dominant-baseline','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',8)
        .attr('fill',l.color).attr('opacity',.9)
        .text(l.type.split('.').pop().slice(0,11));
    });
    svg.append('text').attr('x',ML-5).attr('y',MT+cpuH2+GPU_H2/2)
      .attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size',8)
      .attr('fill','rgba(46,204,152,.75)').text('GPU');

    const mainG=svg.append('g').attr('transform',`translate(${ML},${MT})`);
    lanesWithH.forEach((l,i)=>mainG.append('rect').attr('x',0).attr('y',l.y).attr('width',innerW).attr('height',l.h)
      .attr('fill',i%2===0?'rgba(255,255,255,.012)':'transparent').attr('pointer-events','none'));
    mainG.append('rect').attr('x',0).attr('y',cpuH2).attr('width',innerW).attr('height',GPU_H2)
      .attr('fill','rgba(46,204,152,.025)').attr('pointer-events','none');
    lanesWithH.forEach(l=>mainG.append('line').attr('x1',0).attr('x2',innerW).attr('y1',l.y).attr('y2',l.y)
      .attr('stroke','rgba(255,255,255,.03)').attr('stroke-width',.5).attr('pointer-events','none'));
    mainG.append('line').attr('x1',0).attr('x2',innerW).attr('y1',cpuH2).attr('y2',cpuH2)
      .attr('stroke','rgba(46,204,152,.15)').attr('stroke-width',.5).attr('pointer-events','none');

    svg.append('defs').append('clipPath').attr('id','tl-clip')
      .append('rect').attr('x',0).attr('y',0).attr('width',innerW).attr('height',innerH);
    const clipped=mainG.append('g').attr('clip-path','url(#tl-clip)');
    const rssG=clipped.append('g'),barsG=clipped.append('g'),gpuG=clipped.append('g');
    const axisG=svg.append('g').attr('transform',`translate(${ML},${H-MB})`);
    const styleAx=g=>{
      g.selectAll('text').attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','#3d4f68');
      g.select('.domain').attr('stroke','#1c2235');
      g.selectAll('.tick line').attr('stroke','#1c2235');
    };

    // Per-lane sample budget to ensure all types appear
    const PER_LANE_MAX=600;

    function renderBars(xScale){
      barsG.selectAll('*').remove();
      gpuG.selectAll('*').remove();
      rssG.selectAll('*').remove();
      const[t0,t1]=xScale.domain();

      // Thumb
      const frac0=(t0-startNs)/dur,frac1=(t1-startNs)/dur;
      const thumb=document.getElementById('time-scrollbar-thumb');
      if(thumb){const tw=thumb.parentElement.clientWidth-2;thumb.style.left=`${Math.max(0,frac0*tw)+1}px`;thumb.style.width=`${Math.max(14,(frac1-frac0)*tw)}px`;}

      // RSS overlay
      if(rssEvents.length>1&&maxRss>0){
        const yRss=d3.scaleLinear().domain([0,maxRss]).range([cpuH2-2,2]);
        const visRss=rssEvents.filter(e=>{const px=xScale(e.base.timestamp_ns);return px>=-2&&px<=innerW+2;});
        if(visRss.length>1){
          const area=d3.area().x(d=>xScale(d.base.timestamp_ns)).y0(cpuH2).y1(d=>yRss(d.peak_rss_kb)).curve(d3.curveMonotoneX);
          const line=d3.line().x(d=>xScale(d.base.timestamp_ns)).y(d=>yRss(d.peak_rss_kb)).curve(d3.curveMonotoneX);
          rssG.append('path').datum(visRss).attr('d',area).attr('fill','rgba(245,197,66,.04)');
          rssG.append('path').datum(visRss).attr('d',line).attr('fill','none').attr('stroke','rgba(245,197,66,.4)').attr('stroke-width',1.2);
        }
      }

      // Sample per lane, not globally
      const byLane={};
      filteredAllocs.forEach(e=>{
        const d=deallocMap[e.alloc_address],endT=d?d.base.timestamp_ns:endNs;
        if(endT<t0||e.base.timestamp_ns>t1)return;
        const lt=e.object_type||'unknown';
        if(!byLane[lt])byLane[lt]=[];
        byLane[lt].push(e);
      });

      const barData=[];
      Object.entries(byLane).forEach(([lt,evs])=>{
        const lane=laneMapH[lt];if(!lane)return;
        const step=evs.length>PER_LANE_MAX?Math.ceil(evs.length/PER_LANE_MAX):1;
        for(let i=0;i<evs.length;i+=step){
          const e=evs[i];
          if(!e||!e.base)continue;
          const d=deallocMap[e.alloc_address];
          barData.push({e,lane,
            x0:xScale(e.base.timestamp_ns),
            x1:xScale(d?d.base.timestamp_ns:endNs),
            hasC:(data.cpuCorrs[e.base.event_id]?.length||0)>0,
            isSel:selected?.sel?.base?.event_id===e.base.event_id,
          });
        }
      });
      // filter out any degenerate entries that could crash D3's InternMap
      const safeBarData=barData.filter(d=>d&&d.e&&d.lane);

      // Single data join — much faster than N appends
      barsG.selectAll('rect').data(safeBarData).join('rect')
        .attr('x',d=>d.x0)
        .attr('y',d=>{const pad=2,li=d.lane.h-pad*2,bh=Math.max(2,Math.min(li*0.55,12));return d.lane.y+pad+((d.e.base.event_id%8)/8)*(li-bh);})
        .attr('width',d=>Math.max(1.5,d.x1-d.x0))
        .attr('height',d=>Math.max(2,Math.min((d.lane.h-4)*0.55,12)))
        .attr('rx',.8)
        .attr('fill',d=>d.isSel?'#fbbf24':d.lane.color)
        .attr('opacity',d=>d.isSel?1:(d.hasC?.85:.22))
        .style('cursor','pointer')
        .on('mousemove',(evt,d)=>{
          if(!tooltip)return;
          const e=d.e,cc=data.cpuCorrs[e.base.event_id]?.length||0;
          tooltip.className='show';
          tooltip.innerHTML=`<div class="tt-type">${e.object_type.split('.').pop()}</div>
            <div class="tt-row"><span class="tt-k">size</span><span class="tt-v">${fmtB(e.alloc_size_bytes)}</span></div>
            <div class="tt-row"><span class="tt-k">at</span><span class="tt-v">+${fmtNs(e.base.timestamp_ns-startNs)}</span></div>
            ${cc>0?`<div class="tt-row"><span class="tt-k" style="color:var(--green)">GPU corr</span><span class="tt-v" style="color:var(--green)">${cc}×</span></div>`:''}
            ${(e.array_shape||[]).length>0?`<div class="tt-row"><span class="tt-k">shape</span><span class="tt-v">[${e.array_shape.join('×')}]</span></div>`:''}`;
          tooltip.style.left=`${evt.clientX+14}px`;tooltip.style.top=`${evt.clientY-10}px`;
        })
        .on('mouseleave',()=>tooltip&&(tooltip.className=''))
        .on('click',(evt,d)=>{evt.stopPropagation();onSelect({type:'cpu',data:d.e});});

      // GPU
      const visGpu=gpu.filter(e=>{const px=xScale(e.base.timestamp_ns);return px>=-2&&px<=innerW+2;});
      const ty2=cpuH2+2,th2=GPU_H2-4;
      visGpu.forEach(e=>{
        const px=xScale(e.base.timestamp_ns);
        const isK=e.base.event_type==='KERNEL',isPF=e.base.event_type==='PAGE_FAULT';
        const col=isK?'rgba(157,132,245,.85)':isPF?'rgba(245,101,101,.8)':'rgba(46,204,152,.85)';
        if(isK&&(e.kernel_duration_ns||0)>100){
          const kw=Math.max(1.5,xScale(e.base.timestamp_ns+(e.kernel_duration_ns||0))-px);
          gpuG.append('rect').attr('x',px).attr('y',ty2).attr('width',kw).attr('height',th2)
            .attr('fill','rgba(157,132,245,.1)').attr('stroke','rgba(157,132,245,.3)').attr('stroke-width',.5).attr('rx',.5).attr('pointer-events','none');
        }
        gpuG.append('text').attr('x',px).attr('y',ty2+th2/2)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('font-size',isPF?6:7).attr('fill',col).style('cursor','pointer')
          .text(isK?'▲':isPF?'✕':'▼')
          .on('mousemove',evt=>{
            if(!tooltip)return;
            tooltip.className='show';
            const isT=e.base.event_type==='TRANSFER';
            tooltip.innerHTML=`<div class="tt-type" style="color:${col}">GPU ${e.base.event_type}</div>
              ${isK?`<div class="tt-row"><span class="tt-k">kernel</span><span class="tt-v">${(e.kernel_name||'—').slice(0,24)}</span></div><div class="tt-row"><span class="tt-k">dur</span><span class="tt-v">${fmtNs(e.kernel_duration_ns)}</span></div>`:``}
              ${isT?`<div class="tt-row"><span class="tt-k">kind</span><span class="tt-v">${e.transfer_kind}</span></div><div class="tt-row"><span class="tt-k">size</span><span class="tt-v">${fmtB(e.transfer_size_bytes)}</span></div>`:''}
              ${isPF?`<div class="tt-row"><span class="tt-k">faults</span><span class="tt-v">${e.um_page_faults}</span></div>`:''}`;
            tooltip.style.left=`${evt.clientX+14}px`;tooltip.style.top=`${evt.clientY-10}px`;
          })
          .on('mouseleave',()=>tooltip&&(tooltip.className=''))
          .on('click',evt=>{evt.stopPropagation();onSelect({type:'gpu',data:e});});
        gpuG.append('line').attr('x1',px).attr('x2',px).attr('y1',0).attr('y2',cpuH2)
          .attr('stroke',col).attr('stroke-width',.4).attr('opacity',.18).style('pointer-events','none');
      });
    }

    renderBars(xBase);
    axisG.call(d3.axisBottom(xBase).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(3));
    styleAx(axisG);

    const zoom=d3.zoom().scaleExtent([1,1000]).translateExtent([[0,0],[W,H]])
      .on('zoom',evt=>{
        const nx=evt.transform.rescaleX(xBase);
        renderBars(nx);
        axisG.call(d3.axisBottom(nx).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(3));
        styleAx(axisG);
        const k=evt.transform.k;
        setZoomLabel(k<1.5?'1×':k<10?`${k.toFixed(1)}×`:`${k.toFixed(0)}×`);
        const[vt0,vt1]=nx.domain();
        setDomLabel(`+${fmtNs(vt0-startNs)} → +${fmtNs(vt1-startNs)}`);
      });
    zoomRef.current=zoom;
    svg.call(zoom);
    svg.on('click',()=>{onSelect(null);tooltip&&(tooltip.className='');});
    setZoomLabel('1×');setDomLabel('');
    }catch(err){console.error('[Timeline] render error:',err);}
  },[data,filter,filteredAllocs,lanes,selected]);

  const resetZoom=useCallback(()=>{if(!svgRef.current||!zoomRef.current)return;d3.select(svgRef.current).transition().duration(280).call(zoomRef.current.transform,d3.zoomIdentity);setZoomLabel('1×');setDomLabel('');},[]);
  const zIn=useCallback(()=>{if(svgRef.current&&zoomRef.current)d3.select(svgRef.current).transition().duration(200).call(zoomRef.current.scaleBy,2);},[]);
  const zOut=useCallback(()=>{if(svgRef.current&&zoomRef.current)d3.select(svgRef.current).transition().duration(200).call(zoomRef.current.scaleBy,.5);},[]);

  return(
    <div id="tl-outer">
      <div style={{height:28,background:'var(--panel)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',padding:'0 10px',gap:4,flexShrink:0}}>
        <div style={{display:'flex',gap:3}}>
          <button className="zb" onClick={zOut}>−</button>
          <button className="zb" onClick={zIn}>+</button>
          <button className="zb act" onClick={resetZoom}>⟳</button>
        </div>
        <span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)',marginLeft:4}}>{zoomLabel}</span>
        {domLabel&&<span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--border2)',marginLeft:8}}>{domLabel}</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--dim)'}}>scroll zoom · drag pan</span>
          {[['▲','rgba(157,132,245,.85)','kernel'],['▼','rgba(46,204,152,.85)','xfer'],['✕','rgba(245,101,101,.8)','fault']].map(([s,c,l])=>(
            <span key={l} style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--dim)',display:'flex',gap:3,alignItems:'center'}}><span style={{color:c}}>{s}</span>{l}</span>
          ))}
          <span style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--dim)',display:'flex',gap:3,alignItems:'center'}}><span style={{display:'inline-block',width:14,height:2,background:'rgba(245,197,66,.5)',borderRadius:1}}/> RSS</span>
        </div>
      </div>
      <div id="timeline-wrap" ref={wrapRef}>
        {!data&&<div className="empty"><div className="empty-t">No session loaded</div><div className="empty-s">Load a session.json to begin</div></div>}
        <svg ref={svgRef}/>
      </div>
      {data&&<div id="time-scrollbar"><div id="time-scrollbar-track"/><div id="time-scrollbar-thumb"/></div>}
    </div>
  );
}

// ── Pressure strip ─────────────────────────────────────────────────────────────
// Fixed: uses a bucketed histogram (O(n)) instead of one rect per alloc (O(n DOM))
function PressureStrip({data}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data)return;
    const svg=d3.select(ref.current);svg.selectAll('*').remove();
    const W=ref.current.clientWidth||800,H=56,ML=52,MR=12,MT=3,MB=14;
    const{allocs,gpu,startNs,endNs,rssEvents,maxRss}=data;
    const x=d3.scaleLinear().domain([startNs,endNs]).range([ML,W-MR]);
    const innerW=W-ML-MR;

    // Build density histogram: N_BUCKETS columns, count per type
    const N=Math.min(innerW,200);
    const buckets=new Array(N).fill(null).map(()=>({}));
    allocs.forEach(e=>{
      if(!e||!e.base)return;
      const b=Math.min(N-1,Math.floor(((e.base.timestamp_ns-startNs)/(endNs-startNs||1))*N));
      const t=e.object_type||'?';
      buckets[b][t]=(buckets[b][t]||0)+1;
    });
    const maxBucket=Math.max(1,...buckets.map(b=>Object.values(b).reduce((s,v)=>s+v,0)));
    const bw=innerW/N;
    const barH=10;

    buckets.forEach((b,i)=>{
      const total=Object.values(b).reduce((s,v)=>s+v,0);
      if(!total)return;
      const h=Math.max(1,Math.round((total/maxBucket)*barH));
      // Just draw a single blended rect per bucket (fast)
      const types=Object.keys(b);
      const col=types.length===1?tc(types[0]):'#41b3f5';
      svg.append('rect')
        .attr('x',ML+i*bw).attr('y',MT+(barH-h)).attr('width',Math.ceil(bw)).attr('height',h)
        .attr('fill',col).attr('opacity',.55).attr('rx',.5);
    });

    // RSS curve
    if(rssEvents.length>1&&maxRss>0){
      const yRss=d3.scaleLinear().domain([0,maxRss]).range([H-MB,MT]);
      const line=d3.line().x(d=>x(d.base.timestamp_ns)).y(d=>yRss(d.peak_rss_kb)).curve(d3.curveMonotoneX);
      svg.append('path').datum(rssEvents).attr('d',line).attr('fill','none').attr('stroke','rgba(245,197,66,.55)').attr('stroke-width',1.4);
    }

    // GPU ticks
    gpu.forEach(e=>{
      const px=x(e.base.timestamp_ns);
      const isK=e.base.event_type==='KERNEL',isPF=e.base.event_type==='PAGE_FAULT';
      svg.append('line').attr('x1',px).attr('x2',px).attr('y1',MT).attr('y2',H-MB-1)
        .attr('stroke',isK?'rgba(157,132,245,.5)':isPF?'rgba(245,101,101,.5)':'rgba(46,204,152,.5)').attr('stroke-width',.7);
    });

    const axG=svg.append('g').attr('transform',`translate(0,${H-MB})`);
    axG.call(d3.axisBottom(x).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(2));
    axG.selectAll('text').attr('font-family','JetBrains Mono,monospace').attr('font-size',6).attr('fill','#3d4f68');
    axG.select('.domain').attr('stroke','#1c2235');axG.selectAll('.tick line').attr('stroke','#1c2235');
  },[data]);
  return <div id="pressure-strip"><svg ref={ref} style={{width:'100%',height:56}}/></div>;
}

// ── Graph view ──────────────────────────────────────────────────────────────────
function GraphView({data,filter,onSelect}){
  const wrapRef=useRef(null);
  const svgRef=useRef(null);
  const simRef=useRef(null);
  const [mode,setMode]=useState('bubbles');

  useEffect(()=>{
    if(!wrapRef.current)return;
    try{
    const tooltip=document.getElementById('tl-tooltip');
    const tip=(evt,html)=>{if(!tooltip)return;tooltip.className='show';tooltip.innerHTML=html;tooltip.style.left=`${evt.clientX+14}px`;tooltip.style.top=`${evt.clientY-10}px`;};
    const tipHide=()=>{if(tooltip)tooltip.className='';};

    if(simRef.current){simRef.current.stop();simRef.current=null;}
    const W=wrapRef.current.clientWidth||700;
    const H=wrapRef.current.clientHeight||400;
    const svg=d3.select(svgRef.current);
    svg.selectAll('*').remove();
    svg.attr('width',W).attr('height',H);

    if(!data){return;}

    if(mode==='bubbles'){
      const types=filter?data.typeList.filter(t=>t.type===filter):data.typeList.slice(0,Math.min(40,data.typeList.length));
      if(!types.length){svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('font-family','JetBrains Mono,monospace').attr('font-size',11).attr('fill','var(--dim)').text('No type data');return;}
      const maxB=Math.max(1,...types.map(t=>t.totalBytes));
      const nodes=types.map(t=>({
        id:t.type,label:t.type.split('.').pop(),
        r:Math.max(10,Math.sqrt((t.totalBytes/maxB)*3600)),
        bytes:t.totalBytes,count:t.count,color:tc(t.type),
        isGpu:t.corrCount>0,ev:t.events[0]||null,
      }));

      // Edges: types sharing a GPU correlation
      const gToTypes={};
      data.corrs.forEach(c=>{
        const cpu=data.allocs.find(e=>e.base.event_id===c.cpu_event_id);
        if(!cpu)return;
        (gToTypes[c.gpu_event_id]||(gToTypes[c.gpu_event_id]=new Set())).add(cpu.object_type);
      });
      const edgeSet=new Set();const edges=[];
      Object.values(gToTypes).forEach(s=>{
        const arr=[...s].filter(t=>nodes.find(n=>n.id===t));
        for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){
          const k=[arr[i],arr[j]].sort().join('\x00');
          if(!edgeSet.has(k)){edgeSet.add(k);edges.push({source:arr[i],target:arr[j]});}
        }
      });

      const sim=d3.forceSimulation(nodes)
        .force('link',d3.forceLink(edges).id(d=>d.id).distance(100).strength(0.2))
        .force('charge',d3.forceManyBody().strength(d=>-d.r*14))
        .force('center',d3.forceCenter(W/2,H/2))
        .force('collision',d3.forceCollide().radius(d=>d.r+5));
      simRef.current=sim;

      const g=svg.append('g');
      const zoom=d3.zoom().scaleExtent([0.25,6]).on('zoom',e=>g.attr('transform',e.transform));
      svg.call(zoom);

      const link=g.append('g').selectAll('line').data(edges).join('line')
        .attr('stroke','rgba(65,179,245,.1)').attr('stroke-width',1).attr('stroke-dasharray','4,3');

      const node=g.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
        .call(d3.drag()
          .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
          .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
          .on('end',  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

      node.append('circle').attr('r',d=>d.r)
        .attr('fill',d=>`${d.color}14`)
        .attr('stroke',d=>d.color)
        .attr('stroke-width',d=>d.isGpu?2:0.7)
        .attr('stroke-dasharray',d=>d.isGpu?'none':'4,3');

      node.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-family','JetBrains Mono,monospace')
        .attr('font-size',d=>Math.max(8,Math.min(12,d.r*0.52)))
        .attr('fill',d=>d.color).attr('pointer-events','none')
        .text(d=>d.label.length>11?d.label.slice(0,10)+'…':d.label);

      node.append('text').attr('text-anchor','middle').attr('dy',d=>d.r+10)
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',7)
        .attr('fill','var(--dim)').attr('pointer-events','none')
        .text(d=>fmtN(d.count));

      node.on('mousemove',(evt,d)=>tip(evt,
          `<div class="tt-type">${d.label}</div>
           <div class="tt-row"><span class="tt-k">count</span><span class="tt-v">${fmtN(d.count)}</span></div>
           <div class="tt-row"><span class="tt-k">bytes</span><span class="tt-v">${fmtB(d.bytes)}</span></div>
           ${d.isGpu?'<div class="tt-row"><span class="tt-k" style="color:var(--green)">GPU-corr</span><span class="tt-v" style="color:var(--green)">✓</span></div>':''}`)
        ).on('mouseleave',tipHide)
        .on('click',(_,d)=>{if(d.ev)onSelect({type:'cpu',data:d.ev});});

      sim.on('tick',()=>{
        link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        node.attr('transform',d=>`translate(${Math.max(d.r,Math.min(W-d.r,d.x??W/2))},${Math.max(d.r,Math.min(H-d.r,d.y??H/2))})`);
      });

    } else {
      // CPU↔GPU bipartite
      const hardCorrs=data.corrs.filter(c=>c.confidence==='HARD').slice(0,60);
      if(!hardCorrs.length){
        svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
          .attr('font-family','JetBrains Mono,monospace').attr('font-size',11).attr('fill','var(--dim)')
          .text('No HARD correlations in this session');
        return;
      }
      const cpuSet=new Set(hardCorrs.map(c=>c.cpu_event_id));
      const gpuSet=new Set(hardCorrs.map(c=>c.gpu_event_id));
      const cpuEvs=data.allocs.filter(e=>cpuSet.has(e.base.event_id));
      const gpuEvs=data.gpu.filter(e=>gpuSet.has(e.base.event_id));

      const nodes=[
        ...cpuEvs.map(e=>({id:'c'+e.base.event_id,side:'cpu',color:tc(e.object_type),
          label:e.object_type.split('.').pop().slice(0,9),sub:fmtB(e.alloc_size_bytes),ev:e})),
        ...gpuEvs.map(e=>({id:'g'+e.base.event_id,side:'gpu',
          color:e.base.event_type==='KERNEL'?'var(--purple)':'var(--green)',
          label:(e.base.event_type==='KERNEL'?(e.kernel_name||'kernel').split('::').pop().slice(0,9):(e.transfer_kind||'xfer').slice(0,9)),
          sub:e.base.event_type==='KERNEL'?fmtNs(e.kernel_duration_ns):fmtB(e.transfer_size_bytes),ev:e})),
      ];
      const edges=hardCorrs
        .filter(c=>cpuEvs.find(e=>e.base.event_id===c.cpu_event_id)&&gpuEvs.find(e=>e.base.event_id===c.gpu_event_id))
        .map(c=>({source:'c'+c.cpu_event_id,target:'g'+c.gpu_event_id}));

      const sim=d3.forceSimulation(nodes)
        .force('link',d3.forceLink(edges).id(d=>d.id).distance(180).strength(0.4))
        .force('charge',d3.forceManyBody().strength(-90))
        .force('center',d3.forceCenter(W/2,H/2))
        .force('collision',d3.forceCollide(26))
        .force('xSide',d3.forceX(d=>d.side==='cpu'?W*0.27:W*0.73).strength(0.3));
      simRef.current=sim;

      const g=svg.append('g');
      const zoom=d3.zoom().scaleExtent([0.25,6]).on('zoom',e=>g.attr('transform',e.transform));
      svg.call(zoom);

      svg.append('text').attr('x',W*0.27).attr('y',20).attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
        .attr('fill','rgba(65,179,245,.3)').attr('letter-spacing','3').text('CPU ALLOCS');
      svg.append('text').attr('x',W*0.73).attr('y',20).attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
        .attr('fill','rgba(46,204,152,.3)').attr('letter-spacing','3').text('GPU EVENTS');

      const link=g.append('g').selectAll('line').data(edges).join('line')
        .attr('stroke','rgba(46,204,152,.3)').attr('stroke-width',1.2).attr('stroke-dasharray','5,4');

      const node=g.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
        .call(d3.drag()
          .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
          .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
          .on('end',  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

      node.append('rect').attr('x',-22).attr('y',-14).attr('width',44).attr('height',28).attr('rx',5)
        .attr('fill',d=>d.side==='cpu'?'rgba(65,179,245,.07)':'rgba(46,204,152,.06)')
        .attr('stroke',d=>d.color).attr('stroke-width',0.8);
      node.append('text').attr('text-anchor','middle').attr('dy',-3)
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',8)
        .attr('fill',d=>d.color).attr('pointer-events','none').text(d=>d.label);
      node.append('text').attr('text-anchor','middle').attr('dy',9)
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',7)
        .attr('fill','var(--dim)').attr('pointer-events','none').text(d=>d.sub);

      node.on('mousemove',(evt,d)=>tip(evt,
          `<div class="tt-type" style="color:${d.color}">${d.label}</div>
           <div class="tt-row"><span class="tt-k">side</span><span class="tt-v">${d.side.toUpperCase()}</span></div>
           <div class="tt-row"><span class="tt-k">${d.side==='cpu'?'size':'dur'}</span><span class="tt-v">${d.sub}</span></div>`)
        ).on('mouseleave',tipHide)
        .on('click',(_,d)=>onSelect({type:d.side,data:d.ev}));

      sim.on('tick',()=>{
        link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        node.attr('transform',d=>`translate(${d.x??W/2},${d.y??H/2})`);
      });
    }
    }catch(err){console.error('[GraphView] render error:',err);}
  },[data,filter,mode]);

  useEffect(()=>()=>{if(simRef.current){simRef.current.stop();simRef.current=null;}},[]);

  return(
    <div id="graph-outer">
      <div className="graph-toolbar">
        <button className={`graph-mode-btn${mode==='bubbles'?' on':''}`} onClick={()=>setMode('bubbles')}>Type Bubbles</button>
        <button className={`graph-mode-btn${mode==='corr'?' on':''}`} onClick={()=>setMode('corr')}>CPU↔GPU Corr</button>
        <span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)',marginLeft:6}}>drag nodes · scroll zoom</span>
        <div className="graph-legend">
          {mode==='bubbles'&&<>
            <div className="gleg"><div className="gleg-dot" style={{background:'var(--cpu)'}}/> type</div>
            <div className="gleg"><div className="gleg-dot" style={{background:'var(--cpu)',boxShadow:'0 0 0 2px var(--cpu)',borderRadius:'50%'}}/> GPU-corr</div>
            <div className="gleg"><div className="gleg-dash" style={{borderColor:'rgba(65,179,245,.35)'}}/> shared op</div>
          </>}
          {mode==='corr'&&<>
            <div className="gleg"><div className="gleg-dot" style={{background:'var(--cpu)'}}/> CPU alloc</div>
            <div className="gleg"><div className="gleg-dot" style={{background:'var(--green)'}}/> GPU event</div>
            <div className="gleg"><div className="gleg-dash" style={{borderColor:'rgba(46,204,152,.45)'}}/> HARD match</div>
          </>}
        </div>
      </div>
      <div id="graph-wrap" ref={wrapRef}>
        {!data&&<div className="empty"><div className="empty-t">No session loaded</div></div>}
        <svg ref={svgRef}/>
      </div>
    </div>
  );
}

// ── Mini bar chart ─────────────────────────────────────────────────────────────
function MiniBarChart({data,colorKey}){
  const max=Math.max(1,...Object.values(data));
  return(<div className="card"><div className="card-title">{colorKey}</div>
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      {Object.entries(data).map(([k,v])=>(
        <div key={k} style={{display:'flex',alignItems:'center',gap:7}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',width:46,flexShrink:0,textAlign:'right'}}>{k}</div>
          <div style={{flex:1,height:12,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${(v/max)*100}%`,height:'100%',background:'var(--cpu)',borderRadius:2,opacity:.6}}/>
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text)',width:32,textAlign:'right'}}>{fmtN(v)}</div>
        </div>
      ))}
    </div>
  </div>);
}

function RateChart({data}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data)return;
    const el=ref.current,W=el.clientWidth||240,H=60;
    const svg=d3.select(el);svg.selectAll('*').remove();svg.attr('width',W).attr('height',H);
    const rs=data.rateSeries,max=Math.max(1,...rs.map(d=>d.count));
    const x=d3.scaleLinear().domain([0,rs.length-1]).range([0,W]);
    const y=d3.scaleLinear().domain([0,max]).range([H-2,2]);
    svg.append('path').datum(rs).attr('d',d3.area().x((_,i)=>x(i)).y0(H).y1(d=>y(d.count)).curve(d3.curveMonotoneX)).attr('fill','rgba(65,179,245,.08)');
    svg.append('path').datum(rs).attr('d',d3.line().x((_,i)=>x(i)).y(d=>y(d.count)).curve(d3.curveMonotoneX)).attr('fill','none').attr('stroke','rgba(65,179,245,.55)').attr('stroke-width',1.4);
  },[data]);
  return(<div className="card"><div className="card-title">Alloc Rate Over Time</div><svg ref={ref} style={{width:'100%',height:60,display:'block'}}/></div>);
}

function CallsiteList({data,onSelect}){
  if(!data||!data.topCallsites.length)return(<div style={{padding:'24px 12px',textAlign:'center'}}><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)'}}>No callstack data</div></div>);
  const max=data.topCallsites[0]?.bytes||1;
  return(<div>{data.topCallsites.slice(0,10).map((cs,i)=>{
    const parts=cs.site.split('/'),fn=parts[parts.length-1],[file,line]=fn.split(':');
    return(<div key={i} style={{padding:'8px 11px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .08s'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--card)'}
      onMouseLeave={e=>e.currentTarget.style.background=''}
      onClick={()=>onSelect({type:'callsite',data:cs})}>
      <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:2}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--cpu)',fontWeight:500}}>{file}</span>
        {line&&<span style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>:{line}</span>}
        <span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',fontWeight:500}}>{fmtB(cs.bytes)}</span>
      </div>
      <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)',marginBottom:3}}>{cs.types.slice(0,3).join(', ')} · {cs.count}</div>
      <div style={{height:2,background:'var(--border)',borderRadius:1,overflow:'hidden'}}>
        <div style={{width:`${(cs.bytes/max)*100}%`,height:'100%',background:'rgba(65,179,245,.35)',borderRadius:1}}/>
      </div>
    </div>);
  })}</div>);
}

function GpuPanel({data}){
  if(!data||!data.gpu.length)return null;
  const{kernels,transfers,xferBytes,kDur,maxDevMem,umBytesH2D,umBytesD2H,totalPageFaults}=data;
  const kDurs={};kernels.forEach(k=>{const n=k.kernel_name||'?';kDurs[n]=(kDurs[n]||0)+(k.kernel_duration_ns||0);});
  const topK=Object.entries(kDurs).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return(<div className="card" style={{margin:'0 10px 8px'}}>
    <div className="card-title">GPU Summary</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
      {[{l:'Kernels',v:kernels.length,c:'var(--purple)'},{l:'Transfers',v:transfers.length,c:'var(--green)'},{l:'Data Moved',v:fmtB(xferBytes),c:'var(--cpu)'},{l:'Kernel Time',v:fmtNs(kDur),c:'var(--yellow)'},{l:'UM H→D',v:fmtB(umBytesH2D),c:'var(--teal)'},{l:'UM D→H',v:fmtB(umBytesD2H),c:'var(--orange)'},{l:'Page Faults',v:fmtN(totalPageFaults),c:'var(--red)'},{l:'Peak Dev Mem',v:maxDevMem>0?`${maxDevMem}MB`:'—',c:'var(--text2)'}].map(({l,v,c})=>(
        <div key={l} style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:5,padding:'6px 9px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:500,color:c}}>{v}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--dim)',letterSpacing:'.06em',textTransform:'uppercase',marginTop:1}}>{l}</div>
        </div>
      ))}
    </div>
    {topK.map(([n,d])=>(
      <div key={n} style={{display:'flex',gap:6,marginBottom:3,alignItems:'baseline'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--purple)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--yellow)',flexShrink:0}}>{fmtNs(d)}</div>
      </div>
    ))}
  </div>);
}

// ── Inspector ──────────────────────────────────────────────────────────────────
function Inspector({selected,data,session}){
  if(!selected)return(<div className="scrollable"><div style={{padding:'36px 14px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)',lineHeight:2.2}}>
    Select an item<br/>to inspect it.<br/><br/>
    <span style={{fontSize:9,color:'var(--border2)'}}>Click a bar, GPU marker,<br/>type, insight, or callsite.</span>
  </div></div>);
  const Row=({k,v,cls})=><div className="irow"><span className="ik">{k}</span><span className={`iv${cls?' '+cls:''}`}>{v??'—'}</span></div>;
  const Sec=({title,children})=><div className="isec"><div className="isec-t">{title}</div>{children}</div>;
  const{type,sel}=selected;const baseNs=session?.start_time_ns||0;

  if(type==='cpu'){
    const e=sel,d=data?.deallocMap[e.alloc_address];
    const lifetime=e.lifetime_ns>0?e.lifetime_ns:(d?d.base.timestamp_ns-e.base.timestamp_ns:null);
    const corrs=data?.cpuCorrs[e.base.event_id]||[];
    const sessD=session?(session.end_time_ns-session.start_time_ns):1;
    const lifePct=lifetime?Math.min(100,lifetime/sessD*100):0;
    return(<div className="scrollable"><div style={{padding:'12px'}} className="anim-in">
      <span className="badge badge-cpu">CPU Allocation</span>
      <Sec title="Object"><Row k="type" v={e.object_type} cls="a"/><Row k="module" v={e.module_name||'—'} cls="d"/><Row k="event_id" v={e.base.event_id} cls="d"/><Row k="gc gen" v={e.gc_generation===-1?'−1 (non-GC)':e.gc_generation} cls={e.gc_generation===-1?'p':''}/><Row k="refs" v={e.ref_count}/></Sec>
      <Sec title="Memory"><Row k="address" v={fmtAddr(e.alloc_address)} cls="d"/><Row k="size" v={fmtB(e.alloc_size_bytes)} cls="g"/>{(e.buffer_nbytes||0)>0&&<Row k="buffer" v={fmtB(e.buffer_nbytes)} cls="y"/>}{(e.pinned_address||0)>0&&<Row k="data ptr" v={fmtAddr(e.pinned_address)} cls="d"/>}{(e.peak_rss_kb||0)>0&&<Row k="RSS" v={fmtB(e.peak_rss_kb*1024)} cls="d"/>}</Sec>
      {(e.array_shape||[]).length>0&&<Sec title="Array"><Row k="shape" v={`[${e.array_shape.join(' × ')}]`} cls="y"/><Row k="dtype" v={e.array_dtype||'—'} cls="g"/></Sec>}
      <Sec title="Lifetime"><Row k="allocated" v={'+'+fmtNs(e.base.timestamp_ns-baseNs)} cls="d"/><Row k="freed" v={d?'+'+fmtNs(d.base.timestamp_ns-baseNs):'still live'} cls={d?'d':'y'}/><Row k="duration" v={lifetime?fmtNs(lifetime):'—'} cls="g"/>{lifetime&&<div style={{height:3,background:'var(--border)',borderRadius:2,margin:'3px 0 5px',overflow:'hidden'}}><div style={{width:`${lifePct}%`,height:'100%',background:'var(--green)',borderRadius:2}}/></div>}</Sec>
      {corrs.length>0&&<Sec title={`GPU Correlations (${corrs.length})`}>{corrs.slice(0,4).map((c,i)=>{const ge=c.gpuEvent;return(<div key={i} className={`cpill ${c.confidence.toLowerCase()}`}>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}><span className={`badge ${c.confidence==='HARD'?'badge-hard':'badge-weak'}`} style={{marginBottom:0,fontSize:7,padding:'2px 6px'}}>{c.confidence}</span><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)'}}>{c.match_reason}</span><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',marginLeft:'auto'}}>Δ{fmtNs(c.latency_ns)}</span></div>
        {ge&&<><div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text)',marginBottom:2}}>{ge.base.event_type}: {ge.kernel_name||fmtB(ge.transfer_size_bytes)}</div>{ge.kernel_duration_ns>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>dur {fmtNs(ge.kernel_duration_ns)} · stream {ge.stream_id??'—'}</div>}{(ge.grid?.x||0)>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>grid {ge.grid.x}×{ge.grid.y} blk {ge.block.x}×{ge.block.y}</div>}</>}
      </div>)})}</Sec>}
      {(e.callstack||[]).length>0&&<Sec title="Call Stack">{e.callstack.slice(0,8).map((f,i)=>{const isU=!f.includes('/lib/python')&&!f.includes('tracemalloc');return<div key={i} className={`frame ${isU?'u':''}`}>{f.split('/').slice(-2).join('/')}</div>})}</Sec>}
    </div></div>);
  }

  if(type==='gpu'){
    const e=sel,isT=e.base.event_type==='TRANSFER',isK=e.base.event_type==='KERNEL',isPF=e.base.event_type==='PAGE_FAULT';
    const relCPU=(data?.corrs||[]).filter(c=>c.gpu_event_id===e.base.event_id);
    return(<div className="scrollable"><div style={{padding:'12px'}} className="anim-in">
      <span className="badge badge-gpu">GPU {e.base.event_type}</span>
      <Sec title="Identity"><Row k="event_id" v={e.base.event_id} cls="d"/><Row k="device" v={`GPU:${e.device_id??0}`}/><Row k="stream" v={e.stream_id??'—'}/><Row k="at" v={'+'+fmtNs(e.base.timestamp_ns-baseNs)} cls="d"/></Sec>
      {isT&&<Sec title="Transfer"><Row k="kind" v={e.transfer_kind} cls="y"/><Row k="size" v={fmtB(e.transfer_size_bytes)} cls="g"/><Row k="src" v={fmtAddr(e.src_address)} cls="d"/><Row k="dst" v={fmtAddr(e.dst_address)} cls="d"/>{(e.um_bytes_htod||0)>0&&<Row k="UM H→D" v={fmtB(e.um_bytes_htod)} cls="a"/>}{(e.um_bytes_dtoh||0)>0&&<Row k="UM D→H" v={fmtB(e.um_bytes_dtoh)} cls="o"/>}</Sec>}
      {isK&&<><Sec title="Kernel"><Row k="name" v={e.kernel_name||'—'} cls="p"/><Row k="duration" v={fmtNs(e.kernel_duration_ns)} cls="g"/></Sec>{(e.grid?.x||0)>0&&<Sec title="Launch Config"><Row k="grid" v={`${e.grid.x}×${e.grid.y}×${e.grid.z}`} cls="y"/><Row k="block" v={`${e.block.x}×${e.block.y}×${e.block.z}`} cls="y"/><Row k="regs" v={e.registers_per_thread||0} cls="o"/><Row k="shmem" v={fmtB(e.shared_mem_bytes||0)} cls="d"/></Sec>}</>}
      {isPF&&<Sec title="Page Faults"><Row k="faults" v={e.um_page_faults} cls="r"/></Sec>}
      {relCPU.length>0&&<Sec title={`Correlated CPU (${relCPU.length})`}>{relCPU.slice(0,3).map((c,i)=>(<div key={i} className="cpill" style={{marginBottom:4}}><div style={{display:'flex',gap:5,marginBottom:1}}><span className={`badge ${c.confidence==='HARD'?'badge-hard':'badge-weak'}`} style={{marginBottom:0,fontSize:7,padding:'2px 6px'}}>{c.confidence}</span><span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',marginLeft:'auto'}}>Δ{fmtNs(c.latency_ns)}</span></div><div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>{c.match_reason}</div></div>))}</Sec>}
    </div></div>);
  }

  if(type==='insight'){const ins=sel;return(<div className="scrollable"><div style={{padding:'12px'}} className="anim-in">
    <span className="badge badge-grp">{ins.sev==='hi'?'HIGH':ins.sev==='md'?'MED':ins.sev==='lo'?'LOW':'INFO'}</span>
    <div style={{fontSize:26,marginBottom:8}}>{ins.icon}</div>
    <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>{ins.title}</div>
    <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:10}}>{ins.desc}</div>
    <div style={{fontFamily:'var(--mono)',fontSize:11,color:ins.color}}>{ins.stat}</div>
    {ins.burst&&<div style={{marginTop:12}}><div className="isec-t">Burst</div><div className="irow"><span className="ik">type</span><span className="iv a">{ins.burst.type}</span></div><div className="irow"><span className="ik">count</span><span className="iv g">{ins.burst.count}</span></div><div className="irow"><span className="ik">each</span><span className="iv y">{fmtB(ins.burst.size)}</span></div><div className="irow"><span className="ik">total</span><span className="iv g">{fmtB(ins.burst.count*ins.burst.size)}</span></div></div>}
  </div></div>);}

  if(type==='callsite'){const cs=sel;return(<div className="scrollable"><div style={{padding:'12px'}} className="anim-in">
    <span className="badge badge-cpu">Call Site</span>
    <Sec title="Location"><Row k="file" v={cs.site.split('/').slice(-2).join('/')} cls="a"/><Row k="allocs" v={cs.count} cls="g"/><Row k="bytes" v={fmtB(cs.bytes)} cls="y"/></Sec>
    <Sec title="Types Allocated Here">{cs.types.map(t=><div key={t} className="frame u">{t}</div>)}</Sec>
  </div></div>);}

  return<div className="scrollable"><div style={{padding:'36px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>—</div></div>;
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState(null);
  const[view,setView]=useState('timeline');
  const[search,setSearch]=useState('');
  const data=useMemo(()=>analyzeSession(session),[session]);

  const loadFile=useCallback(file=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>{try{const s=JSON.parse(e.target.result);setSession(s);setSelected(null);setFilter(null);setSearch('');}catch(err){alert('Invalid JSON: '+err.message);}};
    r.readAsText(file);
  },[]);

  useEffect(()=>{
    const ov=document.getElementById('drop-ov');
    const over=e=>{e.preventDefault();ov.classList.add('show');};
    const leave=e=>{if(!e.relatedTarget)ov.classList.remove('show');};
    const drop=e=>{e.preventDefault();ov.classList.remove('show');loadFile(e.dataTransfer?.files?.[0]);};
    document.addEventListener('dragover',over);document.addEventListener('dragleave',leave);document.addEventListener('drop',drop);
    return()=>{document.removeEventListener('dragover',over);document.removeEventListener('dragleave',leave);document.removeEventListener('drop',drop);};
  },[loadFile]);

  useEffect(()=>{
    const inp=document.getElementById('file-input'),h=e=>loadFile(e.target.files[0]);
    inp.addEventListener('change',h);return()=>inp.removeEventListener('change',h);
  },[loadFile]);

  const kpis=useMemo(()=>{
    if(!data)return[];
    const hard=data.corrs.filter(c=>c.confidence==='HARD').length;
    return[{v:fmtN(data.allocs.length),l:'allocs',cls:'b'},{v:fmtN(data.deallocs.length),l:'freed',cls:''},{v:fmtB(data.totalBytes),l:'bytes',cls:'g'},{v:data.gpu.length,l:'gpu events',cls:'p'},{v:hard,l:'hard corr',cls:hard>0?'g':''},{v:fmtNs(data.dur),l:'duration',cls:''}];
  },[data]);

  const onSelect=useCallback(s=>setSelected(s?{type:s.type,sel:s.data}:null),[]);

  return<>
    <div id="topbar">
      <span className="logo">HPC<span className="s">/</span>Mem</span>
      {kpis.length>0&&<div className="vdiv"/>}
      {kpis.map((k,i)=><div key={i} className="kpi"><div className={`kpi-v ${k.cls}`}>{k.v}</div><div className="kpi-l">{k.l}</div></div>)}
      <div className="spacer"/>
      <button className="load-btn" onClick={()=>document.getElementById('file-input').click()}>Load JSON</button>
    </div>
    <div id="app">
      <div className="panel" style={{borderRight:'1px solid var(--border)'}}>
        <div className="ph"><span className="ph-title">Object Types</span><span className="ph-count">{data?fmtN(data.typeList.length)+' types':''}</span></div>
        <TypeList data={data} filter={filter} onFilter={setFilter} searchQ={search} onSearch={setSearch}/>
      </div>

      <div className="panel">
        <div id="center-nav">
          <button className={`tab ${view==='timeline'?'on':''}`} onClick={()=>setView('timeline')}>Timeline</button>
          <button className={`tab ${view==='graph'?'on':''}`} onClick={()=>setView('graph')}>Graph</button>
          <button className={`tab ${view==='insights'?'on':''}`} onClick={()=>setView('insights')}>
            Insights{data&&data.insights.length>0?` (${data.insights.length})`:''}</button>
          <button className={`tab ${view==='callsites'?'on':''}`} onClick={()=>setView('callsites')}>Call Sites</button>
        </div>

        {view==='timeline'&&<>
          <Timeline data={data} filter={filter} onSelect={onSelect} selected={selected}/>
          <PressureStrip data={data}/>
        </>}

        {view==='graph'&&<GraphView data={data} filter={filter} onSelect={onSelect}/>}

        {view==='insights'&&<div className="scrollable">
          {data&&<div className="wc"><div className="wc-t">Session Summary</div><div className="wc-b">
            <strong>{fmtNs(data.dur)}</strong> · <span className="hi">{fmtB(data.totalBytes)}</span> across {fmtN(data.allocs.length)} allocs.{' '}
            Top: <strong>{data.typeList.slice(0,3).map(t=>t.type.split('.').pop()).join(', ')}</strong>.{' '}
            {data.allocs.length-data.deallocs.length>0?<><span className="hi">{fmtN(data.allocs.length-data.deallocs.length)}</span> still live. </>:'All freed. '}
            {data.gpu.length>0&&<>GPU: <strong>{data.kernels.length}</strong> kernels · <strong>{fmtB(data.xferBytes)}</strong>.</>}
          </div></div>}
          {data?.insights.map(ins=>(
            <div key={ins.id} className={`insight ${selected?.sel?.id===ins.id?'sel':''}`}
              style={{borderLeftColor:ins.sev==='hi'?ins.color:'var(--border2)'}}
              onClick={()=>onSelect({type:'insight',data:ins})}>
              <div className="insight-head"><span className="insight-icon">{ins.icon}</span><span className="insight-type">{ins.title}</span><span className={`ibadge ib-${ins.sev}`}>{ins.sev==='hi'?'high':ins.sev==='md'?'med':ins.sev==='lo'?'low':'info'}</span></div>
              <div className="insight-desc">{ins.desc}</div>
              <div className="insight-stat" style={{color:ins.color}}>{ins.stat}</div>
              <div className="ibar"><div className="ibar-fill" style={{width:`${(ins.pct||0)*100}%`,background:ins.color}}/></div>
            </div>
          ))}
          {data&&!data.insights.length&&<div style={{padding:'24px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>No significant issues detected.</div>}
          {!data&&<div style={{padding:'24px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>Load a session to see insights.</div>}
          {data&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
            <MiniBarChart data={Object.fromEntries([['non-GC',parseInt(data.genCounts['-1']||0)],['gen 0',parseInt(data.genCounts['0']||0)],['gen 1',parseInt(data.genCounts['1']||0)],['gen 2',parseInt(data.genCounts['2']||0)]].filter(([,v])=>v>0))} colorKey="GC Generations"/>
            <MiniBarChart data={data.sizeBuckets} colorKey="Size Distribution"/>
          </div>}
          {data&&<RateChart data={data}/>}
        </div>}

        {view==='callsites'&&<div className="scrollable">
          <CallsiteList data={data} onSelect={onSelect}/>
          <GpuPanel data={data}/>
        </div>}
      </div>

      <div className="panel" style={{borderLeft:'1px solid var(--border)'}}>
        <div className="ph"><span className="ph-title">Inspector</span>
          {selected&&<button onClick={()=>setSelected(null)} style={{marginLeft:'auto',background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontFamily:'var(--mono)',fontSize:11,padding:'2px 4px'}}>✕</button>}
        </div>
        <Inspector selected={selected} data={data} session={session}/>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
