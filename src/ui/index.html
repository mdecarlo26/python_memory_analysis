<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HPC Memory Profiler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #080a0f;
  --s1:       #0d1018;
  --s2:       #121620;
  --s3:       #191e2a;
  --s4:       #1e2535;
  --border:   #1e2535;
  --border2:  #2a3347;
  --text:     #b8c4d8;
  --dim:      #3d4f6a;
  --mid:      #607090;
  --muted:    #4a5e7a;

  --cpu:    #38bdf8;
  --green:  #34d399;
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --red:    #f87171;
  --orange: #fb923c;
  --pink:   #f472b6;
  --teal:   #2dd4bf;

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
#topbar {
  height: 46px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
}
.logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--cpu);
  letter-spacing: .18em;
  text-transform: uppercase;
  white-space: nowrap;
}
.logo .sep { color: var(--dim); font-weight: 300; }
.stat-chip {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 3px 10px;
  display: flex;
  gap: 5px;
  white-space: nowrap;
}
.stat-chip .val { color: var(--text); font-weight: 500; }
.stat-chip .lbl { color: var(--dim); }
.stat-chip.hi { border-color: rgba(52,211,153,.2); }
.stat-chip.hi .val { color: var(--green); }
.spacer { flex: 1; }
.load-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .08em;
  color: var(--bg);
  background: var(--cpu);
  border: none;
  border-radius: 4px;
  padding: 6px 16px;
  cursor: pointer;
  transition: opacity .12s;
}
.load-btn:hover { opacity: .85; }

/* ── MAIN LAYOUT ── */
#app { flex: 1; display: flex; overflow: hidden; }

/* ── LEFT PANEL ── */
#left-panel {
  width: 220px;
  flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── CENTER ── */
#center {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── RIGHT PANEL ── */
#right-panel {
  width: 260px;
  flex-shrink: 0;
  background: var(--s1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── PANEL HEADERS ── */
.ph {
  height: 34px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.ph .ph-title { color: var(--muted); font-weight: 500; }
.ph-tab {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--dim);
  letter-spacing: .06em;
  transition: color .1s, background .1s;
}
.ph-tab.active { color: var(--cpu); background: rgba(56,189,248,.08); }
.ph-tab:not(.active):hover { color: var(--muted); }
.ph-spacer { flex: 1; }

/* ── VIEW TABS (center) ── */
#view-tabs {
  height: 36px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 2px;
  flex-shrink: 0;
}
.vt {
  font-family: var(--mono);
  font-size: 9px;
  padding: 5px 12px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--dim);
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: color .1s, background .1s;
  border: none;
  background: transparent;
}
.vt.active { color: var(--cpu); background: rgba(56,189,248,.1); }
.vt:not(.active):hover { color: var(--muted); background: var(--s3); }
.vt-sep { width: 1px; height: 14px; background: var(--border); margin: 0 4px; }
.vt-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.leg { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--dim); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.leg-line { width: 14px; height: 2px; border-radius: 1px; }
.leg-dash { width: 14px; height: 1px; background: repeating-linear-gradient(90deg, var(--dim) 0 3px, transparent 3px 6px); }

/* ── WATERFALL ── */
#waterfall-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
#waterfall-svg { width: 100%; height: 100%; }

/* ── TIMELINE DETAIL (bottom strip) ── */
#timeline-strip {
  height: 80px;
  flex-shrink: 0;
  background: var(--s1);
  border-top: 1px solid var(--border);
  overflow: hidden;
}
#timeline-svg { width: 100%; height: 100%; }

/* ── TYPE LIST ── */
#type-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
#type-scroll::-webkit-scrollbar { width: 3px; }
#type-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.type-row {
  display: flex;
  align-items: center;
  padding: 5px 12px 5px 10px;
  cursor: pointer;
  gap: 8px;
  border-left: 2px solid transparent;
  transition: background .1s;
}
.type-row:hover { background: var(--s2); }
.type-row.sel { background: rgba(56,189,248,.06); border-left-color: var(--cpu); }
.type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.type-info { flex: 1; min-width: 0; }
.type-name {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.type-sub {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  margin-top: 1px;
}
.type-count { font-family: var(--mono); font-size: 9px; color: var(--dim); flex-shrink: 0; }
.type-bar { height: 2px; background: var(--s4); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.type-bar-fill { height: 100%; border-radius: 1px; }

/* ── MODULE BADGE ── */
.mod-badge {
  display: inline-flex;
  font-family: var(--mono);
  font-size: 7px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--s3);
  color: var(--muted);
  letter-spacing: .04em;
  margin-left: 4px;
  vertical-align: middle;
}

/* ── INSPECTOR ── */
#insp-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
#insp-scroll::-webkit-scrollbar { width: 3px; }
#insp-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.insp-empty {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  line-height: 2;
  text-align: center;
  padding-top: 40px;
}

.i-badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 3px;
  margin-bottom: 14px;
}
.ib-cpu   { background: rgba(56,189,248,.1);  color: var(--cpu);    border: 1px solid rgba(56,189,248,.25); }
.ib-gpu   { background: rgba(52,211,153,.08); color: var(--green);  border: 1px solid rgba(52,211,153,.2); }
.ib-corr  { background: rgba(167,139,250,.08);color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.ib-hard  { background: rgba(52,211,153,.1);  color: var(--green);  border: 1px solid rgba(52,211,153,.25); }
.ib-weak  { background: var(--s3); color: var(--muted); border: 1px solid var(--border2); }

.i-sec { margin-bottom: 16px; }
.i-sec-title {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 7px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.i-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
  gap: 8px;
}
.i-key { font-family: var(--mono); font-size: 9px; color: var(--dim); white-space: nowrap; flex-shrink: 0; }
.i-val { font-family: var(--mono); font-size: 9px; color: var(--text); text-align: right; word-break: break-all; }
.iv-a { color: var(--cpu); }
.iv-g { color: var(--green); }
.iv-y { color: var(--yellow); }
.iv-p { color: var(--purple); }
.iv-r { color: var(--red); }
.iv-o { color: var(--orange); }
.iv-d { color: var(--mid); }

.cs-frame {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--mid);
  border-left: 2px solid var(--border2);
  padding: 2px 6px;
  margin-bottom: 3px;
  word-break: break-all;
  line-height: 1.5;
}
.cs-frame.top { color: var(--cpu); border-left-color: var(--cpu); }
.cs-frame .fn { color: var(--text); }

/* ── LIFETIME BAR ── */
.lifetime-bar-wrap { height: 4px; background: var(--s4); border-radius: 2px; margin: 4px 0 8px; overflow: hidden; }
.lifetime-bar-fill { height: 100%; border-radius: 2px; background: var(--green); }

/* ── TOP ALLOCATORS (left bottom section) ── */
#top-alloc-scroll {
  height: 220px;
  border-top: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}
#top-alloc-scroll::-webkit-scrollbar { width: 3px; }
#top-alloc-scroll::-webkit-scrollbar-thumb { background: var(--border2); }
.alloc-row {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.alloc-row:hover { background: var(--s2); }
.alloc-row.sel { background: rgba(56,189,248,.06); }
.alloc-type { font-family: var(--mono); font-size: 9px; color: var(--text); font-weight: 500; }
.alloc-site { font-family: var(--mono); font-size: 8px; color: var(--dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.alloc-meta { font-family: var(--mono); font-size: 8px; color: var(--green); margin-top: 2px; }
.alloc-bar { height: 2px; background: var(--s4); border-radius: 1px; margin-top: 3px; }
.alloc-bar-fill { height: 100%; border-radius: 1px; }

/* ── GPU SUMMARY ── */
#gpu-summary {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  flex-shrink: 0;
}
.gpu-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.gpu-stat { background: var(--s2); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 8px; }
.gpu-stat-val { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--green); }
.gpu-stat-lbl { font-family: var(--mono); font-size: 7px; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; margin-top: 1px; }

/* ── DROP OVERLAY ── */
#drop-overlay {
  position: fixed; inset: 0;
  background: rgba(8,10,15,.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
}
#drop-overlay.show { opacity: 1; pointer-events: all; }
.drop-icon { font-size: 36px; margin-bottom: 10px; }
.drop-txt { font-family: var(--mono); font-size: 12px; color: var(--cpu); letter-spacing: .1em; }

/* ── EMPTY STATES ── */
.view-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  pointer-events: none;
}
.ve-title { font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; }
.ve-sub { font-family: var(--mono); font-size: 9px; color: var(--border2); }

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── GRAPH VIEW ── */
#graph-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#graph-svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>
<div id="drop-overlay">
  <div class="drop-icon">⬇</div>
  <div class="drop-txt">DROP SESSION JSON</div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Formatters ──────────────────────────────────────────────────────────────
const fmtBytes = n => {
  if (n == null) return '—';
  if (n < 1024) return `${n} B`;
  if (n < 1048576) return `${(n/1024).toFixed(1)} KB`;
  return `${(n/1048576).toFixed(2)} MB`;
};
const fmtNs = ns => {
  if (ns == null || ns < 0) return '—';
  if (ns < 1000) return `${ns} ns`;
  if (ns < 1e6)  return `${(ns/1000).toFixed(1)} µs`;
  if (ns < 1e9)  return `${(ns/1e6).toFixed(1)} ms`;
  return `${(ns/1e9).toFixed(3)} s`;
};
const fmtAddr = n => n ? '0x' + n.toString(16).toUpperCase().padStart(12,'0') : '—';
const fmtRel  = (ns, base) => ns != null ? '+' + fmtNs(ns - base) : '—';

// Short callsite: last user-code frame, skip stdlib
const siteLabel = frames => {
  if (!frames || !frames.length) return null;
  // prefer non-stdlib frames
  const user = frames.filter(f => !f.includes('/lib/python') && !f.includes('tracemalloc'));
  const src = user.length ? user[0] : frames[0];
  const parts = src.split('/');
  return parts[parts.length - 1]; // file:line
};

// ── Color palette ───────────────────────────────────────────────────────────
const PALETTE = [
  '#38bdf8','#34d399','#fbbf24','#a78bfa','#f87171',
  '#fb923c','#f472b6','#2dd4bf','#818cf8','#4ade80',
  '#facc15','#e879f9','#67e8f9','#86efac','#fca5a5',
];
const _colorMap = {};
let _ci = 0;
const typeColor = t => {
  const key = t.split('.').pop();
  if (!_colorMap[key]) _colorMap[key] = PALETTE[_ci++ % PALETTE.length];
  return _colorMap[key];
};

// ── Data helpers ─────────────────────────────────────────────────────────────
function buildIndex(session) {
  if (!session) return null;
  const allocMap = {};   // alloc_address → event
  const deallocMap = {}; // alloc_address → dealloc event
  const gpuById = {};

  session.cpu_events.forEach(e => {
    if (!e.is_dealloc) allocMap[e.alloc_address] = e;
    else deallocMap[e.alloc_address] = e;
  });
  session.gpu_events.forEach(e => { gpuById[e.base.event_id] = e; });

  // cpu event_id → correlated gpu events
  const cpuCorrs = {};
  session.correlated_events.forEach(c => {
    if (!cpuCorrs[c.cpu_event_id]) cpuCorrs[c.cpu_event_id] = [];
    cpuCorrs[c.cpu_event_id].push({ ...c, gpuEvent: gpuById[c.gpu_event_id] });
  });

  return { allocMap, deallocMap, gpuById, cpuCorrs };
}

// ── Top allocators by total bytes ────────────────────────────────────────────
function topAllocators(session, filterType, limit = 60) {
  if (!session) return [];
  const allocs = session.cpu_events.filter(e => !e.is_dealloc);
  const filtered = filterType ? allocs.filter(e => e.object_type === filterType) : allocs;

  // group by (type, callsite)
  const groups = {};
  filtered.forEach(e => {
    const site = siteLabel(e.callstack) || '?';
    const key  = `${e.object_type}|${site}`;
    if (!groups[key]) groups[key] = { type: e.object_type, module: e.module_name||'', site, totalBytes: 0, bufBytes: 0, count: 0, events: [] };
    groups[key].totalBytes += e.alloc_size_bytes || 0;
    groups[key].bufBytes   += e.buffer_nbytes || 0;
    groups[key].count++;
    if (groups[key].events.length < 3) groups[key].events.push(e);
  });

  return Object.values(groups)
    .sort((a, b) => (b.bufBytes || b.totalBytes) - (a.bufBytes || a.totalBytes))
    .slice(0, limit);
}

// ── GPU summary stats ────────────────────────────────────────────────────────
function gpuStats(session) {
  if (!session || !session.gpu_events.length) return null;
  const gpu = session.gpu_events;
  const kernels   = gpu.filter(e => e.base.event_type === 'KERNEL');
  const transfers = gpu.filter(e => e.base.event_type === 'TRANSFER');
  const xferBytes = transfers.reduce((s, e) => s + (e.transfer_size_bytes||0), 0);
  const kDur = kernels.reduce((s, e) => s + (e.kernel_duration_ns||0), 0);
  const maxMem = Math.max(...gpu.map(e => e.device_mem_used_mb||0));
  return { kernels: kernels.length, transfers: transfers.length, xferBytes, kDurNs: kDur, maxMemMb: maxMem };
}

// ── WATERFALL VIEW ──────────────────────────────────────────────────────────
function WaterfallView({ session, idx, filterType, onSelect, selected }) {
  const ref = useRef(null);

  useEffect(() => {
    if (!ref.current || !session || !idx) return;
    const svg = d3.select(ref.current);
    svg.selectAll('*').remove();

    const el  = ref.current;
    const W   = el.clientWidth  || 900;
    const H   = el.clientHeight || 600;
    const ML  = 20, MR = 20, MT = 10, MB = 24;
    const ROW = 18; // px per alloc row — we'll bucket by type

    const startNs = session.start_time_ns;
    const endNs   = session.end_time_ns;
    const durNs   = endNs - startNs;
    if (durNs <= 0) return;

    const allocs = session.cpu_events.filter(e =>
      !e.is_dealloc && (!filterType || e.object_type === filterType)
    );

    // Sort by timestamp
    const sorted = [...allocs].sort((a, b) => a.base.timestamp_ns - b.base.timestamp_ns);

    // Group by type for swim lanes
    const typeOrder = [];
    const typeMap = {};
    sorted.forEach(e => {
      const t = e.object_type || 'unknown';
      if (!typeMap[t]) { typeMap[t] = []; typeOrder.push(t); }
      typeMap[t].push(e);
    });

    const nTypes = typeOrder.length;
    if (nTypes === 0) return;

    // Compute lane heights proportional to count, min 20px
    const total = sorted.length;
    const MIN_LANE = 20, BAR_H = 5, LANE_PAD = 6;
    const laneHeights = typeOrder.map(t => Math.max(MIN_LANE, Math.ceil(typeMap[t].length / Math.max(1, Math.floor((W - ML - MR) / ROW))) * (BAR_H + 2) + LANE_PAD*2));
    const totalH = laneHeights.reduce((s, h) => s + h, 0);
    const availH = H - MT - MB;
    const scale  = Math.min(1, availH / totalH);
    const scaledHeights = laneHeights.map(h => Math.max(MIN_LANE, h * scale));

    const zoom = d3.zoom().scaleExtent([0.3, 80]).on('zoom', e => {
      mainG.attr('transform', `translate(${e.transform.x + ML},${MT}) scale(${e.transform.k},1)`);
      // Update axis
      const newX = e.transform.rescaleX(xScale);
      axisG.call(d3.axisBottom(newX).ticks(7).tickFormat(t => fmtNs(t - startNs)).tickSize(3));
      axisG.selectAll('text').attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 8).attr('fill', '#3d4f6a');
      axisG.select('.domain').attr('stroke', '#1e2535');
      axisG.selectAll('.tick line').attr('stroke', '#1e2535');
    });
    svg.call(zoom);

    const xScale = d3.scaleLinear().domain([startNs, endNs]).range([0, W - ML - MR]);

    // Background + axis
    const axisG = svg.append('g')
      .attr('transform', `translate(${ML},${H - MB})`);
    axisG.call(d3.axisBottom(xScale).ticks(7).tickFormat(t => fmtNs(t - startNs)).tickSize(3));
    axisG.selectAll('text').attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 8).attr('fill', '#3d4f6a');
    axisG.select('.domain').attr('stroke', '#1e2535');
    axisG.selectAll('.tick line').attr('stroke', '#1e2535');

    const mainG = svg.append('g').attr('transform', `translate(${ML},${MT})`);

    // GPU event markers (vertical lines above everything)
    const gpuMarkers = mainG.append('g').attr('class', 'gpu-markers');

    let yOff = 0;
    const laneRefs = {};

    typeOrder.forEach((t, ti) => {
      const lh = scaledHeights[ti];
      const events = typeMap[t];
      const color  = typeColor(t);
      const laneG  = mainG.append('g').attr('transform', `translate(0,${yOff})`);
      laneRefs[t]  = { y: yOff, h: lh };

      // lane background
      laneG.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', W - ML - MR).attr('height', lh)
        .attr('fill', ti % 2 === 0 ? 'rgba(255,255,255,.012)' : 'transparent');

      // lane label (left, fixed)
      svg.append('text')
        .attr('x', ML - 6).attr('y', MT + yOff + lh / 2)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 8)
        .attr('fill', color).attr('opacity', .7)
        .text(t.split('.').pop().slice(0, 14));

      // bars
      const barPad = 1;
      const bh = Math.max(3, Math.min(BAR_H, lh / Math.ceil(events.length / Math.max(1, Math.floor((W-ML-MR)/8))) - barPad));
      const cols = Math.max(1, Math.floor((W - ML - MR) / 6));
      events.forEach((ev, i) => {
        const evStart = ev.base.timestamp_ns - startNs;
        const dealloc = idx.deallocMap[ev.alloc_address];
        const evEnd   = dealloc ? dealloc.base.timestamp_ns - startNs : durNs;
        const x0 = xScale(evStart + startNs - startNs);  // = xScale relative
        const x1 = Math.max(x0 + 1, xScale(evEnd + startNs - startNs));
        const row = Math.floor(i / cols);
        const by  = LANE_PAD + row * (bh + barPad);
        if (by + bh > lh) return; // overflow — skip

        const barX = xScale(ev.base.timestamp_ns);
        const barW = Math.max(1.5, xScale(dealloc ? dealloc.base.timestamp_ns : endNs) - barX);

        const isSel = selected?.data?.base?.event_id === ev.base.event_id;
        const hasCorr = (idx.cpuCorrs[ev.base.event_id]?.length || 0) > 0;

        laneG.append('rect')
          .attr('x', barX).attr('y', by)
          .attr('width', barW).attr('height', bh)
          .attr('rx', 1)
          .attr('fill', color + (hasCorr ? '55' : '28'))
          .attr('stroke', isSel ? '#fbbf24' : (hasCorr ? color : 'none'))
          .attr('stroke-width', isSel ? 1.5 : 0.8)
          .attr('data-id', ev.base.event_id)
          .style('cursor', 'pointer')
          .on('click', (event) => {
            event.stopPropagation();
            onSelect({ type: 'cpu', data: ev });
          });
      });

      yOff += lh;
    });

    // GPU event vertical markers
    session.gpu_events.forEach(e => {
      const x = xScale(e.base.timestamp_ns);
      const isK = e.base.event_type === 'KERNEL';
      const color = isK ? '#a78bfa' : '#34d399';
      gpuMarkers.append('line')
        .attr('x1', x).attr('x2', x).attr('y1', 0).attr('y2', yOff)
        .attr('stroke', color).attr('stroke-width', 0.8).attr('opacity', 0.35)
        .style('cursor', 'pointer')
        .on('click', (event) => {
          event.stopPropagation();
          onSelect({ type: 'gpu', data: e });
        });
    });

    // Highlight correlation lines when CPU selected
    if (selected?.type === 'cpu') {
      const ev = selected.data;
      const corrs = idx.cpuCorrs[ev.base.event_id] || [];
      corrs.forEach(c => {
        if (!c.gpuEvent) return;
        const cx = xScale(ev.base.timestamp_ns);
        const gx = xScale(c.gpuEvent.base.timestamp_ns);
        const ty = (laneRefs[ev.object_type]?.y || 0) + scaledHeights[typeOrder.indexOf(ev.object_type)] / 2;
        mainG.append('line')
          .attr('x1', cx).attr('y1', ty).attr('x2', gx).attr('y2', ty)
          .attr('stroke', c.confidence === 'HARD' ? '#34d399' : '#2a3347')
          .attr('stroke-width', c.confidence === 'HARD' ? 1.5 : 1)
          .attr('stroke-dasharray', c.confidence === 'HARD' ? 'none' : '3,2')
          .attr('opacity', 0.7)
          .attr('pointer-events', 'none');
      });
    }

    svg.on('click', () => onSelect(null));

  }, [session, idx, filterType, selected]);

  return (
    <div id="waterfall-wrap">
      {!session && (
        <div className="view-empty">
          <div className="ve-title">No session loaded</div>
          <div className="ve-sub">Load a ProfilingSession JSON to begin</div>
        </div>
      )}
      <svg id="waterfall-svg" ref={ref}/>
    </div>
  );
}

// ── TIMELINE STRIP ──────────────────────────────────────────────────────────
function TimelineStrip({ session, onSelect, selected }) {
  const ref = useRef(null);

  useEffect(() => {
    if (!ref.current || !session) return;
    const svg = d3.select(ref.current);
    svg.selectAll('*').remove();
    const W = ref.current.clientWidth || 900;
    const H = 80;
    const ML = 56, MR = 14, MT = 6, BH = 12;

    const startNs = session.start_time_ns, endNs = session.end_time_ns;
    const x = d3.scaleLinear().domain([startNs, endNs]).range([ML, W - MR]);

    // RSS line
    const cpuAllocs = session.cpu_events.filter(e => !e.is_dealloc && (e.peak_rss_kb||0) > 0);
    if (cpuAllocs.length > 1) {
      const rssMax = d3.max(cpuAllocs, d => d.peak_rss_kb);
      const yRss = d3.scaleLinear().domain([0, rssMax]).range([H - 20, MT + BH + 4]);
      const line = d3.line().x(d => x(d.base.timestamp_ns)).y(d => yRss(d.peak_rss_kb)).curve(d3.curveMonotoneX);
      svg.append('path').datum(cpuAllocs)
        .attr('d', line).attr('fill', 'none')
        .attr('stroke', 'rgba(56,189,248,.35)').attr('stroke-width', 1);
      svg.append('text').attr('x', ML - 4).attr('y', yRss(rssMax))
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 7).attr('fill', '#3d4f6a')
        .text(fmtBytes(rssMax * 1024));
    }

    // CPU alloc ticks
    svg.append('text').attr('x', ML - 4).attr('y', MT + BH/2)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 7).attr('fill', 'rgba(56,189,248,.5)')
      .text('CPU');
    const deallocMap = {};
    session.cpu_events.filter(e => e.is_dealloc).forEach(e => { deallocMap[e.alloc_address] = e.base.timestamp_ns; });
    svg.selectAll('.ct').data(session.cpu_events.filter(e => !e.is_dealloc)).join('rect')
      .attr('x', d => x(d.base.timestamp_ns))
      .attr('y', MT)
      .attr('height', BH)
      .attr('width', d => Math.max(1.5, x(deallocMap[d.alloc_address] || endNs) - x(d.base.timestamp_ns)))
      .attr('fill', d => typeColor(d.object_type || 'unknown') + '30')
      .attr('stroke', d => typeColor(d.object_type || 'unknown'))
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', (evt, d) => { evt.stopPropagation(); onSelect({ type: 'cpu', data: d }); });

    // GPU event ticks
    const gpuDevs = [...new Set(session.gpu_events.map(e => e.device_id ?? 0))].sort();
    gpuDevs.forEach((dev, di) => {
      const gy = MT + BH + 8 + di * (BH + 4);
      svg.append('text').attr('x', ML - 4).attr('y', gy + BH/2)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 7).attr('fill', 'rgba(52,211,153,.5)')
        .text(`GPU:${dev}`);
      svg.selectAll(`.gt${dev}`).data(session.gpu_events.filter(e => (e.device_id??0) === dev)).join('rect')
        .attr('x', d => x(d.base.timestamp_ns) - 1)
        .attr('y', gy).attr('height', BH).attr('width', 3)
        .attr('fill', d => d.base.event_type === 'KERNEL' ? '#a78bfa44' : '#34d39944')
        .attr('stroke', d => d.base.event_type === 'KERNEL' ? '#a78bfa' : '#34d399')
        .attr('stroke-width', 0.6)
        .style('cursor', 'pointer')
        .on('click', (evt, d) => { evt.stopPropagation(); onSelect({ type: 'gpu', data: d }); });
    });

    // Selected marker
    const selTs = selected?.data?.base?.timestamp_ns;
    if (selTs) {
      svg.append('line')
        .attr('x1', x(selTs)).attr('x2', x(selTs))
        .attr('y1', MT - 2).attr('y2', H - 16)
        .attr('stroke', '#fbbf24').attr('stroke-width', 1).attr('stroke-dasharray', '3,2').attr('opacity', .9);
    }

    // Time axis
    const axG = svg.append('g').attr('transform', `translate(0,${H - 14})`);
    axG.call(d3.axisBottom(x).ticks(8).tickFormat(t => fmtNs(t - startNs)).tickSize(2));
    axG.selectAll('text').attr('font-family', "'IBM Plex Mono',monospace").attr('font-size', 7).attr('fill', '#3d4f6a');
    axG.select('.domain').remove();
    axG.selectAll('.tick line').attr('stroke', '#1e2535');

  }, [session, selected]);

  return <div id="timeline-strip"><svg id="timeline-svg" ref={ref}/></div>;
}

// ── GRAPH VIEW ───────────────────────────────────────────────────────────────
function GraphView({ session, idx, filterType, onSelect, selected }) {
  const svgRef  = useRef(null);
  const zoomRef = useRef(null);

  useEffect(() => {
    if (!svgRef.current || !session || !idx) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    if (!session.correlated_events.length) return;

    const W = svgRef.current.clientWidth || 800;
    const H = svgRef.current.clientHeight || 600;

    const zoom = d3.zoom().scaleExtent([0.05,8]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);
    zoomRef.current = { svg, zoom };
    const g = svg.append('g');

    const allocs  = session.cpu_events.filter(e => !e.is_dealloc);
    const gpuEvs  = session.gpu_events;

    const typeGroups = {};
    allocs.forEach(e => {
      const t = e.object_type || 'unknown';
      if (!filterType || filterType === t) {
        if (!typeGroups[t]) typeGroups[t] = { count: 0, bytes: 0, bufBytes: 0, events: [], corrCount: 0 };
        typeGroups[t].count++;
        typeGroups[t].bytes    += e.alloc_size_bytes || 0;
        typeGroups[t].bufBytes += e.buffer_nbytes    || 0;
        typeGroups[t].events.push(e);
        if (idx.cpuCorrs[e.base.event_id]?.length) typeGroups[t].corrCount++;
      }
    });

    const cpuNodes = Object.entries(typeGroups).map(([t, d]) => ({ id: `cpu_${t}`, kind: 'cpu', label: t.split('.').pop(), fullType: t, module: '', ...d, color: typeColor(t) }));
    const seenGpu = new Set();
    const gpuNodes = [], edges = [];

    cpuNodes.forEach(cn => {
      cn.events.forEach(ev => {
        (idx.cpuCorrs[ev.base.event_id] || []).forEach(c => {
          const ge = c.gpuEvent; if (!ge) return;
          const gid = `gpu_${ge.base.event_id}`;
          if (!seenGpu.has(gid)) {
            seenGpu.add(gid);
            const isT = ge.base.event_type === 'TRANSFER';
            gpuNodes.push({ id: gid, kind: 'gpu', label: isT ? fmtBytes(ge.transfer_size_bytes) : (ge.kernel_name||'kernel').split('<')[0].slice(0,16), evType: ge.base.event_type, event: ge });
          }
          edges.push({ source: cn.id, target: gid, confidence: c.confidence, latency: c.latency_ns, corr: c, cpuEvent: ev, data: cn });
        });
      });
    });

    const PAD = 48;
    const cpuX = W * 0.25, gpuX = W * 0.75;
    const crh = Math.max(44, (H - PAD*2) / Math.max(cpuNodes.length, 1));
    const grh = Math.max(32, (H - PAD*2) / Math.max(gpuNodes.length, 1));
    cpuNodes.forEach((n,i) => { n.x = cpuX; n.y = PAD + i*crh + crh/2; });
    gpuNodes.forEach((n,i) => { n.x = gpuX; n.y = PAD + i*grh + grh/2; });

    const allNodes = [...cpuNodes, ...gpuNodes];
    const nodeById = Object.fromEntries(allNodes.map(n => [n.id, n]));

    // Defs
    const defs = svg.append('defs');
    [['hard','#34d399'],['weak','#2a3347']].forEach(([k,c]) => {
      defs.append('marker').attr('id',`arr-${k}`).attr('viewBox','0 -4 8 8')
        .attr('refX',22).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
        .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',c);
    });

    // Column headers
    [['CPU OBJECTS', cpuX],['GPU EVENTS', gpuX]].forEach(([t,x]) => {
      g.append('text').attr('x',x).attr('y',20).attr('text-anchor','middle')
        .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',8).attr('letter-spacing','.12em')
        .attr('fill','#2a3347').text(t);
    });

    // Edges
    const edgeG = g.append('g');
    edgeG.selectAll('path').data(edges).join('path')
      .attr('d', d => {
        const s = nodeById[d.source], t = nodeById[d.target];
        if (!s || !t) return '';
        const mx = (s.x + t.x) / 2;
        return `M${s.x+58},${s.y} C${mx},${s.y} ${mx},${t.y} ${t.x-22},${t.y}`;
      })
      .attr('fill','none')
      .attr('stroke', d => d.confidence==='HARD'?'#34d399':'#2a3347')
      .attr('stroke-width', d => d.confidence==='HARD'?1.5:0.8)
      .attr('stroke-dasharray', d => d.confidence==='HARD'?'none':'4,3')
      .attr('opacity', d => d.confidence==='HARD'?0.6:0.2)
      .attr('marker-end', d => `url(#arr-${d.confidence.toLowerCase()})`)
      .style('cursor','pointer')
      .on('click', (evt, d) => { evt.stopPropagation(); onSelect({type:'edge',data:d}); hilite(d.source,d.target); });

    // CPU nodes
    cpuNodes.forEach(n => {
      const ng = g.append('g').attr('transform',`translate(${n.x},${n.y})`).style('cursor','pointer');
      ng.append('rect').attr('x',-58).attr('y',-22).attr('width',116).attr('height',44).attr('rx',6)
        .attr('fill', n.color+'10').attr('stroke', n.color).attr('stroke-width',1.5);
      ng.append('text').attr('y',-6).attr('text-anchor','middle')
        .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',10).attr('font-weight',600)
        .attr('fill', n.color).text(n.label.length>14?n.label.slice(0,13)+'…':n.label);
      const dispBytes = n.bufBytes > 0 ? n.bufBytes : n.bytes;
      ng.append('text').attr('y',10).attr('text-anchor','middle')
        .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',8).attr('fill','#3d4f6a')
        .text(`${n.count} · ${fmtBytes(dispBytes)}`);
      if (n.corrCount > 0) {
        const badge = ng.append('g').attr('transform','translate(58,-22)');
        badge.append('circle').attr('r',9).attr('fill','#0d1018').attr('stroke','#34d399').attr('stroke-width',1.2);
        badge.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',7).attr('fill','#34d399').text(n.corrCount);
      }
      ng.on('click',(evt) => { evt.stopPropagation(); onSelect({type:'cpu_group',data:n}); hilite(n.id); });
    });

    // GPU nodes
    gpuNodes.forEach(n => {
      const isK = n.evType==='KERNEL';
      const col = isK ? '#a78bfa' : '#34d399';
      const ng = g.append('g').attr('transform',`translate(${n.x},${n.y})`).style('cursor','pointer');
      ng.append('ellipse').attr('rx',48).attr('ry',17)
        .attr('fill', isK?'rgba(167,139,250,.07)':'rgba(52,211,153,.05)')
        .attr('stroke', col).attr('stroke-width',1.5);
      ng.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',9).attr('fill',col)
        .text(n.label.length>14?n.label.slice(0,13)+'…':n.label);
      ng.on('click',(evt) => { evt.stopPropagation(); onSelect({type:'gpu',data:n.event}); hilite(n.id); });
    });

    function hilite(...ids) {
      const s = new Set(ids);
      g.selectAll('.node').attr('opacity', n => s.has(n.id)?1:0.1);
      edgeG.selectAll('path').attr('opacity', d => (s.has(d.source)||s.has(d.target))?(d.confidence==='HARD'?0.9:0.5):0.03);
    }
    svg.on('click', () => {
      g.selectAll('.node').attr('opacity',1);
      edgeG.selectAll('path').attr('opacity', d => d.confidence==='HARD'?0.6:0.2);
      onSelect(null);
    });

    // Fit
    const bb = g.node().getBBox();
    if (bb.width > 0) {
      const sc = Math.min(0.9, Math.min(W/bb.width, H/bb.height)*0.85);
      const tx = W/2 - sc*(bb.x+bb.width/2), ty = H/2 - sc*(bb.y+bb.height/2);
      svg.call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
    }

  }, [session, idx, filterType, selected]);

  return (
    <div id="graph-wrap">
      {!session && (
        <div className="view-empty">
          <div className="ve-title">No session loaded</div>
          <div className="ve-sub">Load a ProfilingSession JSON</div>
        </div>
      )}
      {session && !session.correlated_events.length && (
        <div className="view-empty">
          <div className="ve-title">No correlations</div>
          <div className="ve-sub">GPU events not correlated with CPU allocs</div>
        </div>
      )}
      <svg id="graph-svg" ref={svgRef}/>
    </div>
  );
}

// ── TYPE LIST ────────────────────────────────────────────────────────────────
function TypeList({ session, filterType, onFilter }) {
  if (!session) return (
    <div id="type-scroll" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>—</span>
    </div>
  );

  const allocs = session.cpu_events.filter(e => !e.is_dealloc);
  const groups = {};
  allocs.forEach(e => {
    const t = e.object_type || 'unknown';
    if (!groups[t]) groups[t] = { count: 0, bytes: 0, bufBytes: 0, module: e.module_name || '' };
    groups[t].count++;
    groups[t].bytes    += e.alloc_size_bytes || 0;
    groups[t].bufBytes += e.buffer_nbytes    || 0;
  });
  const sorted = Object.entries(groups).sort((a,b) => b[1].count - a[1].count);
  const maxC = sorted[0]?.[1].count || 1;

  return (
    <div id="type-scroll">
      <div className={`type-row ${!filterType?'sel':''}`} onClick={() => onFilter(null)}>
        <div className="type-dot" style={{background:'var(--mid)'}}/>
        <div className="type-info">
          <div className="type-name" style={{color:'var(--mid)'}}>All types</div>
          <div className="type-sub">{allocs.length} allocations</div>
        </div>
        <span className="type-count">{allocs.length}</span>
      </div>
      {sorted.map(([t, info]) => {
        const shortName = t.split('.').pop();
        const col = typeColor(t);
        const dispBytes = info.bufBytes > 0 ? info.bufBytes : info.bytes;
        return (
          <div key={t} className={`type-row ${filterType===t?'sel':''}`} onClick={() => onFilter(filterType===t?null:t)}>
            <div className="type-dot" style={{background:col}}/>
            <div className="type-info">
              <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                <span className="type-name">{shortName}</span>
                {info.module && <span className="mod-badge">{info.module.split('.')[0]}</span>}
              </div>
              <div className="type-sub">{fmtBytes(dispBytes)}{info.bufBytes>0?' (buffer)':''}</div>
              <div className="type-bar">
                <div className="type-bar-fill" style={{width:`${(info.count/maxC)*100}%`,background:col}}/>
              </div>
            </div>
            <span className="type-count">{info.count}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── TOP ALLOCATORS PANEL ──────────────────────────────────────────────────────
function TopAllocators({ session, filterType, onSelect, selected }) {
  if (!session) return <div id="top-alloc-scroll"/>;
  const rows = useMemo(() => topAllocators(session, filterType, 40), [session, filterType]);
  const maxBytes = rows[0] ? (rows[0].bufBytes || rows[0].totalBytes) : 1;

  return (
    <div id="top-alloc-scroll">
      <div className="ph"><span className="ph-title">Top Allocators</span></div>
      {rows.map((r, i) => {
        const col = typeColor(r.type);
        const dispBytes = r.bufBytes > 0 ? r.bufBytes : r.totalBytes;
        const isSel = selected?.data?.alloc_address != null && r.events.some(e => selected.data.alloc_address === e.alloc_address);
        return (
          <div key={i} className={`alloc-row ${isSel?'sel':''}`} onClick={() => r.events[0] && onSelect({type:'cpu',data:r.events[0]})}>
            <div className="alloc-type" style={{color:col}}>
              {r.type.split('.').pop()}
              {r.module && <span className="mod-badge">{r.module.split('.')[0]}</span>}
            </div>
            {r.site && <div className="alloc-site">{r.site}</div>}
            <div className="alloc-meta">
              {fmtBytes(dispBytes)}{r.bufBytes>0?' buf':''} · {r.count}×
            </div>
            <div className="alloc-bar">
              <div className="alloc-bar-fill" style={{width:`${(dispBytes/maxBytes)*100}%`,background:col+'80'}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── GPU SUMMARY ───────────────────────────────────────────────────────────────
function GpuSummary({ session }) {
  const stats = useMemo(() => gpuStats(session), [session]);
  if (!stats) return null;
  return (
    <div id="gpu-summary">
      <div className="ph" style={{height:28,padding:'0 12px',marginBottom:8}}><span className="ph-title">GPU</span></div>
      <div className="gpu-stat-grid">
        <div className="gpu-stat"><div className="gpu-stat-val">{stats.kernels}</div><div className="gpu-stat-lbl">kernels</div></div>
        <div className="gpu-stat"><div className="gpu-stat-val">{stats.transfers}</div><div className="gpu-stat-lbl">transfers</div></div>
        <div className="gpu-stat"><div className="gpu-stat-val" style={{color:'var(--yellow)'}}>{fmtBytes(stats.xferBytes)}</div><div className="gpu-stat-lbl">transferred</div></div>
        <div className="gpu-stat"><div className="gpu-stat-val" style={{color:'var(--purple)'}}>{fmtNs(stats.kDurNs)}</div><div className="gpu-stat-lbl">kernel time</div></div>
      </div>
      {stats.maxMemMb > 0 && (
        <div style={{marginTop:6,fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>
          peak device mem: <span style={{color:'var(--orange)'}}>{stats.maxMemMb} MB</span>
        </div>
      )}
    </div>
  );
}

// ── INSPECTOR ────────────────────────────────────────────────────────────────
function Inspector({ selected, session, idx, baseNs }) {
  if (!selected) return (
    <div id="insp-scroll">
      <div className="insp-empty">
        Click any allocation bar,<br/>
        GPU marker, or type row<br/>
        to inspect it.
      </div>
    </div>
  );

  const Row  = ({k, v, cls}) => (
    <div className="i-row">
      <span className="i-key">{k}</span>
      <span className={`i-val ${cls||''}`}>{v ?? '—'}</span>
    </div>
  );
  const Sec  = ({title, children}) => (
    <div className="i-sec">
      <div className="i-sec-title">{title}</div>
      {children}
    </div>
  );

  const { type, data } = selected;

  // ── CPU alloc ──
  if (type === 'cpu') {
    const e = data;
    const dealloc = idx?.deallocMap[e.alloc_address];
    const corrs   = idx?.cpuCorrs[e.base.event_id] || [];
    const lifetime = e.lifetime_ns > 0 ? e.lifetime_ns
      : dealloc ? (dealloc.base.timestamp_ns - e.base.timestamp_ns) : null;
    const dispBytes = e.buffer_nbytes > 0 ? e.buffer_nbytes : e.alloc_size_bytes;
    const sessionDur = session ? (session.end_time_ns - session.start_time_ns) : 1;
    const lifetimePct = lifetime ? Math.min(100, (lifetime / sessionDur) * 100) : 0;

    return (
      <div id="insp-scroll">
        <div className={`i-badge ib-cpu`}>CPU Allocation</div>

        <Sec title="Object">
          <Row k="type"    v={e.object_type}    cls="iv-a"/>
          <Row k="module"  v={e.module_name||'—'} cls="iv-d"/>
          <Row k="event_id" v={e.base.event_id} cls="iv-d"/>
        </Sec>

        <Sec title="Memory">
          <Row k="address"    v={fmtAddr(e.alloc_address)} cls="iv-d"/>
          <Row k="size"       v={fmtBytes(e.alloc_size_bytes)} cls="iv-g"/>
          {e.is_numpy_buffer && <Row k="buffer" v={fmtBytes(e.buffer_nbytes)} cls="iv-y"/>}
          {e.is_numpy_buffer && <Row k="⚠ tracemalloc" v="sees header only" cls="iv-d"/>}
          <Row k="ref_count"  v={e.ref_count}/>
          <Row k="gc_gen"     v={e.gc_generation}/>
          {e.peak_rss_kb > 0 && <Row k="rss at alloc" v={fmtBytes(e.peak_rss_kb * 1024)} cls="iv-d"/>}
        </Sec>

        <Sec title="Lifetime">
          <Row k="allocated"  v={fmtRel(e.base.timestamp_ns, baseNs)} cls="iv-d"/>
          <Row k="freed"      v={dealloc ? fmtRel(dealloc.base.timestamp_ns, baseNs) : 'still alive'} cls={dealloc?'iv-d':'iv-y'}/>
          <Row k="duration"   v={lifetime ? fmtNs(lifetime) : '—'} cls="iv-g"/>
          {lifetime && (
            <div className="lifetime-bar-wrap">
              <div className="lifetime-bar-fill" style={{width:`${lifetimePct}%`}}/>
            </div>
          )}
        </Sec>

        {corrs.length > 0 && (
          <Sec title={`GPU Correlations (${corrs.length})`}>
            {corrs.slice(0, 5).map((c, i) => {
              const ge = c.gpuEvent;
              return (
                <div key={i} style={{marginBottom:8,padding:'5px 7px',background:'var(--s3)',borderRadius:4,borderLeft:`2px solid ${c.confidence==='HARD'?'#34d399':'#2a3347'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span className={`i-badge ${c.confidence==='HARD'?'ib-hard':'ib-weak'}`} style={{marginBottom:0,fontSize:7}}>{c.confidence}</span>
                    <span className="i-key">{fmtNs(c.latency_ns)} latency</span>
                  </div>
                  {ge && <div className="i-key" style={{marginTop:3}}>{ge.base.event_type}: {ge.kernel_name||fmtBytes(ge.transfer_size_bytes)} {ge.stream_id!=null?`· stream ${ge.stream_id}`:''}</div>}
                  {ge?.kernel_duration_ns > 0 && <div className="i-key">duration: {fmtNs(ge.kernel_duration_ns)}</div>}
                </div>
              );
            })}
          </Sec>
        )}

        {e.callstack?.length > 0 && (
          <Sec title="Call Stack">
            {e.callstack.slice(0,8).map((f, i) => {
              const parts = f.split('/');
              const short = parts[parts.length-1];
              const isUser = !f.includes('/lib/python') && !f.includes('site-packages');
              return (
                <div key={i} className={`cs-frame ${i===0?'top':''}`}>
                  <span className="fn">{short}</span>
                </div>
              );
            })}
          </Sec>
        )}
      </div>
    );
  }

  // ── CPU group ──
  if (type === 'cpu_group') {
    const d = data;
    const dispBytes = d.bufBytes > 0 ? d.bufBytes : d.bytes;
    return (
      <div id="insp-scroll">
        <div className="i-badge ib-cpu">Type Group</div>
        <Sec title="Type">
          <Row k="name"   v={d.fullType} cls="iv-a"/>
          <Row k="module" v={d.module||'—'}/>
          <Row k="allocs" v={d.count}/>
          <Row k="total"  v={fmtBytes(dispBytes)} cls="iv-g"/>
          {d.bufBytes > 0 && <Row k="(buffer data)" v={fmtBytes(d.bufBytes)} cls="iv-y"/>}
          <Row k="correlated" v={`${d.corrCount} / ${d.count}`} cls="iv-y"/>
        </Sec>
      </div>
    );
  }

  // ── GPU event ──
  if (type === 'gpu') {
    const e = data;
    const isT = e.base.event_type === 'TRANSFER';
    const isK = e.base.event_type === 'KERNEL';
    return (
      <div id="insp-scroll">
        <div className="i-badge ib-gpu">GPU {e.base.event_type}</div>
        <Sec title="Identity">
          <Row k="event_id" v={e.base.event_id}    cls="iv-d"/>
          <Row k="device"   v={`GPU:${e.device_id??0}`}/>
          <Row k="stream"   v={e.stream_id != null ? e.stream_id : '—'}/>
          <Row k="at"       v={fmtRel(e.base.timestamp_ns, baseNs)} cls="iv-d"/>
        </Sec>
        {isT && (
          <Sec title="Transfer">
            <Row k="kind"   v={e.transfer_kind}           cls="iv-y"/>
            <Row k="size"   v={fmtBytes(e.transfer_size_bytes)} cls="iv-g"/>
            <Row k="src"    v={fmtAddr(e.src_address)}    cls="iv-d"/>
            <Row k="dst"    v={fmtAddr(e.dst_address)}    cls="iv-d"/>
            {e.kernel_duration_ns > 0 && <Row k="duration" v={fmtNs(e.kernel_duration_ns)} cls="iv-p"/>}
          </Sec>
        )}
        {isK && (
          <Sec title="Kernel">
            <Row k="name"     v={e.kernel_name||'—'}       cls="iv-p"/>
            <Row k="duration" v={fmtNs(e.kernel_duration_ns)} cls="iv-g"/>
            <Row k="pg_faults" v={e.um_page_faults??0}/>
          </Sec>
        )}
        {e.device_mem_used_mb > 0 && (
          <Sec title="Device Memory">
            <Row k="in use" v={`${e.device_mem_used_mb} MB`} cls="iv-o"/>
          </Sec>
        )}
      </div>
    );
  }

  // ── Correlation edge ──
  if (type === 'edge') {
    const d = data;
    const isH = d.confidence === 'HARD';
    return (
      <div id="insp-scroll">
        <div className="i-badge ib-corr">Correlation</div>
        <Sec title="Match">
          <Row k="confidence" v={<span className={`i-badge ${isH?'ib-hard':'ib-weak'}`} style={{marginBottom:0}}>{d.confidence}</span>}/>
          <Row k="reason"  v={d.corr?.match_reason} cls={isH?'iv-g':'iv-d'}/>
          <Row k="latency" v={fmtNs(d.latency)}     cls="iv-y"/>
        </Sec>
        <Sec title="CPU Object">
          <Row k="type"    v={d.data?.fullType||'—'} cls="iv-a"/>
          <Row k="id"      v={d.cpuEvent?.base?.event_id} cls="iv-d"/>
          <Row k="size"    v={fmtBytes(d.cpuEvent?.alloc_size_bytes)} cls="iv-g"/>
        </Sec>
      </div>
    );
  }

  return <div id="insp-scroll"><div className="insp-empty">Unknown selection.</div></div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [session,    setSession]    = useState(null);
  const [selected,   setSelected]   = useState(null);
  const [filterType, setFilterType] = useState(null);
  const [view,       setView]       = useState('waterfall');  // 'waterfall' | 'graph'

  const idx = useMemo(() => buildIndex(session), [session]);

  const loadFile = useCallback(file => {
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const s = JSON.parse(e.target.result);
        setSession(s);
        setSelected(null);
        setFilterType(null);
      } catch (err) {
        alert('Invalid JSON: ' + err.message);
      }
    };
    r.readAsText(file);
  }, []);

  useEffect(() => {
    const ov = document.getElementById('drop-overlay');
    const onOver  = e => { e.preventDefault(); ov.classList.add('show'); };
    const onLeave = e => { if (!e.relatedTarget) ov.classList.remove('show'); };
    const onDrop  = e => { e.preventDefault(); ov.classList.remove('show'); loadFile(e.dataTransfer?.files?.[0]); };
    document.addEventListener('dragover', onOver);
    document.addEventListener('dragleave', onLeave);
    document.addEventListener('drop', onDrop);
    return () => {
      document.removeEventListener('dragover', onOver);
      document.removeEventListener('dragleave', onLeave);
      document.removeEventListener('drop', onDrop);
    };
  }, [loadFile]);

  useEffect(() => {
    const inp = document.getElementById('file-input');
    const h = e => loadFile(e.target.files[0]);
    inp.addEventListener('change', h);
    return () => inp.removeEventListener('change', h);
  }, [loadFile]);

  const stats = useMemo(() => {
    if (!session) return [];
    const hard  = session.correlated_events.filter(c => c.confidence==='HARD').length;
    const weak  = session.correlated_events.filter(c => c.confidence==='WEAK').length;
    const allocs = session.cpu_events.filter(e => !e.is_dealloc).length;
    const deallocs = session.cpu_events.filter(e => e.is_dealloc).length;
    const numpy = session.cpu_events.filter(e => !e.is_dealloc && e.is_numpy_buffer).length;
    return [
      { label: 'cpu allocs',  val: allocs,                   hi: false },
      { label: 'freed',       val: deallocs,                 hi: false },
      { label: 'gpu events',  val: session.gpu_events.length, hi: false },
      { label: 'hard corr',   val: hard,                     hi: hard > 0 },
      { label: 'weak corr',   val: weak,                     hi: false },
      { label: 'numpy bufs',  val: numpy,                    hi: numpy > 0 },
      { label: 'duration',    val: fmtNs(session.end_time_ns - session.start_time_ns), hi: false },
    ];
  }, [session]);

  return (
    <>
      <div id="topbar">
        <span className="logo">HPC<span className="sep"> / </span>Profiler</span>
        {stats.length > 0 && stats.map((s, i) => (
          <div key={i} className={`stat-chip ${s.hi?'hi':''}`}>
            <span className="val">{s.val}</span>
            <span className="lbl">{s.label}</span>
          </div>
        ))}
        <div className="spacer"/>
        <button className="load-btn" onClick={() => document.getElementById('file-input').click()}>Load JSON</button>
      </div>

      <div id="app">
        {/* LEFT */}
        <div id="left-panel">
          <div className="ph"><span className="ph-title">Object Types</span></div>
          <TypeList session={session} filterType={filterType} onFilter={setFilterType}/>
          <TopAllocators session={session} filterType={filterType} onSelect={setSelected} selected={selected}/>
          <GpuSummary session={session}/>
        </div>

        {/* CENTER */}
        <div id="center">
          <div id="view-tabs">
            <button className={`vt ${view==='waterfall'?'active':''}`} onClick={() => setView('waterfall')}>Waterfall</button>
            <button className={`vt ${view==='graph'?'active':''}`}     onClick={() => setView('graph')}>Correlation Graph</button>
            <div className="vt-right">
              {view === 'waterfall' && <>
                <div className="leg"><div className="leg-dot" style={{background:'var(--cpu)'}}/> alloc (linked)</div>
                <div className="leg"><div className="leg-dot" style={{background:'rgba(56,189,248,.3)'}}/> alloc</div>
                <div className="leg"><div className="leg-dot" style={{background:'var(--purple)'}}/> kernel</div>
                <div className="leg"><div className="leg-dot" style={{background:'var(--green)'}}/> transfer</div>
              </>}
              {view === 'graph' && <>
                <div className="leg" style={{gap:6}}>
                  <svg width="14" height="7"><line x1="0" y1="3.5" x2="14" y2="3.5" stroke="#34d399" strokeWidth="1.5"/></svg>HARD
                </div>
                <div className="leg" style={{gap:6}}>
                  <svg width="14" height="7"><line x1="0" y1="3.5" x2="14" y2="3.5" stroke="#2a3347" strokeWidth="1" strokeDasharray="3,2"/></svg>WEAK
                </div>
              </>}
            </div>
          </div>

          {view === 'waterfall'
            ? <>
                <WaterfallView session={session} idx={idx} filterType={filterType} onSelect={setSelected} selected={selected}/>
                <TimelineStrip session={session} onSelect={setSelected} selected={selected}/>
              </>
            : <GraphView session={session} idx={idx} filterType={filterType} onSelect={setSelected} selected={selected}/>
          }
        </div>

        {/* RIGHT */}
        <div id="right-panel">
          <div className="ph"><span className="ph-title">Inspector</span></div>
          <Inspector selected={selected} session={session} idx={idx} baseNs={session?.start_time_ns??0}/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
