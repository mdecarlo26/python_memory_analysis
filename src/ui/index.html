<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HPC Memory Profiler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#07090e; --panel:#0c0f18; --card:#111520; --card2:#161b28;
  --border:#1c2235; --border2:#232c42;
  --text:#c4cfdf; --text2:#8899b0; --dim:#3d4f68;
  --cpu:#41b3f5; --green:#2ecc98; --yellow:#f5c542; --purple:#9d84f5;
  --red:#f56565; --orange:#f59c42; --pink:#f56bb4; --teal:#42d4c8;
  --mono:'JetBrains Mono',monospace; --sans:'Space Grotesk',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;display:flex;flex-direction:column;height:100vh}
#topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--cpu);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap}
.logo .s{color:var(--dim);font-weight:300;margin:0 4px}
.vdiv{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.kpi{display:flex;flex-direction:column;gap:1px;white-space:nowrap}
.kpi-v{font-family:var(--mono);font-size:15px;font-weight:600;line-height:1;color:var(--text)}
.kpi-v.g{color:var(--green)}.kpi-v.b{color:var(--cpu)}.kpi-v.y{color:var(--yellow)}.kpi-v.p{color:var(--purple)}
.kpi-l{font-size:10px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase}
.spacer{flex:1}
.load-btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--bg);background:var(--cpu);border:none;border-radius:6px;padding:8px 18px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.load-btn:hover{opacity:.85}
#app{flex:1;display:grid;grid-template-columns:280px 1fr 320px;overflow:hidden;min-height:0}
.panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.ph{height:38px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.ph-title{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text2);letter-spacing:.14em;text-transform:uppercase}
.ph-count{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:auto}
.scrollable{flex:1;overflow-y:auto}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#center-nav{height:42px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0}
.tab{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:5px;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:color .12s,background .12s}
.tab.on{color:var(--cpu);background:rgba(65,179,245,.1)}
.tab:not(.on):hover{color:var(--text2);background:var(--card)}
.tab-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.leg{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--dim)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:10px 12px}
.card-title{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.insight{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:0 12px 8px;border-left:3px solid var(--border2);cursor:pointer;transition:border-color .15s,background .15s}
.insight:first-child{margin-top:10px}
.insight:hover{background:var(--card2)}
.insight.sel{border-color:var(--cpu);background:rgba(65,179,245,.04)}
.insight-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.insight-icon{font-size:16px;line-height:1}
.insight-type{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text)}
.ibadge{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-left:auto}
.ib-hi{background:rgba(245,101,101,.12);color:var(--red);border:1px solid rgba(245,101,101,.25)}
.ib-md{background:rgba(245,197,66,.1);color:var(--yellow);border:1px solid rgba(245,197,66,.2)}
.ib-lo{background:rgba(46,204,152,.08);color:var(--green);border:1px solid rgba(46,204,152,.15)}
.ib-if{background:rgba(65,179,245,.08);color:var(--cpu);border:1px solid rgba(65,179,245,.15)}
.insight-desc{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:6px}
.insight-stat{font-family:var(--mono);font-size:11px}
.ibar{height:3px;background:var(--border2);border-radius:2px;margin-top:6px;overflow:hidden}
.ibar-fill{height:100%;border-radius:2px}
.type-row{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.type-row:hover{background:var(--card)}
.type-row.sel{background:rgba(65,179,245,.05);border-left-color:var(--cpu)}
.tr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-name{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-sub{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-num{font-family:var(--mono);font-size:11px;color:var(--text2);flex-shrink:0;text-align:right}
.tr-bar{height:2px;background:var(--border2);border-radius:1px;margin-top:4px}
.tr-bar-fill{height:100%;border-radius:1px}
#timeline-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#timeline-wrap svg{display:block}
#pressure-strip{height:72px;flex-shrink:0;border-top:1px solid var(--border);background:var(--panel)}
#pressure-strip svg{width:100%;height:72px;display:block}
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none}
.empty-t{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.empty-s{font-family:var(--mono);font-size:10px;color:var(--border2)}
.isec{margin-bottom:16px}
.isec-t{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.irow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:10px}
.ik{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.iv{font-family:var(--mono);font-size:10px;color:var(--text);text-align:right;word-break:break-all}
.iv.a{color:var(--cpu)}.iv.g{color:var(--green)}.iv.y{color:var(--yellow)}.iv.p{color:var(--purple)}.iv.r{color:var(--red)}.iv.d{color:var(--text2)}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:14px}
.badge-cpu{background:rgba(65,179,245,.1);color:var(--cpu);border:1px solid rgba(65,179,245,.25)}
.badge-gpu{background:rgba(46,204,152,.08);color:var(--green);border:1px solid rgba(46,204,152,.2)}
.badge-grp{background:rgba(157,132,245,.08);color:var(--purple);border:1px solid rgba(157,132,245,.2)}
.badge-hard{background:rgba(46,204,152,.1);color:var(--green);border:1px solid rgba(46,204,152,.25)}
.badge-weak{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}
.frame{font-family:var(--mono);font-size:9px;color:var(--text2);border-left:2px solid var(--border2);padding:3px 8px;margin-bottom:3px;line-height:1.5;word-break:break-all}
.frame.u{color:var(--cpu);border-left-color:var(--cpu)}
.cpill{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--border2)}
.cpill.hard{border-left-color:var(--green)}
#drop-ov{position:fixed;inset:0;background:rgba(7,9,14,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s}
#drop-ov.show{opacity:1;pointer-events:all}
.wc{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin:0 12px 8px}
.wc-t{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.wc-b{font-size:12px;color:var(--text2);line-height:1.65}
.wc-b strong{color:var(--text);font-weight:600}
.wc-b .hi{color:var(--cpu);font-family:var(--mono);font-size:11px}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>
<div id="drop-ov">
  <div style="font-size:40px;margin-bottom:12px">⬇</div>
  <div style="font-family:var(--mono);font-size:13px;color:var(--cpu);letter-spacing:.1em">DROP SESSION.JSON</div>
</div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const fmtB=n=>{if(n==null)return'—';if(n<1024)return`${n} B`;if(n<1048576)return`${(n/1024).toFixed(1)} KB`;if(n<1073741824)return`${(n/1048576).toFixed(2)} MB`;return`${(n/1073741824).toFixed(2)} GB`};
const fmtNs=ns=>{if(!ns||ns<0)return'—';if(ns<1000)return`${ns}ns`;if(ns<1e6)return`${(ns/1000).toFixed(0)}µs`;if(ns<1e9)return`${(ns/1e6).toFixed(1)}ms`;return`${(ns/1e9).toFixed(2)}s`};
const fmtN=n=>n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1000?`${(n/1000).toFixed(1)}k`:String(n);
const fmtAddr=n=>n?'0x'+n.toString(16).toUpperCase().padStart(12,'0'):'—';
const PALETTE=['#41b3f5','#2ecc98','#f5c542','#9d84f5','#f56565','#f59c42','#f56bb4','#42d4c8','#7ec8f5','#a8f5c8','#f5e08a','#c9b8fc'];
const _cm={};let _ci=0;
const tc=t=>{const k=t.split('.').pop();if(!_cm[k])_cm[k]=PALETTE[_ci++%PALETTE.length];return _cm[k]};

function analyzeSession(session){
  if(!session)return null;
  const allocs=session.cpu_events.filter(e=>!e.is_dealloc);
  const deallocs=session.cpu_events.filter(e=>e.is_dealloc);
  const gpu=session.gpu_events||[];
  const corrs=session.correlated_events||[];
  const dur=session.end_time_ns-session.start_time_ns;
  const deallocMap={};deallocs.forEach(e=>{deallocMap[e.alloc_address]=e});
  const gpuById={};gpu.forEach(e=>{gpuById[e.base.event_id]=e});
  const cpuCorrs={};corrs.forEach(c=>{if(!cpuCorrs[c.cpu_event_id])cpuCorrs[c.cpu_event_id]=[];cpuCorrs[c.cpu_event_id].push({...c,gpuEvent:gpuById[c.gpu_event_id]})});
  const byType={};
  allocs.forEach(e=>{
    const t=e.object_type||'unknown';
    if(!byType[t])byType[t]={type:t,count:0,totalBytes:0,bufBytes:0,sizes:[],gcGens:[0,0,0],corrCount:0,events:[],module:e.module_name||''};
    const g=byType[t];g.count++;g.totalBytes+=e.alloc_size_bytes||0;g.bufBytes+=e.buffer_nbytes||0;
    g.sizes.push(e.alloc_size_bytes||0);
    if(e.gc_generation>=0&&e.gc_generation<=2)g.gcGens[e.gc_generation]++;
    if(cpuCorrs[e.base.event_id]?.length)g.corrCount++;
    if(g.events.length<5)g.events.push(e);
  });
  const typeList=Object.values(byType).sort((a,b)=>b.count-a.count);
  const totalBytes=typeList.reduce((s,t)=>s+(t.bufBytes||t.totalBytes),0);
  const rssEvents=allocs.filter(e=>(e.peak_rss_kb||0)>0).sort((a,b)=>a.base.timestamp_ns-b.base.timestamp_ns);
  const maxRss=rssEvents.length?Math.max(...rssEvents.map(e=>e.peak_rss_kb)):0;
  const BUCKETS=60;const bsz=dur/BUCKETS;
  const rateSeries=Array.from({length:BUCKETS},(_,i)=>{
    const t0=session.start_time_ns+i*bsz,t1=t0+bsz;
    const cnt=allocs.filter(e=>e.base.timestamp_ns>=t0&&e.base.timestamp_ns<t1).length;
    return{t:t0,count:cnt};
  });
  const sizeBuckets={'<1KB':0,'1-4KB':0,'4-16KB':0,'16-64KB':0,'64KB+':0};
  allocs.forEach(e=>{const s=e.alloc_size_bytes||0;if(s<1024)sizeBuckets['<1KB']++;else if(s<4096)sizeBuckets['1-4KB']++;else if(s<16384)sizeBuckets['4-16KB']++;else if(s<65536)sizeBuckets['16-64KB']++;else sizeBuckets['64KB+']++});
  const gen0=allocs.filter(e=>e.gc_generation===0).length;
  const gen1=allocs.filter(e=>e.gc_generation===1).length;
  const gen2=allocs.filter(e=>e.gc_generation===2).length;
  const kernels=gpu.filter(e=>e.base.event_type==='KERNEL');
  const transfers=gpu.filter(e=>e.base.event_type==='TRANSFER');
  const xferBytes=transfers.reduce((s,e)=>s+(e.transfer_size_bytes||0),0);
  const kDur=kernels.reduce((s,e)=>s+(e.kernel_duration_ns||0),0);
  const maxDevMem=Math.max(0,...gpu.map(e=>e.device_mem_used_mb||0));
  const streams=[...new Set(gpu.map(e=>e.stream_id).filter(x=>x!=null))];
  const bursts=detectBursts(allocs);
  const callsiteCounts={};
  allocs.forEach(e=>{
    const frames=e.callstack||[];
    const uf=frames.filter(f=>!f.includes('/lib/python')&&!f.includes('tracemalloc')&&!f.includes('importlib'));
    const site=uf[0]||frames[0]||null;
    if(site){if(!callsiteCounts[site])callsiteCounts[site]={count:0,bytes:0,types:new Set()};callsiteCounts[site].count++;callsiteCounts[site].bytes+=e.alloc_size_bytes||0;callsiteCounts[site].types.add(e.object_type)}
  });
  const topCallsites=Object.entries(callsiteCounts).sort((a,b)=>b[1].bytes-a[1].bytes).slice(0,10).map(([site,d])=>({site,...d,types:[...d.types]}));
  const insights=generateInsights({typeList,allocs,deallocs,bursts,dur,gpu,transfers,kernels,xferBytes,sizeBuckets,gen0,gen1,gen2,gcTotal:allocs.length,corrs,maxRss,totalBytes});
  return{allocs,deallocs,gpu,corrs,deallocMap,gpuById,cpuCorrs,typeList,totalBytes,rssEvents,maxRss,rateSeries,sizeBuckets,gen0,gen1,gen2,gcTotal:allocs.length,kernels,transfers,xferBytes,kDur,maxDevMem,streams,bursts,topCallsites,insights,dur,startNs:session.start_time_ns,endNs:session.end_time_ns};
}

function detectBursts(allocs){
  const bursts=[];let i=0;
  while(i<allocs.length){
    const t=allocs[i].object_type,s=allocs[i].alloc_size_bytes;
    let j=i+1;
    while(j<allocs.length&&allocs[j].object_type===t&&allocs[j].alloc_size_bytes===s)j++;
    if(j-i>=5)bursts.push({type:t,size:s,count:j-i,start:allocs[i].base.timestamp_ns,events:allocs.slice(i,Math.min(j,i+3))});
    i=j;
  }
  return bursts.sort((a,b)=>b.count-a.count).slice(0,8);
}

function generateInsights({typeList,allocs,deallocs,bursts,dur,gpu,transfers,kernels,xferBytes,sizeBuckets,gen0,gen1,gen2,gcTotal,corrs,maxRss,totalBytes}){
  const ins=[];
  const survived=allocs.length-deallocs.length;
  if(survived>0&&survived/allocs.length>0.25)ins.push({id:'leak',icon:'⚠',sev:'hi',title:'Possible Memory Leak',desc:`${fmtN(survived)} objects allocated but never freed (${(survived/allocs.length*100).toFixed(0)}% of all allocs). These were still live at session end — check for retained references or missing cleanup.`,stat:`${fmtN(survived)} objects still live`,pct:survived/allocs.length,color:getComputedStyle(document.documentElement).getPropertyValue('--red').trim()||'#f56565'});
  const oldGen=(gen1+gen2)/Math.max(1,gcTotal);
  if(oldGen>0.15)ins.push({id:'gc',icon:'♻',sev:'md',title:'GC Generation Pressure',desc:`${(oldGen*100).toFixed(0)}% of objects are in GC gen 1 or 2. Objects that survive multiple GC cycles indicate long-lived data structures or reference cycles. This slows garbage collection and increases memory pressure.`,stat:`gen1: ${fmtN(gen1)}  gen2: ${fmtN(gen2)}`,pct:oldGen,color:'#f5c542'});
  if(bursts.length>0){const top=bursts[0];ins.push({id:'burst',icon:'⚡',sev:'if',title:'Repeated Allocation Burst',desc:`${top.count}× ${top.type} objects each exactly ${fmtB(top.size)}. Identical-size bursts usually indicate a computation loop, list comprehension, numpy array inspection, or iterating over a container — each iteration allocates the same wrapper type.`,stat:`${top.count}× ${top.type} @ ${fmtB(top.size)}`,pct:Math.min(1,top.count/allocs.length*5),color:'#41b3f5',burst:top})}
  const largeAllocs=allocs.filter(e=>(e.alloc_size_bytes||0)>65536);
  if(largeAllocs.length>0){const totalLarge=largeAllocs.reduce((s,e)=>s+(e.alloc_size_bytes||0),0);const topTypes=[...new Set(largeAllocs.map(e=>e.object_type))].slice(0,3);ins.push({id:'large',icon:'📦',sev:'md',title:'Large Object Allocations',desc:`${largeAllocs.length} allocations over 64 KB totaling ${fmtB(totalLarge)}. Types: ${topTypes.join(', ')}. Large Python objects often wrap numpy/pandas buffers. Check is_numpy_buffer in newer sessions.`,stat:`${largeAllocs.length} objects · ${fmtB(totalLarge)}`,pct:largeAllocs.length/Math.max(1,allocs.length),color:'#f59c42'})}
  if(transfers.length>0){const h2d=transfers.filter(e=>e.transfer_kind==='HOST_TO_DEVICE');ins.push({id:'xfer',icon:'🚀',sev:'if',title:'CPU→GPU Data Movement',desc:`${fmtB(xferBytes)} transferred in ${transfers.length} operations (${h2d.length} host→device, ${transfers.length-h2d.length} device→host). ${corrs.filter(c=>c.confidence==='HARD').length} transfers matched to specific CPU allocations.`,stat:`${fmtB(xferBytes)} · ${transfers.length} ops`,pct:1,color:'#2ecc98'})}
  const highRef=allocs.filter(e=>(e.ref_count||0)>10);
  if(highRef.length>50){const types=[...new Set(highRef.map(e=>e.object_type))].slice(0,3);ins.push({id:'refs',icon:'🔗',sev:'lo',title:'Highly Shared Objects',desc:`${highRef.length} objects with >10 references. Types: ${types.join(', ')}. Highly shared objects are pinned in memory and resist GC. Common causes: module-level caches, singleton dicts, class method tables.`,stat:`${highRef.length} objects · max refs: ${Math.max(...highRef.map(e=>e.ref_count))}`,pct:highRef.length/Math.max(1,allocs.length),color:'#42d4c8'})}
  return ins;
}

function WorkloadNarrative({data}){
  if(!data)return null;
  const{allocs,deallocs,gpu,typeList,bursts,dur,xferBytes,kernels,totalBytes,gen1,gen2,gcTotal}=data;
  const top3=typeList.slice(0,3).map(t=>t.type.split('.').pop());
  const numpyTypes=typeList.filter(t=>t.module==='numpy'||t.type.includes('ndarray'));
  const survived=allocs.length-deallocs.length;
  const burstTop=bursts[0];
  return(
    <div className="wc">
      <div className="wc-t">Workload Summary</div>
      <div className="wc-b">
        Over <strong>{fmtNs(dur)}</strong>, the process made <span className="hi">{fmtN(allocs.length)}</span> allocations
        totaling <span className="hi">{fmtB(totalBytes)}</span>.{' '}
        Dominant object types: <strong>{top3.join(', ')}</strong>.{' '}
        {numpyTypes.length>0&&<>Numpy arrays were present ({numpyTypes.map(t=>t.type.split('.').pop()).join(', ')}), which typically carry large C-level buffers invisible to the Python allocator. </>}
        {burstTop&&<>A burst of <strong>{fmtN(burstTop.count)}× {burstTop.type}</strong> @ {fmtB(burstTop.size)} each suggests a tight computation loop. </>}
        {survived>allocs.length*.2&&<><span className="hi">{fmtN(survived)}</span> objects were never freed. </>}
        {(gen1+gen2)>gcTotal*.15&&<>GC gen 1/2 objects ({(( gen1+gen2)/gcTotal*100).toFixed(0)}%) indicate long-lived data. </>}
        {gpu.length>0&&<>GPU: <span className="hi">{kernels.length}</span> kernels · <span className="hi">{fmtB(xferBytes)}</span> transferred.</>}
      </div>
    </div>
  );
}

function RateChart({data}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data)return;
    const svg=d3.select(ref.current);svg.selectAll('*').remove();
    const W=ref.current.clientWidth||600,H=64,ML=0,MR=0,MT=4,MB=16;
    const series=data.rateSeries,maxC=d3.max(series,d=>d.count)||1;
    const x=d3.scaleLinear().domain([0,series.length]).range([ML,W-MR]);
    const y=d3.scaleLinear().domain([0,maxC]).range([H-MB,MT]);
    const area=d3.area().x((_,i)=>x(i+.5)).y0(H-MB).y1(d=>y(d.count)).curve(d3.curveMonotoneX);
    svg.append('path').datum(series).attr('d',area).attr('fill','rgba(65,179,245,.08)');
    const line=d3.line().x((_,i)=>x(i+.5)).y(d=>y(d.count)).curve(d3.curveMonotoneX);
    svg.append('path').datum(series).attr('d',line).attr('fill','none').attr('stroke','rgba(65,179,245,.6)').attr('stroke-width',1.5);
    data.gpu.forEach(e=>{
      const frac=(e.base.timestamp_ns-data.startNs)/data.dur;
      const px=ML+frac*(W-ML-MR);
      const isK=e.base.event_type==='KERNEL';
      svg.append('line').attr('x1',px).attr('x2',px).attr('y1',MT).attr('y2',H-MB).attr('stroke',isK?'rgba(157,132,245,.5)':'rgba(46,204,152,.5)').attr('stroke-width',.8);
    });
    const axG=svg.append('g').attr('transform',`translate(0,${H-MB})`);
    axG.call(d3.axisBottom(d3.scaleLinear().domain([data.startNs,data.endNs]).range([ML,W-MR])).ticks(6).tickFormat(t=>fmtNs(t-data.startNs)).tickSize(2));
    axG.selectAll('text').attr('font-family','JetBrains Mono,monospace').attr('font-size',8).attr('fill','#3d4f68');
    axG.select('.domain').attr('stroke','#1c2235');axG.selectAll('.tick line').attr('stroke','#1c2235');
  },[data]);
  return(
    <div style={{padding:'0 14px 8px'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}}>Alloc Rate + GPU Events</div>
      <svg ref={ref} style={{width:'100%',height:64,display:'block'}}/>
    </div>
  );
}

              </div>

function Timeline({data,filter,onSelect,selected}){
  const wrapRef=useRef(null);
  const svgRef=useRef(null);

  useEffect(()=>{
    if(!wrapRef.current||!data)return;
    const W=wrapRef.current.clientWidth||800,H=wrapRef.current.clientHeight||400;
    const svg=d3.select(svgRef.current);svg.selectAll('*').remove();
    svg.attr('width',W).attr('height',H);
    const{allocs,deallocMap,gpu,startNs,endNs,dur}=data;
    const filtered=filter?allocs.filter(e=>e.object_type===filter):allocs;
    if(!filtered.length)return;
    const ML=72,MR=12,MT=8,MB=22,innerW=W-ML-MR,innerH=H-MT-MB;
    const xBase=d3.scaleLinear().domain([startNs,endNs]).range([0,innerW]);

    // Build lanes
    const types=filter?[filter]:[...new Set(filtered.map(e=>e.object_type||'unknown'))];
    const typeCounts={};filtered.forEach(e=>{const t=e.object_type||'unknown';typeCounts[t]=(typeCounts[t]||0)+1});
    let laneData=types.map(t=>({type:t,count:typeCounts[t]||0,color:tc(t)})).sort((a,b)=>b.count-a.count);
    laneData=laneData.slice(0,Math.max(1,Math.floor(innerH/20)));
    const totalC=laneData.reduce((s,l)=>s+l.count,0);
    let yOff=0;
    laneData.forEach(l=>{l.h=Math.max(20,Math.floor((l.count/totalC)*innerH));l.y=yOff;yOff+=l.h});
    const laneMap=Object.fromEntries(laneData.map(l=>[l.type,l]));

    // Lane labels (fixed left)
    laneData.forEach(l=>{
      svg.append('text').attr('x',ML-6).attr('y',MT+l.y+l.h/2)
        .attr('text-anchor','end').attr('dominant-baseline','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
        .attr('fill',l.color).attr('opacity',.85).text(l.type.split('.').pop().slice(0,11));
    });

    const mainG=svg.append('g').attr('transform',`translate(${ML},${MT})`);
    laneData.forEach(l=>{
      mainG.append('rect').attr('x',0).attr('y',l.y).attr('width',innerW).attr('height',l.h)
        .attr('fill',laneData.indexOf(l)%2===0?'rgba(255,255,255,.015)':'transparent');
    });
    const barsG=mainG.append('g');
    const gpuG=mainG.append('g');

    function renderBars(xScale){
      barsG.selectAll('*').remove();gpuG.selectAll('*').remove();
      const xd=xScale.domain();
      const vis=filtered.filter(e=>{const d=deallocMap[e.alloc_address];const end=d?d.base.timestamp_ns:endNs;return end>=xd[0]&&e.base.timestamp_ns<=xd[1]});
      const MAX=3500;
      const src=vis.length>MAX?vis.filter((_,i)=>i%Math.ceil(vis.length/MAX)===0):vis;
      src.forEach(e=>{
        const lane=laneMap[e.object_type||'unknown'];if(!lane)return;
        const x0=xScale(e.base.timestamp_ns);
        const d=deallocMap[e.alloc_address];
        const x1=xScale(d?d.base.timestamp_ns:endNs);
        const bw=Math.max(1.5,x1-x0);
        const isSel=selected?.sel?.base?.event_id===e.base.event_id;
        const hasC=(data.cpuCorrs[e.base.event_id]?.length||0)>0;
        const BY=2,BH=Math.max(3,lane.h-BY*2);
        barsG.append('rect').attr('x',x0).attr('y',lane.y+BY).attr('width',bw).attr('height',BH).attr('rx',1)
          .attr('fill',isSel?'#fbbf24':(hasC?lane.color:lane.color+'33'))
          .attr('stroke',isSel?'#fbbf24':(hasC?lane.color:'none')).attr('stroke-width',.5)
          .style('cursor','pointer')
          .on('click',evt=>{evt.stopPropagation();onSelect({type:'cpu',data:e})});
      });
      gpu.forEach(e=>{
        const px=xScale(e.base.timestamp_ns);if(px<0||px>innerW)return;
        const isK=e.base.event_type==='KERNEL';
        gpuG.append('line').attr('x1',px).attr('x2',px).attr('y1',0).attr('y2',innerH)
          .attr('stroke',isK?'rgba(157,132,245,.55)':'rgba(46,204,152,.65)').attr('stroke-width',1)
          .style('cursor','pointer').on('click',evt=>{evt.stopPropagation();onSelect({type:'gpu',data:e})});
      });
    }

    renderBars(xBase);

    const axisG=svg.append('g').attr('transform',`translate(${ML},${H-MB})`);
    const styleAx=g=>{g.selectAll('text').attr('font-family','JetBrains Mono,monospace').attr('font-size',8).attr('fill','#3d4f68');g.select('.domain').attr('stroke','#1c2235');g.selectAll('.tick line').attr('stroke','#1c2235')};
    axisG.call(d3.axisBottom(xBase).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(3));
    styleAx(axisG);

    const zoom=d3.zoom().scaleExtent([1,200]).translateExtent([[0,0],[W,H]])
      .on('zoom',evt=>{
        const nx=evt.transform.rescaleX(xBase);
        renderBars(nx);
        axisG.call(d3.axisBottom(nx).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(3));
        styleAx(axisG);
      });
    svg.call(zoom);
    svg.on('click',()=>onSelect(null));
  },[data,filter,selected]);

  return(
    <div id="timeline-wrap" ref={wrapRef}>
      {!data&&<div className="empty"><div className="empty-t">No session loaded</div><div className="empty-s">Load a session.json to begin</div></div>}
      <svg ref={svgRef}/>
    </div>
  );
}

function PressureStrip({data}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data)return;
    const svg=d3.select(ref.current);svg.selectAll('*').remove();
    const W=ref.current.clientWidth||800,H=72,ML=60,MR=12,MT=6,MB=18;
    const{allocs,deallocMap,gpu,startNs,endNs,rssEvents,maxRss}=data;
    const x=d3.scaleLinear().domain([startNs,endNs]).range([ML,W-MR]);
    const BH=14;
    allocs.forEach(e=>{
      const px=x(e.base.timestamp_ns);const d=deallocMap[e.alloc_address];
      const pw=Math.max(1,x(d?d.base.timestamp_ns:endNs)-px);
      svg.append('rect').attr('x',px).attr('y',MT).attr('width',pw).attr('height',BH)
        .attr('fill',tc(e.object_type||'unknown')+'22').attr('stroke',tc(e.object_type||'unknown')).attr('stroke-width',.4).attr('rx',.5);
    });
    if(rssEvents.length>1&&maxRss>0){
      const yRss=d3.scaleLinear().domain([0,maxRss]).range([H-MB,MT]);
      const line=d3.line().x(d=>x(d.base.timestamp_ns)).y(d=>yRss(d.peak_rss_kb)).curve(d3.curveMonotoneX);
      svg.append('path').datum(rssEvents).attr('d',line).attr('fill','none').attr('stroke','rgba(245,197,66,.55)').attr('stroke-width',1.5);
      svg.append('text').attr('x',ML-4).attr('y',yRss(maxRss)).attr('text-anchor','end').attr('dominant-baseline','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','rgba(245,197,66,.5)').text(fmtB(maxRss*1024));
    }
    gpu.forEach(e=>{
      const px=x(e.base.timestamp_ns);const isK=e.base.event_type==='KERNEL';
      svg.append('line').attr('x1',px).attr('x2',px).attr('y1',MT).attr('y2',H-MB-2)
        .attr('stroke',isK?'rgba(157,132,245,.65)':'rgba(46,204,152,.65)').attr('stroke-width',1);
    });
    svg.append('text').attr('x',ML-4).attr('y',MT+BH/2).attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','rgba(65,179,245,.5)').text('overview');
    const axG=svg.append('g').attr('transform',`translate(0,${H-MB})`);
    axG.call(d3.axisBottom(x).ticks(8).tickFormat(t=>fmtNs(t-startNs)).tickSize(2));
    axG.selectAll('text').attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','#3d4f68');
    axG.select('.domain').attr('stroke','#1c2235');axG.selectAll('.tick line').attr('stroke','#1c2235');
  },[data]);
  return <div id="pressure-strip"><svg ref={ref} style={{width:'100%',height:72}}/></div>;
}

function Inspector({selected,data,session}){
  if(!selected)return<div className="scrollable"><div style={{padding:'40px 16px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)',lineHeight:2}}>Select an item to inspect it.<br/>Click any bar, insight, type,<br/>or GPU event marker.</div></div>;
  const Row=({k,v,cls})=><div className="irow"><span className="ik">{k}</span><span className={`iv ${cls||''}`}>{v??'—'}</span></div>;
  const Sec=({title,children})=><div className="isec"><div className="isec-t">{title}</div>{children}</div>;
  const{type,sel}=selected;
  const baseNs=session?.start_time_ns||0;

  if(type==='cpu'){
    const e=sel;const d=data?.deallocMap[e.alloc_address];
    const lifetime=e.lifetime_ns>0?e.lifetime_ns:(d?d.base.timestamp_ns-e.base.timestamp_ns:null);
    const corrs=data?.cpuCorrs[e.base.event_id]||[];
    const dispB=(e.buffer_nbytes||0)>0?e.buffer_nbytes:e.alloc_size_bytes;
    const sessD=session?(session.end_time_ns-session.start_time_ns):1;
    const lifePct=lifetime?Math.min(100,lifetime/sessD*100):0;
    return(
      <div className="scrollable">
        <div style={{padding:'14px'}}>
          <span className="badge badge-cpu">CPU Allocation</span>
          <Sec title="Object">
            <Row k="type"      v={e.object_type}     cls="a"/>
            <Row k="module"    v={e.module_name||'—'} cls="d"/>
            <Row k="event_id"  v={e.base.event_id}   cls="d"/>
            <Row k="gc gen"    v={e.gc_generation}/>
            <Row k="ref count" v={e.ref_count}/>
          </Sec>
          <Sec title="Memory">
            <Row k="address" v={fmtAddr(e.alloc_address)} cls="d"/>
            <Row k="size"    v={fmtB(e.alloc_size_bytes)} cls="g"/>
            {(e.buffer_nbytes||0)>0&&<><Row k="buffer" v={fmtB(e.buffer_nbytes)} cls="y"/><Row k="note" v="tracemalloc sees header only" cls="d"/></>}
            {(e.peak_rss_kb||0)>0&&<Row k="RSS" v={fmtB(e.peak_rss_kb*1024)} cls="d"/>}
          </Sec>
          <Sec title="Lifetime">
            <Row k="allocated" v={'+'+fmtNs(e.base.timestamp_ns-baseNs)} cls="d"/>
            <Row k="freed"     v={d?'+'+fmtNs(d.base.timestamp_ns-baseNs):'still alive'} cls={d?'d':'y'}/>
            <Row k="duration"  v={lifetime?fmtNs(lifetime):'—'} cls="g"/>
            {lifetime&&<div style={{height:4,background:'var(--border2)',borderRadius:2,margin:'6px 0 8px',overflow:'hidden'}}><div style={{width:`${lifePct}%`,height:'100%',background:'var(--green)',borderRadius:2}}/></div>}
          </Sec>
          {corrs.length>0&&(
            <Sec title={`GPU Correlations (${corrs.length})`}>
              {corrs.slice(0,4).map((c,i)=>{
                const ge=c.gpuEvent;
                return(
                  <div key={i} className={`cpill ${c.confidence.toLowerCase()}`}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                      <span className={`badge ${c.confidence==='HARD'?'badge-hard':'badge-weak'}`} style={{marginBottom:0,fontSize:7,padding:'2px 6px'}}>{c.confidence}</span>
                      <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',marginLeft:'auto'}}>{fmtNs(c.latency_ns)}</span>
                    </div>
                    {ge&&<>
                      <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text)'}}>{ge.base.event_type}: {ge.kernel_name||fmtB(ge.transfer_size_bytes)}</div>
                      {ge.kernel_duration_ns>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--dim)'}}>dur {fmtNs(ge.kernel_duration_ns)} · stream {ge.stream_id??'?'}</div>}
                    </>}
                  </div>
                );
              })}
            </Sec>
          )}
          {(e.callstack||[]).length>0&&(
            <Sec title="Call Stack">
              {e.callstack.slice(0,8).map((f,i)=>{
                const isU=!f.includes('/lib/python')&&!f.includes('tracemalloc')&&!f.includes('importlib');
                return<div key={i} className={`frame ${isU?'u':''}`}>{f.split('/').pop()}</div>;
              })}
            </Sec>
          )}
        </div>
      </div>
    );
  }

  if(type==='gpu'){
    const e=sel;const isT=e.base.event_type==='TRANSFER';
    return(
      <div className="scrollable">
        <div style={{padding:'14px'}}>
          <span className="badge badge-gpu">GPU {e.base.event_type}</span>
          <Sec title="Identity">
            <Row k="event_id" v={e.base.event_id} cls="d"/>
            <Row k="device"   v={`GPU:${e.device_id??0}`}/>
            <Row k="stream"   v={e.stream_id??'—'}/>
            <Row k="at"       v={'+'+fmtNs(e.base.timestamp_ns-baseNs)} cls="d"/>
          </Sec>
          {isT?<Sec title="Transfer">
            <Row k="kind"     v={e.transfer_kind}           cls="y"/>
            <Row k="size"     v={fmtB(e.transfer_size_bytes)} cls="g"/>
            <Row k="src"      v={fmtAddr(e.src_address)}    cls="d"/>
            <Row k="dst"      v={fmtAddr(e.dst_address)}    cls="d"/>
            {(e.kernel_duration_ns||0)>0&&<Row k="duration" v={fmtNs(e.kernel_duration_ns)} cls="p"/>}
          </Sec>:<Sec title="Kernel">
            <Row k="name"      v={e.kernel_name||'—'}         cls="p"/>
            <Row k="duration"  v={fmtNs(e.kernel_duration_ns)} cls="g"/>
            <Row k="pg faults" v={e.um_page_faults??0}/>
          </Sec>}
          {(e.device_mem_used_mb||0)>0&&<Sec title="Device Mem"><Row k="in use" v={`${e.device_mem_used_mb} MB`} cls="y"/></Sec>}
        </div>
      </div>
    );
  }

  if(type==='insight'){
    const ins=sel;
    return(
      <div className="scrollable">
        <div style={{padding:'14px'}}>
          <span className="badge badge-grp">{ins.sev==='hi'?'HIGH':ins.sev==='md'?'MEDIUM':ins.sev==='lo'?'LOW':'INFO'}</span>
          <div style={{fontSize:28,marginBottom:8}}>{ins.icon}</div>
          <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:10}}>{ins.title}</div>
          <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.65,marginBottom:12}}>{ins.desc}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:ins.color||'var(--cpu)'}}>{ins.stat}</div>
          {ins.burst&&<div style={{marginTop:12}}>
            <div className="isec-t">Burst Detail</div>
            <div className="irow"><span className="ik">type</span><span className="iv a">{ins.burst.type}</span></div>
            <div className="irow"><span className="ik">count</span><span className="iv g">{ins.burst.count}</span></div>
            <div className="irow"><span className="ik">each</span><span className="iv y">{fmtB(ins.burst.size)}</span></div>
            <div className="irow"><span className="ik">total</span><span className="iv g">{fmtB(ins.burst.count*ins.burst.size)}</span></div>
          </div>}
        </div>
      </div>
    );
  }

  if(type==='burst'){
    const b=sel;
    return(
      <div className="scrollable">
        <div style={{padding:'14px'}}>
          <span className="badge badge-grp">Burst</span>
          <div className="isec">
            <div className="isec-t">Details</div>
            <div className="irow"><span className="ik">type</span><span className="iv a">{b.type}</span></div>
            <div className="irow"><span className="ik">count</span><span className="iv g">{b.count}</span></div>
            <div className="irow"><span className="ik">size each</span><span className="iv y">{fmtB(b.size)}</span></div>
            <div className="irow"><span className="ik">total</span><span className="iv g">{fmtB(b.count*b.size)}</span></div>
            <div className="irow"><span className="ik">at</span><span className="iv d">{'+'+fmtNs(b.start-(data?.startNs||0))}</span></div>
          </div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginTop:4}}>
            Identical-size allocation bursts indicate a tight loop: numpy/pandas operations decomposing into Python wrapper objects, list comprehensions, or iterator materialization.
          </div>
        </div>
      </div>
    );
  }

  if(type==='callsite'){
    const cs=sel;
    return(
      <div className="scrollable">
        <div style={{padding:'14px'}}>
          <span className="badge badge-cpu">Call Site</span>
          <div className="isec">
            <div className="isec-t">Location</div>
            <div className="irow"><span className="ik">file</span><span className="iv a">{cs.site.split('/').pop()}</span></div>
            <div className="irow"><span className="ik">allocs</span><span className="iv g">{cs.count}</span></div>
            <div className="irow"><span className="ik">bytes</span><span className="iv y">{fmtB(cs.bytes)}</span></div>
          </div>
          <div className="isec">
            <div className="isec-t">Types Allocated Here</div>
            {cs.types.map(t=><div key={t} className="frame u">{t}</div>)}
          </div>
        </div>
      </div>
    );
  }

  return <div className="scrollable"><div style={{padding:'40px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>—</div></div>;
}

function App(){
  const[session,setSession]=useState(null);
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState(null);
  const[view,setView]=useState('timeline');
  const data=useMemo(()=>analyzeSession(session),[session]);
  const loadFile=useCallback(file=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>{try{const s=JSON.parse(e.target.result);setSession(s);setSelected(null);setFilter(null)}catch(err){alert('Invalid JSON: '+err.message)}};
    r.readAsText(file);
  },[]);
  useEffect(()=>{
    const ov=document.getElementById('drop-ov');
    const over=e=>{e.preventDefault();ov.classList.add('show')};
    const leave=e=>{if(!e.relatedTarget)ov.classList.remove('show')};
    const drop=e=>{e.preventDefault();ov.classList.remove('show');loadFile(e.dataTransfer?.files?.[0])};
    document.addEventListener('dragover',over);document.addEventListener('dragleave',leave);document.addEventListener('drop',drop);
    return()=>{document.removeEventListener('dragover',over);document.removeEventListener('dragleave',leave);document.removeEventListener('drop',drop)};
  },[loadFile]);
  useEffect(()=>{const inp=document.getElementById('file-input');const h=e=>loadFile(e.target.files[0]);inp.addEventListener('change',h);return()=>inp.removeEventListener('change',h)},[loadFile]);
  const kpis=useMemo(()=>{
    if(!data)return[];
    return[
      {v:fmtN(data.allocs.length),l:'allocations',cls:'b'},
      {v:fmtN(data.deallocs.length),l:'freed',cls:''},
      {v:fmtB(data.totalBytes),l:'total bytes',cls:'g'},
      {v:data.gpu.length,l:'gpu events',cls:'p'},
      {v:data.corrs.filter(c=>c.confidence==='HARD').length,l:'hard corr',cls:'g'},
      {v:fmtNs(data.dur),l:'duration',cls:''},
    ];
  },[data]);
  const onSelect=useCallback((s)=>setSelected(s?{type:s.type,sel:s.data}:null),[]);

  return<>
    <div id="topbar">
      <span className="logo">HPC<span className="s">/</span>Profiler</span>
      {kpis.length>0&&<div className="vdiv"/>}
      {kpis.map((k,i)=><div key={i} className="kpi"><div className={`kpi-v ${k.cls}`}>{k.v}</div><div className="kpi-l">{k.l}</div></div>)}
      <div className="spacer"/>
      <button className="load-btn" onClick={()=>document.getElementById('file-input').click()}>Load JSON</button>
    </div>
    <div id="app">
      <div className="panel" style={{borderRight:'1px solid var(--border)'}}>
        <div className="ph"><span className="ph-title">Object Types</span><span className="ph-count">{data?fmtN(data.typeList.length)+' types':''}</span></div>
        <TypeList data={data} filter={filter} onFilter={setFilter}/>
      </div>
      <div className="panel">
        <div id="center-nav">
          <button className={`tab ${view==='timeline'?'on':''}`} onClick={()=>setView('timeline')}>Timeline</button>
          <button className={`tab ${view==='insights'?'on':''}`} onClick={()=>setView('insights')}>Insights{data&&data.insights.length>0?` (${data.insights.length})`:''}</button>
          <button className={`tab ${view==='callsites'?'on':''}`} onClick={()=>setView('callsites')}>Call Sites</button>
          {view==='timeline'&&<div className="tab-right">
            <div className="leg"><div className="dot" style={{background:'rgba(65,179,245,.9)'}}/> correlated</div>
            <div className="leg"><div className="dot" style={{background:'rgba(65,179,245,.25)'}}/> alloc</div>
            <div className="leg"><div className="dot" style={{background:'rgba(157,132,245,.6)'}}/> kernel</div>
            <div className="leg"><div className="dot" style={{background:'rgba(46,204,152,.6)'}}/> xfer</div>
          </div>}
        </div>
        {view==='timeline'&&<>
          <Timeline data={data} filter={filter} onSelect={onSelect} selected={selected}/>
          <PressureStrip data={data}/>
        </>}
        {view==='insights'&&<div style={{flex:1,overflowY:'auto'}}>
          <WorkloadNarrative data={data}/>
          {data?.insights.map(ins=>(
            <div key={ins.id} className={`insight ${selected?.sel?.id===ins.id?'sel':''}`}
              style={{borderLeftColor:selected?.sel?.id===ins.id?ins.color:ins.sev==='hi'?ins.color:undefined}}
              onClick={()=>onSelect({type:'insight',data:ins})}>
              <div className="insight-head">
                <span className="insight-icon">{ins.icon}</span>
                <span className="insight-type">{ins.title}</span>
                <span className={`ibadge ib-${ins.sev}`}>{ins.sev==='hi'?'high':ins.sev==='md'?'medium':ins.sev==='lo'?'low':'info'}</span>
              </div>
              <div className="insight-desc">{ins.desc}</div>
              <div className="insight-stat" style={{color:ins.color}}>{ins.stat}</div>
              <div className="ibar"><div className="ibar-fill" style={{width:`${(ins.pct||0)*100}%`,background:ins.color}}/></div>
            </div>
          ))}
          {data&&!data.insights.length&&<div style={{padding:'30px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>No significant issues detected.</div>}
          {!data&&<div style={{padding:'30px',textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>Load a session to see insights.</div>}
          {data&&<GcChart data={data}/>}
          {data&&<SizeDistChart data={data}/>}
          {data&&<RateChart data={data}/>}
          {data&&<BurstPanel data={data} onSelect={onSelect}/>}
        </div>}
        {view==='callsites'&&<div style={{flex:1,overflowY:'auto'}}>
          <CallsiteList data={data} onSelect={onSelect}/>
          <GpuPanel data={data}/>
        </div>}
      </div>
      <div className="panel" style={{borderLeft:'1px solid var(--border)'}}>
        <div className="ph"><span className="ph-title">Inspector</span></div>
        <Inspector selected={selected} data={data} session={session}/>
      </div>
    </div>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
