<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HPC Memory Profiler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0d0f14;--s1:#13161d;--s2:#1a1e28;--s3:#222736;
  --border:#2a3040;--border2:#384050;
  --text:#c8d0e0;--dim:#4a5568;--mid:#7a8899;
  --accent:#4fc3f7;--green:#69f0ae;--yellow:#ffd54f;
  --purple:#ce93d8;--red:#ef9a9a;--orange:#ffcc80;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* top bar */
#topbar{height:44px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.logo span{color:var(--dim);font-weight:400}
.topbar-sep{width:1px;height:18px;background:var(--border)}
.stat-pill{font-family:var(--mono);font-size:10px;background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:3px 8px;color:var(--mid);white-space:nowrap}
.stat-pill b{color:var(--text);font-weight:500}
.spacer{flex:1}
.load-btn{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--accent);background:transparent;border:1px solid var(--accent);border-radius:3px;padding:5px 14px;cursor:pointer;letter-spacing:.06em;transition:background .12s,color .12s}
.load-btn:hover{background:var(--accent);color:#000}
/* layout */
#app{flex:1;display:flex;overflow:hidden}
#left-col{width:200px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#center-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
#right-col{width:240px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
/* panel headers */
.panel-hdr{height:32px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.panel-hdr b{color:var(--mid);font-weight:500}
/* timeline */
#timeline{height:120px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);overflow:hidden}
#timeline svg{width:100%;height:100%}
.tl-empty{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--mono);font-size:10px;color:var(--dim)}
/* graph */
#graph-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#graph-svg{width:100%;height:100%}
.empty-graph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none}
.eg-title{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.eg-sub{font-family:var(--mono);font-size:10px;color:var(--border2)}
#graph-tb{height:32px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px}
.tb-btn{font-family:var(--mono);font-size:9px;color:var(--mid);background:var(--s2);border:1px solid var(--border);border-radius:2px;padding:3px 8px;cursor:pointer;letter-spacing:.04em;transition:border-color .1s,color .1s;white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.leg{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--dim)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* type list */
#type-list{flex:1;overflow-y:auto;padding:6px 0}
#type-list::-webkit-scrollbar{width:3px}
#type-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.type-row{display:flex;align-items:center;padding:5px 10px;cursor:pointer;gap:7px;border-left:2px solid transparent;transition:background .1s}
.type-row:hover{background:var(--s2)}
.type-row.selected{background:rgba(79,195,247,.07);border-left-color:var(--accent)}
.type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.type-name{font-family:var(--mono);font-size:10px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-count{font-family:var(--mono);font-size:9px;color:var(--dim)}
/* inspector */
#inspector{flex:1;overflow-y:auto;padding:12px 12px}
#inspector::-webkit-scrollbar{width:3px}
#inspector::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.insp-empty{font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.8}
.insp-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.07em;padding:2px 8px;border-radius:2px;text-transform:uppercase;margin-bottom:10px}
.badge-cpu{background:rgba(79,195,247,.1);color:var(--accent);border:1px solid rgba(79,195,247,.25)}
.badge-gpu{background:rgba(105,240,174,.08);color:var(--green);border:1px solid rgba(105,240,174,.2)}
.badge-corr{background:rgba(206,147,216,.08);color:var(--purple);border:1px solid rgba(206,147,216,.2)}
.badge-hard{background:rgba(105,240,174,.1);color:var(--green);border:1px solid rgba(105,240,174,.2)}
.badge-weak{background:var(--s2);color:var(--mid);border:1px solid var(--border)}
.insp-sec{margin-bottom:14px}
.insp-sec-title{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.insp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px}
.insp-key{font-family:var(--mono);font-size:9px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.insp-val{font-family:var(--mono);font-size:9px;color:var(--text);text-align:right;word-break:break-all}
.iv-a{color:var(--accent)}.iv-g{color:var(--green)}.iv-y{color:var(--yellow)}.iv-p{color:var(--purple)}.iv-d{color:var(--mid)}
.cs-frame{font-family:var(--mono);font-size:9px;color:var(--mid);border-left:2px solid var(--border2);padding-left:6px;margin-bottom:2px;word-break:break-all}
/* drop overlay */
#drop-overlay{position:fixed;inset:0;background:rgba(13,15,20,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s}
#drop-overlay.show{opacity:1;pointer-events:all}
.drop-icon{font-size:40px;margin-bottom:12px;color:var(--accent)}
.drop-txt{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.08em}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>
<div id="drop-overlay"><div class="drop-icon">⬇</div><div class="drop-txt">DROP SESSION JSON</div></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const fmtBytes = n => {
  if (n==null) return '—';
  if (n<1024) return `${n} B`;
  if (n<1048576) return `${(n/1024).toFixed(1)} KB`;
  return `${(n/1048576).toFixed(2)} MB`;
};
const fmtNs = ns => {
  if (ns==null) return '—';
  if (ns<1000) return `${ns} ns`;
  if (ns<1e6) return `${(ns/1000).toFixed(1)} µs`;
  if (ns<1e9) return `${(ns/1e6).toFixed(2)} ms`;
  return `${(ns/1e9).toFixed(3)} s`;
};
const fmtAddr = n => n ? '0x'+n.toString(16).toUpperCase().padStart(12,'0') : '—';
const fmtRel  = (ns, base) => ns ? '+'+fmtNs(ns-base) : '—';

const PALETTE = ['#4fc3f7','#69f0ae','#ffd54f','#ce93d8','#ef9a9a','#ffcc80','#80cbc4','#f48fb1','#a5d6a7','#90caf9'];
const colorMap = {};
let colorIdx = 0;
const typeColor = t => { if(!colorMap[t]) colorMap[t]=PALETTE[colorIdx++%PALETTE.length]; return colorMap[t]; };

// Build aggregated graph: CPU type-groups on left, GPU events on right
function buildGraph(session, filterType) {
  const allocs  = session.cpu_events.filter(e => !e.is_dealloc);
  const gpuEvs  = session.gpu_events;
  const corrs   = session.correlated_events;

  const gpuById = {};
  gpuEvs.forEach(e => gpuById[e.base.event_id] = e);

  const cpuToCorrs = {};
  corrs.forEach(c => { if(!cpuToCorrs[c.cpu_event_id]) cpuToCorrs[c.cpu_event_id]=[]; cpuToCorrs[c.cpu_event_id].push(c); });

  const typeGroups = {};
  allocs.forEach(e => {
    const t = e.object_type||'unknown';
    if(!typeGroups[t]) typeGroups[t]={count:0,bytes:0,events:[],corrCount:0};
    typeGroups[t].count++;
    typeGroups[t].bytes += e.alloc_size_bytes||0;
    typeGroups[t].events.push(e);
    if(cpuToCorrs[e.base.event_id]) typeGroups[t].corrCount++;
  });

  const activeTypes = filterType ? [filterType] : Object.keys(typeGroups);

  const nodes=[], edges=[], seenGpu=new Set();

  activeTypes.forEach(t => {
    const g = typeGroups[t]; if(!g) return;
    const cpuId = `cpu_${t}`;
    nodes.push({ id:cpuId, kind:'cpu_group', label:t.split('.').pop(), fullType:t, ...g, color:typeColor(t) });

    g.events.forEach(ev => {
      (cpuToCorrs[ev.base.event_id]||[]).forEach(c => {
        const gpuEv = gpuById[c.gpu_event_id]; if(!gpuEv) return;
        const gpuId = `gpu_${gpuEv.base.event_id}`;
        if(!seenGpu.has(gpuId)) {
          seenGpu.add(gpuId);
          const isT = gpuEv.base.event_type==='TRANSFER';
          nodes.push({ id:gpuId, kind:'gpu', label:isT?fmtBytes(gpuEv.transfer_size_bytes):(gpuEv.kernel_name||'kernel'), evType:gpuEv.base.event_type, event:gpuEv });
        }
        edges.push({ id:`e_${cpuId}_${gpuId}_${c.cpu_event_id}`, source:cpuId, target:gpuId, confidence:c.confidence, latency:c.latency_ns, corr:c, cpuEvent:ev });
      });
    });
  });

  return { nodes, edges, typeGroups };
}

function GraphCanvas({ session, filterType, onSelect }) {
  const svgRef = useRef(null);
  const zoomRef = useRef(null);
  const graphData = useMemo(() => session ? buildGraph(session, filterType) : null, [session, filterType]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    if (!graphData || !graphData.nodes.length) return;

    const W = svgRef.current.clientWidth || 800;
    const H = svgRef.current.clientHeight || 600;

    const zoom = d3.zoom().scaleExtent([0.04,5]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);
    zoomRef.current = { svg, zoom };

    const g = svg.append('g');

    const { nodes, edges } = graphData;
    const cpuNodes = nodes.filter(n => n.kind==='cpu_group');
    const gpuNodes = nodes.filter(n => n.kind==='gpu');

    const PAD = 56;
    const cpuX = W * 0.24;
    const gpuX = W * 0.74;
    const cpuRH = Math.max(50, (H - PAD*2) / Math.max(cpuNodes.length,1));
    const gpuRH = Math.max(36, (H - PAD*2) / Math.max(gpuNodes.length,1));

    cpuNodes.forEach((n,i) => { n.x=cpuX; n.y=PAD + i*cpuRH + cpuRH/2; });
    gpuNodes.forEach((n,i) => { n.x=gpuX; n.y=PAD + i*gpuRH + gpuRH/2; });

    const nodeById = {};
    nodes.forEach(n => nodeById[n.id]=n);

    // defs
    const defs = svg.append('defs');
    [['hard','#69f0ae'],['weak','#2a3040']].forEach(([k,col]) => {
      defs.append('marker').attr('id',`arr-${k}`).attr('viewBox','0 -4 8 8')
        .attr('refX',20).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
        .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',col);
    });

    // column labels
    [['CPU  ALLOCATIONS', cpuX], ['GPU  EVENTS', gpuX]].forEach(([t,x]) => {
      g.append('text').attr('x',x).attr('y',22).attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
        .attr('letter-spacing','0.1em').attr('fill','#384050').text(t);
    });

    // edges
    const edgeG = g.append('g');
    edgeG.selectAll('path').data(edges).join('path')
      .attr('class', d=>`edge edge-${d.confidence.toLowerCase()}`)
      .attr('d', d => {
        const s=nodeById[d.source], t=nodeById[d.target];
        if(!s||!t) return '';
        const mx=(s.x+t.x)/2;
        return `M${s.x+54},${s.y} C${mx},${s.y} ${mx},${t.y} ${t.x-20},${t.y}`;
      })
      .attr('fill','none')
      .attr('stroke', d=>d.confidence==='HARD'?'#69f0ae':'#2a3040')
      .attr('stroke-width', d=>d.confidence==='HARD'?1.5:1)
      .attr('stroke-dasharray', d=>d.confidence==='HARD'?'none':'4,3')
      .attr('opacity', d=>d.confidence==='HARD'?0.55:0.25)
      .attr('marker-end', d=>`url(#arr-${d.confidence.toLowerCase()})`)
      .style('cursor','pointer')
      .on('click', (evt,d) => { evt.stopPropagation(); onSelect({type:'edge',data:d}); hilite(d.source,d.target); });

    // CPU nodes
    const cpuG = g.append('g');
    const cpuNd = cpuG.selectAll('g').data(cpuNodes).join('g')
      .attr('class','node').attr('transform',d=>`translate(${d.x},${d.y})`)
      .style('cursor','pointer')
      .on('click',(evt,d)=>{ evt.stopPropagation(); onSelect({type:'cpu_group',data:d}); hilite(d.id); });

    cpuNd.append('rect').attr('x',-54).attr('y',-20).attr('width',108).attr('height',40).attr('rx',5)
      .attr('fill',d=>d.color+'12').attr('stroke',d=>d.color).attr('stroke-width',1.5);
    cpuNd.append('text').attr('y',-5).attr('text-anchor','middle')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size',10).attr('font-weight',600)
      .attr('fill',d=>d.color).text(d=>d.label.length>15?d.label.slice(0,14)+'…':d.label);
    cpuNd.append('text').attr('y',11).attr('text-anchor','middle')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size',8).attr('fill','#4a5568')
      .text(d=>`${d.count} · ${fmtBytes(d.bytes)}`);
    // correlation count badge
    cpuNd.filter(d=>d.corrCount>0).append('g').attr('transform','translate(54,-20)')
      .call(g=>{
        g.append('circle').attr('r',8).attr('fill','#0d1a12').attr('stroke','#69f0ae').attr('stroke-width',1.2);
        g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','#69f0ae')
          .text(d=>d.corrCount);
      });

    // GPU nodes
    const gpuG = g.append('g');
    const gpuNd = gpuG.selectAll('g').data(gpuNodes).join('g')
      .attr('class','node').attr('transform',d=>`translate(${d.x},${d.y})`)
      .style('cursor','pointer')
      .on('click',(evt,d)=>{ evt.stopPropagation(); onSelect({type:'gpu',data:d.event}); hilite(d.id); });

    gpuNd.append('ellipse').attr('rx',46).attr('ry',16)
      .attr('fill',d=>d.evType==='KERNEL'?'rgba(206,147,216,.07)':'rgba(105,240,174,.05)')
      .attr('stroke',d=>d.evType==='KERNEL'?'#ce93d8':'#69f0ae').attr('stroke-width',1.5);
    gpuNd.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
      .attr('fill',d=>d.evType==='KERNEL'?'#ce93d8':'#69f0ae')
      .text(d=>d.label.length>13?d.label.slice(0,12)+'…':d.label);

    function hilite(...ids) {
      const s=new Set(ids);
      g.selectAll('.node').attr('opacity',n=>s.has(n.id)?1:0.12);
      edgeG.selectAll('path').attr('opacity',d=>(s.has(d.source)||s.has(d.target))?(d.confidence==='HARD'?0.9:0.6):0.04);
    }

    svg.on('click',()=>{
      g.selectAll('.node').attr('opacity',1);
      edgeG.selectAll('path').attr('opacity',d=>d.confidence==='HARD'?0.55:0.25);
      onSelect(null);
    });

    // fit
    const bb = g.node().getBBox();
    if(bb.width>0){
      const sc=Math.min(0.9,Math.min(W/bb.width,H/bb.height)*0.85);
      const tx=W/2-sc*(bb.x+bb.width/2), ty=H/2-sc*(bb.y+bb.height/2);
      svg.call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
    }
  }, [graphData]);

  const fitAll = () => {
    if(!zoomRef.current||!svgRef.current) return;
    const {svg,zoom}=zoomRef.current;
    const bb=svg.select('g').node().getBBox();
    const W=svgRef.current.clientWidth, H=svgRef.current.clientHeight;
    if(bb.width>0){
      const sc=Math.min(0.9,Math.min(W/bb.width,H/bb.height)*0.85);
      svg.transition().duration(350).call(zoom.transform, d3.zoomIdentity.translate(W/2-sc*(bb.x+bb.width/2),H/2-sc*(bb.y+bb.height/2)).scale(sc));
    }
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div id="graph-tb">
        <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',letterSpacing:'.1em',textTransform:'uppercase',marginRight:4}}>Graph</span>
        <button className="tb-btn" onClick={fitAll}>Fit</button>
        <div className="tb-sep"/>
        <div className="leg"><div className="leg-dot" style={{background:'var(--accent)'}}/> CPU</div>
        <div className="leg" style={{marginLeft:8}}><div className="leg-dot" style={{background:'var(--green)'}}/> GPU xfer</div>
        <div className="leg" style={{marginLeft:8}}><div className="leg-dot" style={{background:'var(--purple)'}}/> Kernel</div>
        <div className="leg" style={{marginLeft:8,gap:6}}>
          <svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="#69f0ae" strokeWidth="1.5"/></svg>HARD
        </div>
        <div className="leg" style={{marginLeft:8,gap:6}}>
          <svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="#384050" strokeWidth="1" strokeDasharray="3,2"/></svg>WEAK
        </div>
      </div>
      <div id="graph-wrap">
        {!session && <div className="empty-graph"><div className="eg-title">No session loaded</div><div className="eg-sub">Load a ProfilingSession JSON</div></div>}
        <svg id="graph-svg" ref={svgRef}/>
      </div>
    </div>
  );
}

function Timeline({ session, selected, onSelect }) {
  const ref = useRef(null);
  useEffect(() => {
    if(!ref.current||!session) return;
    const svg=d3.select(ref.current);
    svg.selectAll('*').remove();
    const W=ref.current.clientWidth||800, H=ref.current.clientHeight||120;
    const ML=70,MR=12,MT=14,rowH=26,barH=14;
    const startNs=session.start_time_ns, endNs=session.end_time_ns;
    const xScale=d3.scaleLinear().domain([startNs,endNs]).range([ML,W-MR]);
    const gpuDevs=[...new Set(session.gpu_events.map(e=>e.device_id??0))].sort();
    const rows=[{label:'CPU',kind:'cpu',y:MT},...gpuDevs.map((d,i)=>({label:`GPU:${d}`,kind:'gpu',device:d,y:MT+rowH*(i+1)}))];

    rows.forEach(r => {
      svg.append('text').attr('x',ML-8).attr('y',r.y+barH/2).attr('text-anchor','end').attr('dominant-baseline','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',9)
        .attr('fill',r.kind==='cpu'?'#4fc3f7':'#69f0ae').text(r.label);
    });

    const deallocMap={};
    session.cpu_events.filter(e=>e.is_dealloc).forEach(e=>{ deallocMap[e.alloc_address]=e.base.timestamp_ns; });
    const cpuRow=rows.find(r=>r.kind==='cpu');
    svg.selectAll('.cb').data(session.cpu_events.filter(e=>!e.is_dealloc)).join('rect')
      .attr('x',d=>xScale(d.base.timestamp_ns)).attr('y',cpuRow.y).attr('height',barH)
      .attr('width',d=>Math.max(2,xScale(deallocMap[d.alloc_address]||endNs)-xScale(d.base.timestamp_ns)))
      .attr('fill',d=>typeColor(d.object_type||'unknown')+'28').attr('stroke',d=>typeColor(d.object_type||'unknown'))
      .attr('stroke-width',.6).attr('rx',1).style('cursor','pointer')
      .on('click',(evt,d)=>onSelect({type:'cpu',data:d}));

    rows.filter(r=>r.kind==='gpu').forEach(row=>{
      svg.selectAll(`.gb${row.device}`).data(session.gpu_events.filter(e=>(e.device_id??0)===row.device)).join('rect')
        .attr('x',d=>xScale(d.base.timestamp_ns)).attr('y',row.y).attr('height',barH).attr('width',5)
        .attr('fill',d=>d.base.event_type==='KERNEL'?'#ce93d828':'#69f0ae28')
        .attr('stroke',d=>d.base.event_type==='KERNEL'?'#ce93d8':'#69f0ae')
        .attr('stroke-width',.6).attr('rx',1).style('cursor','pointer')
        .on('click',(evt,d)=>onSelect({type:'gpu',data:d}));
    });

    if(selected?.data?.base?.timestamp_ns){
      const x=xScale(selected.data.base.timestamp_ns);
      svg.append('line').attr('x1',x).attr('x2',x).attr('y1',MT-2).attr('y2',H-14)
        .attr('stroke','#ffd54f').attr('stroke-width',1).attr('stroke-dasharray','3,2').attr('opacity',.85);
    }
    xScale.ticks(8).forEach(t=>{
      svg.append('text').attr('x',xScale(t)).attr('y',H-3).attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono,monospace').attr('font-size',7).attr('fill','#2a3040')
        .text(fmtNs(t-startNs));
    });
  }, [session,selected]);
  return <div id="timeline">{!session?<div className="tl-empty">TIMELINE — load a session</div>:<svg ref={ref}/>}</div>;
}

function Inspector({ selected, baseNs }) {
  if(!selected) return <div id="inspector"><div className="insp-empty">Click a node or edge<br/>to inspect it.</div></div>;
  const Row=({k,v,cls})=><div className="insp-row"><span className="insp-key">{k}</span><span className={`insp-val ${cls||''}`}>{v}</span></div>;
  const Sec=({title,children})=><div className="insp-sec"><div className="insp-sec-title">{title}</div>{children}</div>;
  const {type,data}=selected;

  if(type==='cpu_group') return <div id="inspector">
    <div className="insp-badge badge-cpu">CPU Group</div>
    <Sec title="Summary">
      <Row k="type" v={data.fullType} cls="iv-a"/>
      <Row k="allocs" v={data.count}/>
      <Row k="total size" v={fmtBytes(data.bytes)} cls="iv-g"/>
      <Row k="correlated" v={`${data.corrCount} / ${data.count}`} cls="iv-y"/>
    </Sec>
  </div>;

  if(type==='cpu') { const e=data; return <div id="inspector">
    <div className="insp-badge badge-cpu">CPU Alloc</div>
    <Sec title="Identity"><Row k="event_id" v={e.base?.event_id} cls="iv-a"/><Row k="type" v={e.object_type||'—'} cls="iv-y"/></Sec>
    <Sec title="Memory"><Row k="address" v={fmtAddr(e.alloc_address)} cls="iv-d"/><Row k="size" v={fmtBytes(e.alloc_size_bytes)} cls="iv-g"/><Row k="refs" v={e.ref_count??'—'}/><Row k="gc_gen" v={e.gc_generation??'—'}/></Sec>
    <Sec title="Timing"><Row k="at" v={fmtRel(e.base?.timestamp_ns,baseNs)} cls="iv-d"/></Sec>
    {e.callstack?.length>0&&<Sec title="Callstack">{e.callstack.map((f,i)=><div key={i} className="cs-frame">{f}</div>)}</Sec>}
  </div>; }

  if(type==='gpu') { const e=data; const isT=e.base?.event_type==='TRANSFER'; return <div id="inspector">
    <div className="insp-badge badge-gpu">GPU {e.base?.event_type}</div>
    <Sec title="Identity"><Row k="event_id" v={e.base?.event_id} cls="iv-a"/><Row k="device" v={`GPU:${e.device_id??0}`}/></Sec>
    {isT
      ? <Sec title="Transfer"><Row k="size" v={fmtBytes(e.transfer_size_bytes)} cls="iv-g"/><Row k="kind" v={e.transfer_kind||'—'} cls="iv-y"/><Row k="src" v={fmtAddr(e.src_address)} cls="iv-d"/><Row k="dst" v={fmtAddr(e.dst_address)} cls="iv-d"/></Sec>
      : <Sec title="Kernel"><Row k="name" v={e.kernel_name||'—'} cls="iv-p"/><Row k="pg_faults" v={e.um_page_faults??0}/></Sec>}
    <Sec title="Timing"><Row k="at" v={fmtRel(e.base?.timestamp_ns,baseNs)} cls="iv-d"/></Sec>
  </div>; }

  if(type==='edge') { const d=data; const isH=d.confidence==='HARD'; return <div id="inspector">
    <div className="insp-badge badge-corr">Correlation</div>
    <Sec title="Match">
      <Row k="confidence" v={<span className={`insp-badge ${isH?'badge-hard':'badge-weak'}`}>{d.confidence}</span>}/>
      <Row k="reason" v={d.corr?.match_reason} cls={isH?'iv-g':'iv-d'}/>
      <Row k="latency" v={fmtNs(d.latency)} cls="iv-y"/>
    </Sec>
    <Sec title="CPU Alloc">
      <Row k="type" v={d.data?.fullType||d.source} cls="iv-a"/>
      <Row k="id" v={d.cpuEvent?.base?.event_id} cls="iv-d"/>
      <Row k="size" v={fmtBytes(d.cpuEvent?.alloc_size_bytes)} cls="iv-g"/>
    </Sec>
  </div>; }
  return <div id="inspector"><div className="insp-empty">Unknown type.</div></div>;
}

function TypeList({ session, filterType, onFilter }) {
  if(!session) return <div id="type-list" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}><span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}}>—</span></div>;
  const allocs=session.cpu_events.filter(e=>!e.is_dealloc);
  const groups={};
  allocs.forEach(e=>{ const t=e.object_type||'unknown'; if(!groups[t]) groups[t]={count:0,bytes:0}; groups[t].count++; groups[t].bytes+=e.alloc_size_bytes||0; });
  const sorted=Object.entries(groups).sort((a,b)=>b[1].count-a[1].count);
  const maxC=sorted[0]?.[1].count||1;
  return <div id="type-list">
    <div className={`type-row ${!filterType?'selected':''}`} onClick={()=>onFilter(null)}>
      <div className="type-dot" style={{background:'var(--mid)'}}/>
      <span className="type-name" style={{color:'var(--mid)'}}>All types</span>
      <span className="type-count">{allocs.length}</span>
    </div>
    {sorted.map(([t,info])=>(
      <div key={t} className={`type-row ${filterType===t?'selected':''}`} onClick={()=>onFilter(filterType===t?null:t)}>
        <div className="type-dot" style={{background:typeColor(t)}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <span className="type-name">{t.split('.').pop()}</span>
            <span className="type-count">{info.count}</span>
          </div>
          <div style={{height:2,background:'var(--s3)',borderRadius:1,marginTop:2,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:1,background:typeColor(t),width:`${(info.count/maxC)*100}%`}}/>
          </div>
        </div>
      </div>
    ))}
  </div>;
}

function App() {
  const [session,setSession]=useState(null);
  const [selected,setSelected]=useState(null);
  const [filterType,setFilterType]=useState(null);

  const loadFile=useCallback(file=>{ if(!file) return; const r=new FileReader(); r.onload=e=>{ try{ setSession(JSON.parse(e.target.result)); setSelected(null); setFilterType(null); } catch(err){ alert('Invalid JSON: '+err.message); } }; r.readAsText(file); },[]);

  useEffect(()=>{
    const ov=document.getElementById('drop-overlay');
    const onOver=e=>{e.preventDefault();ov.classList.add('show');};
    const onLeave=e=>{if(!e.relatedTarget)ov.classList.remove('show');};
    const onDrop=e=>{e.preventDefault();ov.classList.remove('show');loadFile(e.dataTransfer?.files?.[0]);};
    document.addEventListener('dragover',onOver); document.addEventListener('dragleave',onLeave); document.addEventListener('drop',onDrop);
    return()=>{ document.removeEventListener('dragover',onOver); document.removeEventListener('dragleave',onLeave); document.removeEventListener('drop',onDrop); };
  },[loadFile]);

  useEffect(()=>{ const inp=document.getElementById('file-input'); const h=e=>loadFile(e.target.files[0]); inp.addEventListener('change',h); return()=>inp.removeEventListener('change',h); },[loadFile]);

  const stats=useMemo(()=>{
    if(!session) return [];
    const hard=session.correlated_events.filter(c=>c.confidence==='HARD').length;
    return [
      {label:'cpu allocs',val:session.cpu_events.filter(e=>!e.is_dealloc).length},
      {label:'gpu events',val:session.gpu_events.length},
      {label:'hard corr',val:hard},
      {label:'duration',val:fmtNs(session.end_time_ns-session.start_time_ns)},
    ];
  },[session]);

  return <>
    <div id="topbar">
      <span className="logo">HPC<span> / </span>Profiler</span>
      {stats.length>0&&<div className="topbar-sep"/>}
      {stats.map((s,i)=><div key={i} className="stat-pill"><b>{s.val}</b> {s.label}</div>)}
      <div className="spacer"/>
      <button className="load-btn" onClick={()=>document.getElementById('file-input').click()}>Load JSON</button>
    </div>
    <div id="app">
      <div id="left-col">
        <div className="panel-hdr"><b>Object Types</b></div>
        <TypeList session={session} filterType={filterType} onFilter={setFilterType}/>
      </div>
      <div id="center-col">
        <Timeline session={session} selected={selected} onSelect={setSelected}/>
        <GraphCanvas session={session} filterType={filterType} onSelect={setSelected}/>
      </div>
      <div id="right-col">
        <div className="panel-hdr"><b>Inspector</b></div>
        <Inspector selected={selected} baseNs={session?.start_time_ns??0}/>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
